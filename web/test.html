<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Filter Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.5.4/elliptic.min.js"></script>
    <script src="assets/bip39-wordlist.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            background: #fff;
            color: #111;
            padding: 12px;
            max-width: 640px;
            margin: 0 auto;
        }

        /* header */
        .hdr { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; }
        .hdr h1 { font-size: 16px; font-weight: 700; }
        .hdr a  { font-size: 12px; color: #666; text-decoration: none; }
        .hdr a:hover { text-decoration: underline; }

        hr { border: none; border-top: 1px solid #ddd; margin: 10px 0; }

        /* input */
        .input-row { display: flex; gap: 0; margin-bottom: 8px; }
        #valInput {
            flex: 1; min-width: 0;
            border: 1px solid #bbb; border-right: none;
            padding: 7px 9px; font-family: monospace; font-size: 13px;
            outline: none;
        }
        #valInput:focus { border-color: #555; }
        #btnCheck {
            padding: 7px 14px; border: 1px solid #bbb;
            background: #f5f5f5; cursor: pointer; font-size: 13px; font-weight: 600;
            white-space: nowrap;
        }
        #btnCheck:hover { background: #e8e8e8; }
        #btnCheck:disabled { opacity: .5; cursor: not-allowed; }

        /* result */
        #resultBox {
            font-family: monospace; font-size: 13px;
            padding: 7px 9px; border: 1px solid #ddd;
            margin-bottom: 8px; min-height: 34px;
            display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap; word-break: break-all;
        }
        #resultBox.found { border-color: #2a9a2a; background: #f2fff2; }
        #resultBox.miss  { border-color: #bbb; background: #fafafa; }
        #resultBox.err   { border-color: #c33; background: #fff5f5; color: #c33; }

        .r-badge { font-weight: 700; white-space: nowrap; }
        .found .r-badge { color: #1a7a1a; }
        .miss  .r-badge { color: #666; }
        .r-hash  { color: #555; flex: 1; min-width: 0; }
        .r-meta  { color: #888; white-space: nowrap; }

        /* filter */
        .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
        .filter-lbl { font-size: 12px; color: #666; white-space: nowrap; }
        .cf-btn {
            padding: 4px 9px; border: 1px solid #ccc; background: #fafafa;
            cursor: pointer; font-size: 12px; font-family: monospace;
        }
        .cf-btn:hover { border-color: #888; background: #f0f0f0; }
        .cf-btn.loading { border-color: #888; background: #eee; opacity: .7; }
        .cf-btn.idb     { border-color: #888; border-style: dashed; }
        .cf-btn.loaded  { border-color: #2a9a2a; background: #f2fff2; color: #1a7a1a; font-weight: 700; border-style: solid; }
        .idb-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 4px; margin-bottom: 2px; }
        .del-btn { font-size: 11px; font-family: monospace; color: #c33; cursor: pointer; background: none; border: 1px solid #f0c0c0; padding: 2px 7px; }
        .del-btn:hover { background: #fff0f0; }

        .prog-wrap { margin-bottom: 6px; }
        .prog-bar { height: 4px; background: #eee; border: 1px solid #ddd; margin-bottom: 3px; }
        .prog-fill { height: 100%; background: #555; width: 0%; transition: width .2s linear; }
        .prog-txt { font-size: 11px; color: #666; font-family: monospace; display: flex; justify-content: space-between; }
        .prog-cancel { background: none; border: none; font-size: 11px; color: #c33; cursor: pointer; padding: 0; }

        /* history */
        .hist-row {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 0; border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .hist-row:hover { background: #fafafa; }
        .hist-addr { flex: 1; min-width: 0; font-family: monospace; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #333; }
        .hist-badge { font-size: 11px; white-space: nowrap; }
        .badge-f { color: #1a7a1a; }
        .badge-m { color: #999; }
        .hist-link { font-size: 11px; color: #888; text-decoration: none; flex-shrink: 0; }
        .hist-link:hover { color: #333; text-decoration: underline; }

        /* log */
        .log-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .log-lbl  { font-size: 12px; color: #666; }
        .log-clr  { font-size: 11px; color: #888; cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; }
        .log-box  { font-family: monospace; font-size: 11px; line-height: 1.6; background: #fafafa; border: 1px solid #e8e8e8; padding: 6px 8px; height: 260px; overflow-y: auto; color: #444; white-space: pre-wrap; }
        .l-ok   { color: #1a7a1a; }
        .l-err  { color: #c33; }
        .l-dim  { color: #888; }
        .l-hi   { color: #555; }
        .l-data { color: #111; }
        .l-spd  { color: #335599; }

        .sec-lbl { font-size: 12px; color: #666; margin-bottom: 4px; }

        .sqlite-box {
            font-family: monospace;
            font-size: 11px;
            line-height: 1.5;
            background: #fafafa;
            border: 1px solid #e8e8e8;
            padding: 6px 8px;
            min-height: 44px;
            max-height: 180px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 8px;
        }

        .mn-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
        .mn-row input { width: 80px; padding: 5px 6px; border: 1px solid #bbb; font-family: monospace; font-size: 12px; }
        #mnWords {
            width: 100%;
            min-height: 72px;
            border: 1px solid #bbb;
            padding: 7px 9px;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
        }
        #btnMnCheck {
            padding: 6px 12px;
            border: 1px solid #bbb;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        #btnMnCheck:disabled { opacity: .5; cursor: not-allowed; }
        .mn-out {
            font-family: monospace;
            font-size: 11px;
            line-height: 1.5;
            background: #fafafa;
            border: 1px solid #e8e8e8;
            padding: 6px 8px;
            min-height: 56px;
            max-height: 260px;
            overflow: auto;
            white-space: pre;
        }
        #mnWarn { font-size: 12px; margin-top: 4px; margin-bottom: 6px; }
        #mnWarn.ok { color: #1a7a1a; }
        #mnWarn.warn { color: #b8860b; }
        #mnWarn.err { color: #c33; }
    </style>
</head>
<body>

<div class="hdr">
    <h1>BTC Filter Test</h1>
    <a href="index.html">← Slot Machine</a>
</div>

<div class="input-row">
    <input type="text" id="valInput"
           placeholder="address / hash160 / pubkey"
           autocomplete="off" spellcheck="false">
    <button id="btnCheck" onclick="verifyInput()">Check</button>
</div>

<div id="resultBox"><span style="color:#bbb">—</span></div>

<div class="sec-lbl">SQLite (`balance_utxo.sqlite`)</div>
<div id="sqliteBox" class="sqlite-box"><span style="color:#bbb">—</span></div>

<hr>

<div class="filter-row">
    <span class="filter-lbl">Local Filter:</span>
    <button class="cf-btn" data-mb="512"   data-bits="32" onclick="filterClick(512,32)">512M</button>
    <button class="cf-btn" data-mb="16384" data-bits="37" onclick="filterClick(16384,37)">16G</button>
</div>

<div class="idb-row" id="idbRow" style="display:none">
    <span class="filter-lbl">Delete locally:</span>
    <span id="idbDelList"></span>
</div>

<div class="prog-wrap" id="cfProgress" style="display:none">
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-txt">
        <span id="progText">0%</span>
        <button class="prog-cancel" onclick="cancelLoad()">cancel</button>
    </div>
</div>

<div id="histBox" style="display:none">
    <hr>
    <div class="sec-lbl">Recent</div>
    <div id="histList"></div>
</div>

<hr>

<div class="sec-lbl">Mnemonic Derivation (12/24 words)</div>
<textarea id="mnWords" placeholder="paste 12 or 24 BIP39 words (space/newline separated)"></textarea>
<div class="mn-row">
    <span class="filter-lbl">start index</span>
    <input id="mnStart" type="number" min="0" max="1000" value="0">
    <span class="filter-lbl">count / path</span>
    <input id="mnCount" type="number" min="1" max="20" value="3">
    <button id="btnMnCheck" onclick="checkMnemonic()">Derive + Check</button>
</div>
<div id="mnWarn" class="warn">BIP39 validation warning only; derivation always runs.</div>
<div id="mnOut" class="mn-out"><span style="color:#bbb">—</span></div>

<hr>

<div class="log-hdr">
    <span class="log-lbl">Log</span>
    <button class="log-clr" onclick="clearLog()">clear</button>
</div>
<div class="log-box" id="logConsole"></div>

<script>
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtMB(b) { return (b/1048576).toFixed(1)+' MB'; }
function filterLabel(f) {
    const m = f.match(/^(\d+)mb(_bal)?\.bin$/i);
    if (!m) return f;
    const mb = parseInt(m[1], 10);
    const bal = m[2] ? ' bal' : '';
    const sz = mb >= 1024 ? (mb / 1024) + 'G' : mb + 'M';
    return sz + bal;
}

function satToBTC(sat) {
    return (Number(sat) / 1e8).toFixed(8);
}

async function fetchSqliteByKey(key32, limit = 20) {
    const resp = await fetch(`balance_lookup.php?key32=${encodeURIComponent(key32)}&limit=${limit}&_cb=${Date.now()}`);
    return resp.json();
}

function renderSqliteResult(key32, data, err) {
    const box = document.getElementById('sqliteBox');
    if (err) {
        box.textContent = `error: ${err}`;
        return;
    }
    if (!data || data.error || data.ok !== true) {
        box.textContent = `error: ${(data && data.error) ? data.error : 'unknown sqlite response'}`;
        return;
    }
    if (!data.count) {
        box.textContent =
            `key32=${key32}\n` +
            `rows=0\n` +
            `total_sat=0 (0.00000000 BTC)\n` +
            `note: this sqlite stores CURRENT unspent outputs only (UTXO set).`;
        return;
    }
    const txids = new Set((data.rows || []).map(r => r.txid_hex)).size;
    let out =
        `key32=${key32}\n` +
        `rows=${data.count} (limit ${data.limit})  distinct_txids=${txids}\n` +
        `total_sat=${data.total_sat} (${satToBTC(data.total_sat)} BTC)\n`;
    for (let i = 0; i < data.rows.length; i++) {
        const r = data.rows[i];
        out += `${i + 1}. ${r.txid_hex}:${r.vout}  ${r.value_sat} sat (${satToBTC(r.value_sat)} BTC)\n`;
    }
    box.textContent = out.trim();
}

function logServerResults(results, totalMs, netMs, clientFound) {
    const addrResults = results.filter(r => !r.filter.includes('_bal'));
    const balResults  = results.filter(r =>  r.filter.includes('_bal'));

    const allLabels = results.map(r => filterLabel(r.filter));
    const w = Math.max(...allLabels.map(l => l.length));

    addrResults.forEach((r, i) => {
        const pre   = i === 0 ? 'server  ' : '        ';
        const label = filterLabel(r.filter).padEnd(w, ' ');
        if (r.error) {
            log(`${pre}${label}  error: ${r.error}`, 'err');
        } else {
            const status = r.found ? 'HIT ' : 'MISS';
            const flag   = clientFound !== null && clientFound !== r.found ? '  !' : '';
            const type   = r.found ? 'ok' : (flag ? 'err' : 'dim');
            log(`${pre}${label}  ${status}${flag}`, type);
        }
    });

    if (balResults.length) {
        balResults.forEach((r, i) => {
            const pre   = i === 0 ? 'balance ' : '        ';
            const label = filterLabel(r.filter).padEnd(w, ' ');
            if (r.error) {
                log(`${pre}${label}  error: ${r.error}`, 'err');
            } else {
                const status = r.found ? 'HIT ' : 'MISS';
                const type   = r.found ? 'ok' : 'dim';
                log(`${pre}${label}  ${status}`, type);
            }
        });
    }

    log(`        ${''.padEnd(w, ' ')}  php ${totalMs}ms  net ${netMs}ms`, 'dim');
}

// ── LOG ───────────────────────────────────────────────────────────────────────
const LOG_START = performance.now();
function log(msg, type='') {
    const t = ((performance.now()-LOG_START)/1000).toFixed(2);
    const el = document.getElementById('logConsole');
    const row = document.createElement('div');
    row.innerHTML = `<span class="l-dim">[${t}]</span> <span class="${'l-'+type||''}">${esc(msg)}</span>`;
    el.appendChild(row);
    el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('logConsole').innerHTML=''; log('cleared','dim'); }

// ── DECODERS ──────────────────────────────────────────────────────────────────
function decodeBase58(str) {
    const ALPHA = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
    let num = 0n, leading = 0;
    while (str[leading] === '1') leading++;
    for (const c of str) {
        const i = ALPHA.indexOf(c);
        if (i < 0) throw new Error("Invalid Base58 char: " + c);
        num = num * 58n + BigInt(i);
    }
    let hex = num.toString(16);
    if (hex.length % 2) hex = '0' + hex;
    const full = '00'.repeat(leading) + hex;
    if (full.length < 42) throw new Error("Base58 address too short");
    return full.substring(2, 42);
}

function decodeBech32(str) {
    str = str.toLowerCase();
    if (!str.startsWith('bc1') || str.length < 42) throw new Error("Invalid SegWit/Taproot address.");
    const ALPHA = "qpzry9x8gf2tvdw0s3jn54khce6mua7l";
    const witnessVer = str[3];
    const isP2TR = witnessVer === 'p';
    const isV0   = witnessVer === 'q';
    if (!isP2TR && !isV0) throw new Error("Unsupported witness version.");
    // data chars: after witness version char, before 6-char checksum
    const dataChars = str.slice(4, str.length - 6);
    // convert 5-bit groups to 8-bit bytes
    let bits = 0, value = 0;
    const bytes = [];
    for (const c of dataChars) {
        const idx = ALPHA.indexOf(c);
        if (idx < 0) throw new Error("Invalid Bech32 char: " + c);
        value = (value << 5) | idx;
        bits += 5;
        if (bits >= 8) { bits -= 8; bytes.push((value >> bits) & 0xff); }
    }
    const expectedLen = isP2TR ? 32 : 20;
    if (bytes.length !== expectedLen) throw new Error(`Expected ${expectedLen} bytes, got ${bytes.length}.`);
    return bytes.map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── FNV-1a 64-bit ─────────────────────────────────────────────────────────────
const FNV_PRIME  = 0x00000100000001B3n;
const FNV_OFFSET = 0xCBF29CE484222325n;
const MASK64     = (1n << 64n) - 1n;

function fnv1a(hex32) {
    const h64 = hex32.padEnd(64, '0');
    let h = FNV_OFFSET;
    for (let i = 0; i < 64; i += 2)
        h = ((h ^ BigInt(parseInt(h64.substring(i,i+2),16))) * FNV_PRIME) & MASK64;
    return h;
}

// ── INDEXEDDB CACHE ───────────────────────────────────────────────────────────
function openDB() {
    return new Promise((res, rej) => {
        const req = indexedDB.open('btc_filter_cache', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('filter');
        req.onsuccess = e => res(e.target.result);
        req.onerror   = e => rej(e.target.error);
    });
}
async function idbSave(sizeMB, bitsExp, buffer) {
    try {
        const db = await openDB();
        const tx = db.transaction('filter', 'readwrite');
        tx.objectStore('filter').put({ sizeMB, bitsExp, buffer }, sizeMB);
        await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
        log(`saved ${sizeMB}MB to IndexedDB`, 'dim');
    } catch(e) { log(`IDB write error: ${e.message}`, 'dim'); }
}
async function idbLoad(sizeMB) {
    try {
        const db  = await openDB();
        const tx  = db.transaction('filter', 'readonly');
        const req = tx.objectStore('filter').get(sizeMB);
        return await new Promise((res, rej) => { req.onsuccess = () => res(req.result||null); req.onerror = rej; });
    } catch(e) { return null; }
}
async function idbDelete(sizeMB) {
    try {
        const db = await openDB();
        const tx = db.transaction('filter', 'readwrite');
        tx.objectStore('filter').delete(sizeMB);
        await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    } catch(e) {}
}
async function idbKeys() {
    try {
        const db  = await openDB();
        const tx  = db.transaction('filter', 'readonly');
        const req = tx.objectStore('filter').getAllKeys();
        return await new Promise((res, rej) => { req.onsuccess = () => res(req.result||[]); req.onerror = rej; });
    } catch(e) { return []; }
}

async function refreshIDBState() {
    const keys = await idbKeys();
    document.querySelectorAll('.cf-btn').forEach(b => {
        const mb = parseInt(b.dataset.mb);
        if (b.classList.contains('loaded')) return; // don't touch active
        b.classList.toggle('idb', keys.includes(mb));
    });
    const delRow  = document.getElementById('idbRow');
    const delList = document.getElementById('idbDelList');
    if (!keys.length) { delRow.style.display = 'none'; return; }
    delRow.style.display = '';
    delList.innerHTML = '';
    const labels = { 512:'512M', 16384:'16G' };
    keys.sort((a,b)=>a-b).forEach(mb => {
        const btn = document.createElement('button');
        btn.className = 'del-btn';
        btn.textContent = (labels[mb] || mb+'M') + ' ×';
        btn.onclick = async () => {
            await idbDelete(mb);
            if (cf.sizeMB === mb) deactivateFilter();
            const b2 = document.querySelector(`.cf-btn[data-mb="${mb}"]`);
            if (b2) b2.classList.remove('idb','loaded');
            log(`deleted ${mb}MB from IndexedDB`, 'dim');
            refreshIDBState();
        };
        delList.appendChild(btn);
    });
}

// ── CLIENT FILTER ─────────────────────────────────────────────────────────────
const cf = { buffer: null, view: null, sizeMB: null, bitsExp: null, abort: null };

function clientLookup(filterKey) {
    if (!cf.view) return null;
    const t0    = performance.now();
    const fullH = fnv1a(filterKey);
    const trunc = fullH & ((1n << BigInt(cf.bitsExp)) - 1n);
    const row   = Number(trunc >> 6n);
    const col   = Number(trunc & 63n);
    const lo    = cf.view.getUint32(row*8,   true);
    const hi    = cf.view.getUint32(row*8+4, true);
    const chunk = BigInt(lo) | (BigInt(hi) << 32n);
    const found = (chunk & (1n << BigInt(col))) !== 0n;
    return { found, ms: (performance.now()-t0).toFixed(4) };
}

function activateFilter(sizeMB, bitsExp, buffer) {
    cf.buffer  = buffer;
    cf.view    = new DataView(buffer);
    cf.sizeMB  = sizeMB;
    cf.bitsExp = bitsExp;
    document.querySelectorAll('.cf-btn').forEach(b => {
        if (b.classList.contains('loaded')) {
            b.classList.remove('loaded');
            // restore idb class if it was cached
            idbKeys().then(keys => { if (keys.includes(parseInt(b.dataset.mb))) b.classList.add('idb'); });
        }
    });
    document.querySelector(`.cf-btn[data-mb="${sizeMB}"]`)?.classList.add('loaded');
    localStorage.setItem('btc_active_filter', sizeMB);
}

function deactivateFilter() {
    const mb = cf.sizeMB;
    cf.buffer = cf.view = cf.sizeMB = cf.bitsExp = null;
    // restore idb state on button
    refreshIDBState();
    localStorage.removeItem('btc_active_filter');
    if (mb) log(`${mb}MB deactivated`, 'dim');
}

async function filterClick(sizeMB, bitsExp) {
    // clicking the active button deactivates it
    if (cf.sizeMB === sizeMB) { deactivateFilter(); return; }

    // cancel any in-progress download
    if (cf.abort) { cf.abort.abort(); cf.abort = null; showProgress(false); }

    // try loading from IndexedDB first
    const cached = await idbLoad(sizeMB);
    if (cached) {
        activateFilter(sizeMB, bitsExp, cached.buffer);
        log(`loaded ${sizeMB}MB from IndexedDB`, 'ok');
        return;
    }

    // download from server
    const btn = document.querySelector(`.cf-btn[data-mb="${sizeMB}"]`);
    if (btn) { btn.classList.remove('idb','loaded'); btn.classList.add('loading'); }
    showProgress(true, 0, sizeMB*1048576, 0);
    cf.abort = new AbortController();
    const t0 = performance.now();
    log(`downloading ${sizeMB}mb.bin`, 'hi');
    try {
        const resp = await fetch(`filter/${sizeMB}mb.bin`, { signal: cf.abort.signal });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const reader     = resp.body.getReader();
        const totalBytes = sizeMB * 1048576;
        const chunks     = [];
        let received = 0, lastSpeedRec = 0, lastSpeedT = t0, speed = 0;
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            const now = performance.now();
            const dT  = (now - lastSpeedT) / 1000;
            if (dT > 0.15) { speed = (received-lastSpeedRec)/dT/1048576; lastSpeedRec=received; lastSpeedT=now; }
            showProgress(true, received, totalBytes, speed);
        }
        const dlSec  = ((performance.now()-t0)/1000).toFixed(2);
        const avgSpd = (received/1048576/parseFloat(dlSec)).toFixed(1);
        log(`done ${dlSec}s · ${avgSpd} MB/s`, 'ok');
        const buf = new Uint8Array(received);
        let pos = 0;
        for (const c of chunks) { buf.set(c, pos); pos += c.length; }
        activateFilter(sizeMB, bitsExp, buf.buffer);
        showProgress(false);
        await idbSave(sizeMB, bitsExp, cf.buffer);
        refreshIDBState();
    } catch (err) {
        showProgress(false);
        if (btn) { btn.classList.remove('loading'); }
        log(err.name==='AbortError' ? 'cancelled' : `error: ${err.message}`, err.name==='AbortError' ? 'dim' : 'err');
    }
    cf.abort = null;
}

function cancelLoad() {
    if (cf.abort) cf.abort.abort();
    showProgress(false);
}

function showProgress(show, received=0, total=0, speed=0) {
    document.getElementById('cfProgress').style.display = show ? '' : 'none';
    if (show && total > 0) {
        const pct = ((received/total)*100).toFixed(1);
        document.getElementById('progFill').style.width = pct + '%';
        const spd = speed > 0 ? ` · ${speed.toFixed(1)} MB/s` : '';
        document.getElementById('progText').textContent = `${pct}%  ${fmtMB(received)} / ${fmtMB(total)}${spd}`;
    }
}

// ── VERIFY ────────────────────────────────────────────────────────────────────
async function verifyInput() {
    const raw = document.getElementById('valInput').value.trim();
    if (!raw) return;
    const btn = document.getElementById('btnCheck');
    btn.disabled = true; btn.textContent = '...';
    document.getElementById('sqliteBox').textContent = 'loading...';

    const newUrl = new URL(window.location.href);
    newUrl.searchParams.set('address', raw);
    window.history.replaceState({}, '', newUrl);

    let filterKey = '', detectType = '';
    try {
        const rawLow = raw.toLowerCase();
        if (rawLow.startsWith('bc1p') && raw.length >= 62) {
            // P2TR: 32-byte x-only pubkey → 64-char hex directly
            filterKey = decodeBech32(raw); detectType = 'P2TR';
        } else if (rawLow.startsWith('bc1') && raw.length >= 42) {
            // P2WPKH: 20-byte hash → zero-pad to 32 bytes
            filterKey = decodeBech32(raw).padEnd(64, '0'); detectType = 'P2WPKH';
        } else if ((raw[0]==='1'||raw[0]==='3') && raw.length>=26 && raw.length<=35) {
            // P2PKH / P2SH: Hash160 → zero-pad to 32 bytes
            filterKey = decodeBase58(raw).padEnd(64, '0');
            detectType = raw[0]==='1' ? 'P2PKH' : 'P2SH';
        } else if (raw.length===64 && /^[0-9a-fA-F]+$/.test(raw)) {
            // Raw 32-byte hex (P2TR x-only pubkey or P2WSH script hash)
            filterKey = rawLow; detectType = '32-byte';
        } else if (raw.length===40 && /^[0-9a-fA-F]+$/.test(raw)) {
            // Raw Hash160 → zero-pad to 32 bytes
            filterKey = rawLow.padEnd(64, '0'); detectType = 'Hash160';
        } else if ((raw.length===66||raw.length===130) && /^[0-9a-fA-F]+$/.test(raw)) {
            // Raw pubkey → Hash160 → zero-pad
            const w = CryptoJS.enc.Hex.parse(raw);
            filterKey = CryptoJS.RIPEMD160(CryptoJS.SHA256(w)).toString(CryptoJS.enc.Hex).padEnd(64, '0');
            detectType = 'PubKey';
        } else { throw new Error("Unrecognized format."); }

        const cr = clientLookup(filterKey);

        // always fetch server in parallel (fire and forget start)
        const serverT0 = performance.now();
        const serverPromise = fetch(`test.php?address_hex=${filterKey}&_cb=${Date.now()}`)
            .then(r => r.json())
            .then(d => ({ d, net: (performance.now()-serverT0).toFixed(0) }))
            .catch(e => ({ err: e.message }));
        const sqlitePromise = fetchSqliteByKey(filterKey, 20)
            .then(d => ({ d }))
            .catch(e => ({ err: e.message }));

        if (cr !== null) {
            // client result is instant — show immediately
            log(`${detectType}  ${raw}`, 'hi');
            log(`client · ${cf.sizeMB}mb · ${cr.ms}ms · ${cr.found?'HIT':'MISS'}`, cr.found?'ok':'data');
            showResult(cr.found, filterKey, detectType, `${cf.sizeMB}mb`, cr.ms, null, null);
            addHistory(raw, cr.found);

            // then append server result to log once it arrives
            serverPromise.then(async ({ d, net, err }) => {
                if (err) { log(`server · error: ${err}`, 'err'); return; }
                if (d.error) { log(`server · error: ${d.error}`, 'err'); return; }
                logServerResults(d.results, d.time_total_ms, net, cr.found);
                showResult(cr.found, filterKey, detectType, `${cf.sizeMB}mb`, cr.ms, d.time_total_ms, net);
                const sq = await sqlitePromise;
                renderSqliteResult(filterKey, sq.d, sq.err);
            });
        } else {
            // no client filter — wait for server only
            const { d, net, err } = await serverPromise;
            if (err) throw new Error(err);
            if (d.error) throw new Error(d.error);
            log(`${detectType}  ${raw}`, 'hi');
            logServerResults(d.results, d.time_total_ms, net, null);
            const best = d.results[0];
            showResult(best.found, filterKey, detectType, best.filter, null, d.time_total_ms, net);
            addHistory(raw, best.found);
            const sq = await sqlitePromise;
            renderSqliteResult(filterKey, sq.d, sq.err);
        }
    } catch (err) {
        setResult('err', err.message);
        renderSqliteResult('', null, err.message);
        log(`error: ${err.message}`, 'err');
    }
    btn.disabled = false; btn.textContent = 'Check';
}

function showResult(found, filterKey, detect, filterSrc, clientMs, phpMs, netMs) {
    const box = document.getElementById('resultBox');
    box.className = found ? 'found' : 'miss';
    const parts = [];
    if (clientMs !== null) parts.push(`client ${clientMs}ms`);
    if (phpMs   !== null) parts.push(`php ${phpMs}ms`);
    if (netMs   !== null) parts.push(`net ${netMs}ms`);
    box.innerHTML = `<span class="r-badge">${found ? '✓ FOUND' : '— NOT FOUND'}</span>`
        + `<span class="r-hash">${filterKey.toUpperCase()}</span>`
        + `<span class="r-meta">${esc(filterSrc)} · ${parts.join(' · ')}</span>`;
}

function setResult(cls, msg) {
    const box = document.getElementById('resultBox');
    box.className = cls;
    box.textContent = msg;
}

// ── MNEMONIC DERIVATION + FULL CHECK ──────────────────────────────────────────
function bytesToHex(bytes) {
    return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}
function hexToBytes(hex) {
    return new Uint8Array((hex.match(/.{2}/g) || []).map(x => parseInt(x, 16)));
}

const N_SECP256K1 = 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n;
const EC = new elliptic.ec('secp256k1');

function privToPub(privBytes) {
    return new Uint8Array(EC.keyFromPrivate(privBytes).getPublic(true, 'array'));
}
function hash160(bytes) {
    const wa = CryptoJS.enc.Hex.parse(bytesToHex(bytes));
    return hexToBytes(CryptoJS.RIPEMD160(CryptoJS.SHA256(wa)).toString());
}
async function hmac512(key, data) {
    const k = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: 'SHA-512' }, false, ['sign']);
    return new Uint8Array(await crypto.subtle.sign('HMAC', k, data));
}
async function mnemonicToSeedFromString(wordsStr) {
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(wordsStr), 'PBKDF2', false, ['deriveBits']);
    return new Uint8Array(await crypto.subtle.deriveBits(
        { name: 'PBKDF2', hash: 'SHA-512', salt: enc.encode('mnemonic'), iterations: 2048 },
        km,
        512
    ));
}
async function masterFromSeed(seed) {
    const I = await hmac512(new TextEncoder().encode('Bitcoin seed'), seed);
    return { key: I.slice(0, 32), chain: I.slice(32) };
}
async function childKey(parent, index, hardened) {
    const idx = hardened ? (index | 0x80000000) >>> 0 : index;
    const idxBuf = new Uint8Array(4);
    new DataView(idxBuf.buffer).setUint32(0, idx, false);
    const pub = privToPub(parent.key);
    const data = hardened
        ? new Uint8Array([0x00].concat(Array.from(parent.key)).concat(Array.from(idxBuf)))
        : new Uint8Array(Array.from(pub).concat(Array.from(idxBuf)));
    const I = await hmac512(parent.chain, data);
    const childKeyBn =
        (BigInt('0x' + bytesToHex(I.slice(0, 32))) + BigInt('0x' + bytesToHex(parent.key))) % N_SECP256K1;
    return { key: hexToBytes(childKeyBn.toString(16).padStart(64, '0')), chain: I.slice(32) };
}
async function derivePath(seed, path) {
    let node = await masterFromSeed(seed);
    const parts = path.split('/').slice(1);
    for (const p of parts) {
        const hardened = p.endsWith("'");
        node = await childKey(node, parseInt(p, 10), hardened);
    }
    return node;
}

const B58 = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
function base58Encode(bytes) {
    if (!bytes.length) return '';
    let n = BigInt('0x' + bytesToHex(bytes));
    let r = '';
    while (n > 0n) { r = B58[Number(n % 58n)] + r; n /= 58n; }
    for (let i = 0; i < bytes.length; i++) { if (bytes[i] !== 0) break; r = '1' + r; }
    return r;
}
function base58Check(payload) {
    const p = new Uint8Array(payload);
    const hex = bytesToHex(p);
    const wa = CryptoJS.enc.Hex.parse(hex);
    const chk = CryptoJS.SHA256(CryptoJS.SHA256(wa)).toString().slice(0, 8);
    return base58Encode(new Uint8Array(Array.from(p).concat(Array.from(hexToBytes(chk)))));
}

const B32_CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
const B32_GEN = [0x3b6a57b2, 0x26508e6d, 0x1ea119fa, 0x3d4233dd, 0x2a1462b3];
function b32Polymod(v) { let c = 1; for (const d of v) { const t = c >> 25; c = ((c & 0x1ffffff) << 5) ^ d; for (let j = 0; j < 5; j++) if ((t >> j) & 1) c ^= B32_GEN[j]; } return c; }
function b32HrpExpand(h) { const r = []; for (let i = 0; i < h.length; i++) r.push(h.charCodeAt(i) >> 5); r.push(0); for (let i = 0; i < h.length; i++) r.push(h.charCodeAt(i) & 31); return r; }
function b32Checksum(hrp, data) { const v = b32HrpExpand(hrp).concat(data).concat([0, 0, 0, 0, 0, 0]); const pm = b32Polymod(v) ^ 1; return Array.from({ length: 6 }, (_, i) => (pm >> (5 * (5 - i))) & 31); }
function convertBits(data, from, to, pad = true) { let acc = 0, bits = 0; const r = []; const maxv = (1 << to) - 1; for (const v of data) { acc = (acc << from) | v; bits += from; while (bits >= to) { bits -= to; r.push((acc >> bits) & maxv); } } if (pad && bits > 0) r.push((acc << (to - bits)) & maxv); return r; }
function bech32P2wpkh(h160) { const prog = [0].concat(convertBits(Array.from(h160), 8, 5)); const cs = b32Checksum('bc', prog); return 'bc1' + prog.concat(cs).map(d => B32_CHARSET[d]).join(''); }
function taprootOutputKey(pub33) {
    const xOnly = pub33.slice(1, 33);
    const tagH = CryptoJS.SHA256(CryptoJS.enc.Utf8.parse('TapTweak')).toString();
    const twkH = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(tagH + tagH + bytesToHex(xOnly))).toString();
    const P = EC.keyFromPublic(pub33).getPublic();
    const T = EC.keyFromPrivate(hexToBytes(twkH)).getPublic();
    const Q = P.add(T);
    return new Uint8Array(Q.getX().toArrayLike(Uint8Array, 'be', 32));
}
function bech32mP2tr(xOnly32) {
    const prog = [1].concat(convertBits(Array.from(xOnly32), 8, 5));
    const v = b32HrpExpand('bc').concat(prog).concat([0, 0, 0, 0, 0, 0]);
    const pm = b32Polymod(v) ^ 0x2bc830a3;
    const cs = Array.from({ length: 6 }, (_, i) => (pm >> (5 * (5 - i))) & 31);
    return 'bc1' + prog.concat(cs).map(d => B32_CHARSET[d]).join('');
}

function addrP2PKH(privKey) { const h = hash160(privToPub(privKey)); const h160 = bytesToHex(h); return { addr: base58Check([0x00].concat(Array.from(h))), filterKey: h160.padEnd(64, '0') }; }
function addrP2SHP2WPKH(privKey) { const h = hash160(privToPub(privKey)); const rs = new Uint8Array([0x00, 0x14].concat(Array.from(h))); const sh = hash160(rs); const shHex = bytesToHex(sh); return { addr: base58Check([0x05].concat(Array.from(sh))), filterKey: shHex.padEnd(64, '0') }; }
function addrP2WPKH(privKey) { const h = hash160(privToPub(privKey)); const h160 = bytesToHex(h); return { addr: bech32P2wpkh(h), filterKey: h160.padEnd(64, '0') }; }
function addrP2TR(privKey) { const pub = privToPub(privKey); const xOnly = taprootOutputKey(pub); const fk = bytesToHex(xOnly); return { addr: bech32mP2tr(xOnly), filterKey: fk }; }

function parseServerHit(results, file) {
    const r = (results || []).find(x => x.filter === file);
    return r && !r.error ? !!r.found : null;
}

function validateMnemonicBip39(words) {
    if (!Array.isArray(words) || (words.length !== 12 && words.length !== 24)) {
        return { ok: false, reason: 'Expected exactly 12 or 24 words.' };
    }
    if (typeof BIP39_WORDLIST === 'undefined' || !Array.isArray(BIP39_WORDLIST)) {
        return { ok: false, reason: 'BIP39 wordlist not loaded.' };
    }
    const idxs = [];
    for (const w of words) {
        const idx = BIP39_WORDLIST.indexOf(w);
        if (idx < 0) return { ok: false, reason: `Unknown word: ${w}` };
        idxs.push(idx);
    }
    const bits = idxs.map(i => i.toString(2).padStart(11, '0')).join('');
    const csLen = words.length / 3;
    const entLen = bits.length - csLen;
    const entBits = bits.slice(0, entLen);
    const csBits = bits.slice(entLen);
    const entBytes = new Uint8Array(entLen / 8);
    for (let i = 0; i < entBytes.length; i++) {
        entBytes[i] = parseInt(entBits.slice(i * 8, i * 8 + 8), 2);
    }
    const entWa = CryptoJS.enc.Hex.parse(bytesToHex(entBytes));
    const hashBits = CryptoJS.SHA256(entWa).toString()
        .split('')
        .map(c => parseInt(c, 16).toString(2).padStart(4, '0'))
        .join('');
    const want = hashBits.slice(0, csLen);
    return {
        ok: csBits === want,
        reason: csBits === want ? 'BIP39 checksum valid.' : 'BIP39 checksum mismatch.',
    };
}

async function checkMnemonic() {
    const btn = document.getElementById('btnMnCheck');
    const out = document.getElementById('mnOut');
    const warn = document.getElementById('mnWarn');
    const wordsRaw = document.getElementById('mnWords').value.trim().toLowerCase().replace(/\s+/g, ' ');
    const start = Math.max(0, parseInt(document.getElementById('mnStart').value || '0', 10));
    const count = Math.max(1, Math.min(20, parseInt(document.getElementById('mnCount').value || '3', 10)));
    if (!wordsRaw) { out.textContent = 'Please enter 12 or 24 words.'; return; }
    const words = wordsRaw.split(' ').filter(Boolean);
    if (words.length !== 12 && words.length !== 24) { out.textContent = `Expected 12 or 24 words, got ${words.length}.`; return; }

    const v = validateMnemonicBip39(words);
    warn.className = v.ok ? 'ok' : 'warn';
    warn.textContent = v.ok
        ? `BIP39: valid (${words.length} words).`
        : `BIP39 warning: ${v.reason} Derivation still runs.`;

    btn.disabled = true;
    out.textContent = 'Deriving seed and addresses...';
    try {
        const seed = await mnemonicToSeedFromString(wordsRaw);
        const paths = [
            { path: "m/44'/0'/0'/0", type: 'P2PKH', fn: addrP2PKH },
            { path: "m/49'/0'/0'/0", type: 'P2SH-P2WPKH', fn: addrP2SHP2WPKH },
            { path: "m/84'/0'/0'/0", type: 'P2WPKH', fn: addrP2WPKH },
            { path: "m/86'/0'/0'/0", type: 'P2TR', fn: addrP2TR },
        ];
        let txt = `words=${words.length}  start=${start}  count=${count}\n`;
        txt += 'type         i  bloom16g  bal16g  sqlite_rows  total_sat  address\n';
        txt += '------------------------------------------------------------------------\n';
        out.textContent = txt + '(running checks...)';

        for (const p of paths) {
            const acct = await derivePath(seed, p.path);
            for (let n = start; n < start + count; n++) {
                const child = await childKey(acct, n, false);
                const info = p.fn(child.key);
                const local = clientLookup(info.filterKey);
                const sr = await fetch(`test.php?address_hex=${info.filterKey}&_cb=${Date.now()}`).then(r => r.json()).catch(() => null);
                const sq = await fetchSqliteByKey(info.filterKey, 10).catch(() => null);
                const b16 = sr && !sr.error ? parseServerHit(sr.results, '16384mb.bin') : null;
                const bb16 = sr && !sr.error ? parseServerHit(sr.results, '16384mb_bal.bin') : null;
                const sqliteRows = (sq && sq.ok) ? sq.count : 0;
                const sqliteSat = (sq && sq.ok) ? sq.total_sat : 0;
                const bloomText = b16 === null ? 'ERR' : (b16 ? 'HIT ' : 'MISS');
                const balText = bb16 === null ? 'ERR' : (bb16 ? 'HIT ' : 'MISS');
                txt += `${p.type.padEnd(11)} ${String(n).padStart(2)}  ${bloomText.padEnd(7)}  ${balText.padEnd(6)}  ${String(sqliteRows).padStart(11)}  ${String(sqliteSat).padStart(9)}  ${info.addr}\n`;
                if (local) {
                    log(`mnemonic ${p.type}[${n}] local ${local.found ? 'HIT' : 'MISS'} (${local.ms}ms)`, local.found ? 'ok' : 'dim');
                }
                out.textContent = txt;
            }
        }
    } catch (e) {
        out.textContent = `error: ${e.message}`;
    }
    btn.disabled = false;
}

function hasMempoolPage(s) {
    return (s.toLowerCase().startsWith('bc1') && s.length >= 42) ||
           ((s[0] === '1' || s[0] === '3') && s.length >= 26 && s.length <= 35);
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
let history = JSON.parse(localStorage.getItem('btc_hist_test') || '[]');

function renderHistory() {
    const box  = document.getElementById('histBox');
    const list = document.getElementById('histList');
    if (!history.length) { box.style.display = 'none'; return; }
    box.style.display = '';
    list.innerHTML = '';
    history.forEach(item => {
        const row = document.createElement('div');
        row.className = 'hist-row';
        row.innerHTML = `<span class="hist-addr">${esc(item.input)}</span>`
            + `<span class="hist-badge ${item.found?'badge-f':'badge-m'}">${item.found?'✓ found':'— miss'}</span>`
            + (hasMempoolPage(item.input) ? `<a class="hist-link" href="https://mempool.space/address/${encodeURIComponent(item.input)}" target="_blank" onclick="event.stopPropagation()">mempool↗</a>` : '');
        row.addEventListener('click', () => { document.getElementById('valInput').value = item.input; verifyInput(); });
        list.appendChild(row);
    });
}

function addHistory(input, found) {
    history = history.filter(h => h.input !== input);
    history.unshift({ input, found });
    if (history.length > 10) history.pop();
    localStorage.setItem('btc_hist_test', JSON.stringify(history));
    renderHistory();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('valInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); verifyInput(); }
});

window.addEventListener('DOMContentLoaded', async () => {
    renderHistory();
    const p = new URLSearchParams(window.location.search);
    const q = p.get('address') || p.get('q') || p.get('hex') || p.get('pubkey');

    await refreshIDBState();

    // restore last active filter from localStorage
    const lastMB = parseInt(localStorage.getItem('btc_active_filter') || '0');
    if (lastMB) {
        const cached = await idbLoad(lastMB);
        if (cached) {
            activateFilter(cached.sizeMB, cached.bitsExp, cached.buffer);
            log(`restored ${cached.sizeMB}MB from IndexedDB`, 'ok');
        } else {
            log('ready', 'dim');
        }
    } else {
        log('ready', 'dim');
    }

    if (q) { document.getElementById('valInput').value = q; verifyInput(); }
});
