<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Slot Machine</title>
    <script src="assets/crypto-js.min.js"></script>
    <script src="assets/elliptic.min.js"></script>
    <script src="assets/bip39-wordlist.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            background: #fff;
            color: #111;
            padding: 12px;
            max-width: 640px;
            margin: 0 auto;
        }

        /* header */
        .hdr { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; }
        .hdr h1 { font-size: 16px; font-weight: 700; }
        .hdr a  { font-size: 12px; color: #666; text-decoration: none; }
        .hdr a:hover { text-decoration: underline; }

        hr { border: none; border-top: 1px solid #ddd; margin: 10px 0; }

        /* slots */
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }
        @media (max-width: 360px) {
            .slot-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .slot {
            border: 1px solid #ddd;
            padding: 4px 6px;
            font-family: monospace;
            font-size: 12px;
            min-height: 34px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .slot-idx { font-size: 10px; color: #bbb; line-height: 1; }
        .slot-word { color: #111; word-break: break-all; }

        @keyframes wordFlash {
            0%   { opacity: 0; }
            100% { opacity: 1; }
        }
        .slot.flash .slot-word {
            animation: wordFlash 150ms ease-out;
        }

        .spin-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        #btnSpin {
            padding: 7px 20px;
            border: 1px solid #bbb;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        #btnSpin:hover { background: #e8e8e8; }
        #btnSpin:disabled { opacity: .5; cursor: not-allowed; }

        #btnCopy {
            padding: 5px 10px;
            border: 1px solid #ccc;
            background: #fafafa;
            cursor: pointer;
            font-size: 12px;
            font-family: monospace;
            display: none;
            white-space: nowrap;
        }
        #btnCopy:hover { background: #f0f0f0; }
        #btnCopy.copied { border-color: #2a9a2a; color: #1a7a1a; }

        #statusLine {
            font-family: monospace;
            font-size: 11px;
            color: #666;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* results */
        #resultsBox {
            font-size: 12px;
            border: 1px solid #ddd;
            padding: 6px 8px;
            margin-bottom: 8px;
            min-height: 32px;
        }
        #resultsBox.found-confirmed   { border-color: #2a9a2a; background: #f2fff2; }
        #resultsBox.found-unconfirmed { border-color: #b8860b; background: #fffbe6; }
        #resultsBox.none { border-color: #bbb; background: #fafafa; }
        .res-summary { font-family: monospace; font-size: 12px; color: #555; margin-bottom: 4px; }
        .res-item {
            display: flex; align-items: baseline; gap: 6px;
            padding: 3px 0; border-bottom: 1px solid #f0f0f0;
            flex-wrap: wrap;
        }
        .res-item:last-child { border-bottom: none; }
        .res-type  { font-size: 10px; color: #888; white-space: nowrap; font-family: monospace; }
        .res-addr  { font-family: monospace; font-size: 11px; color: #1a7a1a; font-weight: 700; flex: 1; min-width: 0; word-break: break-all; }
        .res-link  { font-size: 11px; color: #888; text-decoration: none; flex-shrink: 0; }
        .res-link:hover { color: #333; text-decoration: underline; }
        .res-toggle { font-size: 11px; color: #888; cursor: pointer; font-family: monospace; }
        .res-toggle:hover { color: #333; text-decoration: underline; }
        .res-server { font-size: 10px; font-family: monospace; white-space: nowrap; }
        .res-server.confirmed { color: #1a7a1a; }
        .res-server.unconfirmed { color: #b8860b; }
        .res-server.error { color: #c33; }

        /* filter */
        .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
        .filter-lbl { font-size: 12px; color: #666; white-space: nowrap; }
        .cf-btn {
            padding: 4px 9px; border: 1px solid #ccc; background: #fafafa;
            cursor: pointer; font-size: 12px; font-family: monospace;
        }
        .cf-btn:hover { border-color: #888; background: #f0f0f0; }
        .cf-btn.loading { border-color: #888; background: #eee; opacity: .7; }
        .cf-btn.idb     { border-color: #888; border-style: dashed; }
        .cf-btn.loaded  { border-color: #2a9a2a; background: #f2fff2; color: #1a7a1a; font-weight: 700; border-style: solid; }
        .idb-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 4px; margin-bottom: 2px; }
        .del-btn { font-size: 11px; font-family: monospace; color: #c33; cursor: pointer; background: none; border: 1px solid #f0c0c0; padding: 2px 7px; }
        .del-btn:hover { background: #fff0f0; }

        .prog-wrap { margin-bottom: 6px; }
        .prog-bar { height: 4px; background: #eee; border: 1px solid #ddd; margin-bottom: 3px; }
        .prog-fill { height: 100%; background: #555; width: 0%; transition: width .2s linear; }
        .prog-txt { font-size: 11px; color: #666; font-family: monospace; display: flex; justify-content: space-between; }
        .prog-cancel { background: none; border: none; font-size: 11px; color: #c33; cursor: pointer; padding: 0; }

        /* log */
        .log-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .log-lbl  { font-size: 12px; color: #666; }
        .log-clr  { font-size: 11px; color: #888; cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; }
        .log-box  { font-family: monospace; font-size: 11px; line-height: 1.6; background: #fafafa; border: 1px solid #e8e8e8; padding: 6px 8px; height: 260px; overflow-y: auto; color: #444; }
        .l-ok   { color: #1a7a1a; }
        .l-err  { color: #c33; }
        .l-dim  { color: #888; }
        .l-hi   { color: #555; }
        .l-data { color: #111; }
        .l-spd  { color: #335599; }

        .sec-lbl { font-size: 12px; color: #666; margin-bottom: 4px; }

        /* autospin */
        .auto-label { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #444; cursor: pointer; white-space: nowrap; user-select: none; }
        .auto-label input { cursor: pointer; }
        #autoStatsRow { font-family: monospace; font-size: 11px; color: #666; margin-bottom: 6px; display: none; }
        #autoStats .stat-sep { color: #ccc; margin: 0 4px; }
        #autoStats .stat-match { color: #1a7a1a; }

        /* no-filter warning */
        #noFilterBanner {
            font-size: 12px;
            font-family: monospace;
            border: 1px solid #b8860b;
            background: #fffbe6;
            color: #7a5800;
            padding: 6px 8px;
            margin-bottom: 8px;
        }

        /* hits history */
        .hits-section { margin-top: 12px; }
        .hits-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .hits-lbl { font-size: 12px; color: #666; }
        .hits-clr { font-size: 11px; color: #888; cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; }
        .hits-entry {
            border: 1px solid #c8e8c8;
            background: #f6fff6;
            padding: 6px 8px;
            margin-bottom: 5px;
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
        }
        .hits-entry:hover { background: #eaffea; border-color: #5cb85c; }
        .hits-entry-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
        .hits-entry-ts { font-size: 10px; color: #bbb; }
        .hits-entry-words { color: #555; word-break: break-word; margin-bottom: 4px; }
        .hits-entry-words a { color: #888; text-decoration: none; }
        .hits-entry-words a:hover { text-decoration: underline; }
        .hits-entry-addr { color: #1a7a1a; font-weight: 700; }
        .hits-entry-addr a { color: #888; text-decoration: none; margin-left: 6px; font-weight: 400; }
        .hits-entry-addr a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="hdr">
    <h1>BTC Slot Machine</h1>
    <a href="test.html">Filter Test &#8599;</a>
</div>

<!-- Slot grid -->
<div class="slot-grid" id="slotGrid">
    <!-- 12 slots generated by JS -->
</div>

<div class="spin-row">
    <button id="btnSpin" onclick="doSpin()">SPIN</button>
    <label class="auto-label"><input type="checkbox" id="chkAuto" onchange="onAutoChange()"> auto</label>
    <button id="btnCopy" onclick="copyWords()">copy</button>
    <span id="statusLine">No filter loaded — load one below or spin to auto-download the 512M filter.</span>
</div>
<div id="autoStatsRow"><span id="autoStats"></span></div>

<div id="noFilterBanner">No filter loaded. Spinning will auto-download the 512M filter (~512 MB). Server confirmations always use 16G.</div>
<div id="resultsBox" style="display:none"></div>

<hr>

<div class="filter-row">
    <span class="filter-lbl">Local Filter:</span>
    <button class="cf-btn" data-mb="512"   data-bits="32" onclick="filterClick(512,32)">512M</button>
</div>

<div class="idb-row" id="idbRow" style="display:none">
    <span class="filter-lbl">Delete locally:</span>
    <span id="idbDelList"></span>
</div>

<div class="prog-wrap" id="cfProgress" style="display:none">
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-txt">
        <span id="progText">0%</span>
        <button class="prog-cancel" onclick="cancelLoad()">cancel</button>
    </div>
</div>

<hr>

<div class="log-hdr">
    <span class="log-lbl">Log</span>
    <button class="log-clr" onclick="clearLog()">clear</button>
</div>
<div class="log-box" id="logConsole"></div>

<div class="hits-section" id="hitsSection" style="display:none">
    <hr>
    <div class="hits-hdr">
        <span class="hits-lbl">Recent Hits</span>
        <button class="hits-clr" onclick="clearHits()">clear</button>
        <a href="#" onclick="event.preventDefault();doSpin(Array(11).fill('abandon').concat(['about']),{serverOnly:true})" class="hits-clr" title="11× abandon + about — known funded test mnemonic, checks server directly">test</a>
    </div>
    <div id="hitsList"></div>
</div>

<script>
'use strict';

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtMB(b) { return (b/1048576).toFixed(1)+' MB'; }
function fmtFilterMB(mb) { return mb >= 1024 ? (mb/1024)+'G' : mb+'M'; }
function fmtFilterName(filename) {
    // e.g. "2048mb.bin" → "2G", "512mb.bin" → "512M"
    const m = String(filename).match(/^(\d+)mb\.bin$/i);
    return m ? fmtFilterMB(parseInt(m[1])) : filename;
}
function bytesToHex(b) { return Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join(''); }
function hexToBytes(h) { return new Uint8Array(h.match(/.{2}/g).map(x=>parseInt(x,16))); }

// ── LOG ───────────────────────────────────────────────────────────────────────
const LOG_START = performance.now();
function log(msg, type) {
    type = type || '';
    const t = ((performance.now()-LOG_START)/1000).toFixed(2);
    const el = document.getElementById('logConsole');
    const row = document.createElement('div');
    row.innerHTML = '<span class="l-dim">[' + t + ']</span> <span class="' + (type ? 'l-'+type : '') + '">' + esc(msg) + '</span>';
    el.appendChild(row);
    el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('logConsole').innerHTML=''; log('cleared','dim'); }

// ── FNV-1a 64-bit ─────────────────────────────────────────────────────────────
const FNV_PRIME  = 0x00000100000001B3n;
const FNV_OFFSET = 0xCBF29CE484222325n;
const MASK64     = (1n << 64n) - 1n;

function fnv1a(key) {
    // accepts 40-char (20-byte Hash160) or 64-char (32-byte) hex; zero-pads to 64
    const k = key.padEnd(64, '0');
    let h = FNV_OFFSET;
    for (let i = 0; i < 64; i += 2)
        h = ((h ^ BigInt(parseInt(k.substring(i,i+2),16))) * FNV_PRIME) & MASK64;
    return h;
}

// Compute server-side bloom filter position for 16G filter (bitsExp=37).
// Returns [row, col] — PHP does fseek(row*8) and checks bit col, no GMP needed.
const SERVER_MASK = (1n << 37n) - 1n;
function serverPos(key) {
    const trunc = fnv1a(key) & SERVER_MASK;
    return [Number(trunc >> 6n), Number(trunc & 63n)];
}

// Balance filter position (16G bal filter, bitsExp=37).
const BAL_MASK = (1n << 37n) - 1n;
function balPos(key) {
    const trunc = fnv1a(key) & BAL_MASK;
    return [Number(trunc >> 6n), Number(trunc & 63n)];
}

function isValidFilterKey(key) {
    return typeof key === 'string' && /^(?:[0-9a-f]{40}|[0-9a-f]{64})$/.test(key.toLowerCase());
}

// Check balance filter for items that passed server filter (sets item.balFound).
async function checkBalanceFilter(items) {
    if (!items.length) return;
    const validItems = [];
    for (let i = 0; i < items.length; i++) {
        const fk = String(items[i].filterKey || '').trim().toLowerCase();
        if (isValidFilterKey(fk)) {
            items[i].filterKey = fk;
            validItems.push(items[i]);
        } else {
            items[i].balFound = null;
        }
    }
    if (!validItems.length) return;
    try {
        const resp = await fetch('index_bal.php', { method: 'POST', body: packLookups(validItems.map(function(f) { return balPos(f.filterKey); })) });
        const buf  = new Uint32Array(await resp.arrayBuffer());
        for (let i = 0; i < validItems.length; i++) validItems[i].balFound = readBit(buf, i) === 1;
    } catch(e) { log('balance filter error: ' + e.message, 'err'); }
}

// Pack [[row,col],...] into a binary buffer: 5 bytes per lookup (uint32 LE row + uint8 col).
function packLookups(positions) {
    const buf  = new ArrayBuffer(positions.length * 5);
    const view = new DataView(buf);
    for (let i = 0; i < positions.length; i++) {
        view.setUint32(i * 5,     positions[i][0], true);
        view.setUint8 (i * 5 + 4, positions[i][1]);
    }
    return buf;
}

// Read bitmask result: bit i of 8-byte Uint32Array [lo, hi].
function readBit(buf, i) { return i < 32 ? (buf[0] >> i) & 1 : (buf[1] >> (i - 32)) & 1; }

// ── INDEXEDDB CACHE ───────────────────────────────────────────────────────────
function openDB() {
    return new Promise(function(res, rej) {
        const req = indexedDB.open('btc_filter_cache', 1);
        req.onupgradeneeded = function(e) { e.target.result.createObjectStore('filter'); };
        req.onsuccess = function(e) { res(e.target.result); };
        req.onerror   = function(e) { rej(e.target.error); };
    });
}
async function idbSave(sizeMB, bitsExp, buffer) {
    try {
        const db = await openDB();
        const tx = db.transaction('filter', 'readwrite');
        tx.objectStore('filter').put({ sizeMB, bitsExp, buffer }, sizeMB);
        await new Promise(function(res, rej) { tx.oncomplete = res; tx.onerror = rej; });
        log('saved ' + sizeMB + 'MB to IndexedDB', 'dim');
    } catch(e) { log('IDB write error: ' + e.message, 'dim'); }
}
async function idbLoad(sizeMB) {
    try {
        const db  = await openDB();
        const tx  = db.transaction('filter', 'readonly');
        const req = tx.objectStore('filter').get(sizeMB);
        return await new Promise(function(res, rej) { req.onsuccess = function() { res(req.result||null); }; req.onerror = rej; });
    } catch(e) { return null; }
}
async function idbDelete(sizeMB) {
    try {
        const db = await openDB();
        const tx = db.transaction('filter', 'readwrite');
        tx.objectStore('filter').delete(sizeMB);
        await new Promise(function(res, rej) { tx.oncomplete = res; tx.onerror = rej; });
    } catch(e) {}
}
async function idbKeys() {
    try {
        const db  = await openDB();
        const tx  = db.transaction('filter', 'readonly');
        const req = tx.objectStore('filter').getAllKeys();
        return await new Promise(function(res, rej) { req.onsuccess = function() { res(req.result||[]); }; req.onerror = rej; });
    } catch(e) { return []; }
}

async function refreshIDBState() {
    const keys = await idbKeys();
    document.querySelectorAll('.cf-btn').forEach(function(b) {
        const mb = parseInt(b.dataset.mb);
        if (b.classList.contains('loaded')) return;
        b.classList.toggle('idb', keys.includes(mb));
    });
    const delRow  = document.getElementById('idbRow');
    const delList = document.getElementById('idbDelList');
    if (!keys.length) { delRow.style.display = 'none'; return; }
    delRow.style.display = '';
    delList.innerHTML = '';
    const labels = { 512:'512M' };
    keys.sort(function(a,b){return a-b;}).forEach(function(mb) {
        const btn = document.createElement('button');
        btn.className = 'del-btn';
        btn.textContent = (labels[mb] || mb+'M') + ' \xd7';
        btn.onclick = async function() {
            await idbDelete(mb);
            if (cf.sizeMB === mb) deactivateFilter();
            const b2 = document.querySelector('.cf-btn[data-mb="' + mb + '"]');
            if (b2) b2.classList.remove('idb','loaded');
            log('deleted ' + mb + 'MB from IndexedDB', 'dim');
            refreshIDBState();
        };
        delList.appendChild(btn);
    });
}

// ── CLIENT FILTER ─────────────────────────────────────────────────────────────
const cf = { buffer: null, view: null, sizeMB: null, bitsExp: null, abort: null };

function clientLookup(filterKey) {
    if (!cf.view) return null;
    const t0    = performance.now();
    const fullH = fnv1a(filterKey);
    const trunc = fullH & ((1n << BigInt(cf.bitsExp)) - 1n);
    const row   = Number(trunc >> 6n);
    const col   = Number(trunc & 63n);
    const lo    = cf.view.getUint32(row*8,   true);
    const hi    = cf.view.getUint32(row*8+4, true);
    const chunk = BigInt(lo) | (BigInt(hi) << 32n);
    const found = (chunk & (1n << BigInt(col))) !== 0n;
    return { found, ms: (performance.now()-t0).toFixed(4) };
}

function activateFilter(sizeMB, bitsExp, buffer) {
    cf.buffer  = buffer;
    cf.view    = new DataView(buffer);
    cf.sizeMB  = sizeMB;
    cf.bitsExp = bitsExp;
    document.querySelectorAll('.cf-btn').forEach(function(b) {
        if (b.classList.contains('loaded')) {
            b.classList.remove('loaded');
            idbKeys().then(function(keys) { if (keys.includes(parseInt(b.dataset.mb))) b.classList.add('idb'); });
        }
    });
    const activeBtn = document.querySelector('.cf-btn[data-mb="' + sizeMB + '"]');
    if (activeBtn) activeBtn.classList.add('loaded');
    localStorage.setItem('btc_active_filter', sizeMB);
    document.getElementById('noFilterBanner').style.display = 'none';
}

function deactivateFilter() {
    const mb = cf.sizeMB;
    cf.buffer = cf.view = cf.sizeMB = cf.bitsExp = null;
    refreshIDBState();
    localStorage.removeItem('btc_active_filter');
    document.getElementById('noFilterBanner').style.display = '';
    if (mb) log(mb + 'MB deactivated', 'dim');
}

async function filterClick(sizeMB, bitsExp) {
    if (sizeMB !== 512) return;
    if (cf.sizeMB === sizeMB) { deactivateFilter(); return; }
    if (cf.abort) { cf.abort.abort(); cf.abort = null; showProgress(false); }
    const cached = await idbLoad(sizeMB);
    if (cached) {
        activateFilter(sizeMB, bitsExp, cached.buffer);
        log('loaded ' + sizeMB + 'MB from IndexedDB', 'ok');
        return;
    }
    const btn = document.querySelector('.cf-btn[data-mb="' + sizeMB + '"]');
    if (btn) { btn.classList.remove('idb','loaded'); btn.classList.add('loading'); }
    showProgress(true, 0, sizeMB*1048576, 0);
    cf.abort = new AbortController();
    const t0 = performance.now();
    log('downloading ' + sizeMB + 'mb.bin', 'hi');
    try {
        const resp = await fetch('filter/' + sizeMB + 'mb.bin', { signal: cf.abort.signal });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const reader     = resp.body.getReader();
        const totalBytes = sizeMB * 1048576;
        const chunks     = [];
        let received = 0, lastSpeedRec = 0, lastSpeedT = t0, speed = 0;
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            const now = performance.now();
            const dT  = (now - lastSpeedT) / 1000;
            if (dT > 0.15) { speed = (received-lastSpeedRec)/dT/1048576; lastSpeedRec=received; lastSpeedT=now; }
            showProgress(true, received, totalBytes, speed);
        }
        const dlSec  = ((performance.now()-t0)/1000).toFixed(2);
        const avgSpd = (received/1048576/parseFloat(dlSec)).toFixed(1);
        log('done ' + dlSec + 's \xb7 ' + avgSpd + ' MB/s', 'ok');
        const buf = new Uint8Array(received);
        let pos = 0;
        for (const c of chunks) { buf.set(c, pos); pos += c.length; }
        activateFilter(sizeMB, bitsExp, buf.buffer);
        showProgress(false);
        await idbSave(sizeMB, bitsExp, cf.buffer);
        refreshIDBState();
    } catch (err) {
        showProgress(false);
        if (btn) { btn.classList.remove('loading'); }
        log(err.name==='AbortError' ? 'cancelled' : 'error: ' + err.message, err.name==='AbortError' ? 'dim' : 'err');
    }
    cf.abort = null;
}

function cancelLoad() {
    if (cf.abort) cf.abort.abort();
    showProgress(false);
}

function showProgress(show, received, total, speed) {
    received = received || 0;
    total = total || 0;
    speed = speed || 0;
    document.getElementById('cfProgress').style.display = show ? '' : 'none';
    if (show && total > 0) {
        const pct = ((received/total)*100).toFixed(1);
        document.getElementById('progFill').style.width = pct + '%';
        const spd = speed > 0 ? ' \xb7 ' + speed.toFixed(1) + ' MB/s' : '';
        document.getElementById('progText').textContent = pct + '%  ' + fmtMB(received) + ' / ' + fmtMB(total) + spd;
    }
}

// ── CRYPTO ────────────────────────────────────────────────────────────────────
const N_SECP256K1 = 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n;
const EC = new elliptic.ec('secp256k1');

function privToPub(privBytes) {
    return new Uint8Array(EC.keyFromPrivate(privBytes).getPublic(true,'array'));
}

function generateMnemonic() {
    const ent = crypto.getRandomValues(new Uint8Array(16));
    const hashHex = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(bytesToHex(ent))).toString();
    const cs = parseInt(hashHex.slice(0,2), 16) >> 4; // 4 bits checksum
    let bits = Array.from(ent).map(function(b){ return b.toString(2).padStart(8,'0'); }).join('') + cs.toString(2).padStart(4,'0');
    return Array.from({length:12}, function(_,i) { return BIP39_WORDLIST[parseInt(bits.slice(i*11,(i+1)*11),2)]; });
}

async function mnemonicToSeed(words) {
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(words.join(' ')), 'PBKDF2', false, ['deriveBits']);
    return new Uint8Array(await crypto.subtle.deriveBits(
        {name:'PBKDF2', hash:'SHA-512', salt:enc.encode('mnemonic'), iterations:2048}, km, 512));
}

async function hmac512(key, data) {
    const k = await crypto.subtle.importKey('raw', key, {name:'HMAC',hash:'SHA-512'}, false, ['sign']);
    return new Uint8Array(await crypto.subtle.sign('HMAC', k, data));
}

async function masterFromSeed(seed) {
    const I = await hmac512(new TextEncoder().encode('Bitcoin seed'), seed);
    return {key: I.slice(0,32), chain: I.slice(32)};
}

async function childKey(parent, index, hardened) {
    const idx = hardened ? (index | 0x80000000) >>> 0 : index;
    const idxBuf = new Uint8Array(4);
    new DataView(idxBuf.buffer).setUint32(0, idx, false);
    const pub = privToPub(parent.key);
    const data = hardened
        ? new Uint8Array([0x00].concat(Array.from(parent.key)).concat(Array.from(idxBuf)))
        : new Uint8Array(Array.from(pub).concat(Array.from(idxBuf)));
    const I = await hmac512(parent.chain, data);
    const childKeyBn = (BigInt('0x'+bytesToHex(I.slice(0,32))) + BigInt('0x'+bytesToHex(parent.key))) % N_SECP256K1;
    return {key: hexToBytes(childKeyBn.toString(16).padStart(64,'0')), chain: I.slice(32)};
}

async function derivePath(seed, path) {
    let node = await masterFromSeed(seed);
    const parts = path.split('/').slice(1);
    for (let i = 0; i < parts.length; i++) {
        const p = parts[i];
        const h = p.endsWith("'");
        node = await childKey(node, parseInt(p), h);
    }
    return node;
}

// ── HASH160 / ADDRESSES ───────────────────────────────────────────────────────
function hash160(bytes) {
    const hex = bytesToHex(bytes);
    const wa = CryptoJS.enc.Hex.parse(hex);
    return hexToBytes(CryptoJS.RIPEMD160(CryptoJS.SHA256(wa)).toString());
}

const B58 = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
function base58Encode(bytes) {
    if (!bytes.length) return '';
    let n = BigInt('0x'+bytesToHex(bytes));
    let r = '';
    while (n > 0n) { r = B58[Number(n%58n)] + r; n /= 58n; }
    for (let i = 0; i < bytes.length; i++) { if (bytes[i]!==0) break; r = '1'+r; }
    return r;
}
function base58Check(payload) {
    const p = new Uint8Array(payload);
    const hex = bytesToHex(p);
    const wa = CryptoJS.enc.Hex.parse(hex);
    const chk = CryptoJS.SHA256(CryptoJS.SHA256(wa)).toString().slice(0,8);
    return base58Encode(new Uint8Array(Array.from(p).concat(Array.from(hexToBytes(chk)))));
}

const B32_CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
const B32_GEN = [0x3b6a57b2,0x26508e6d,0x1ea119fa,0x3d4233dd,0x2a1462b3];
function b32Polymod(v){let c=1;for(let i=0;i<v.length;i++){const d=v[i];const t=c>>25;c=((c&0x1ffffff)<<5)^d;for(let j=0;j<5;j++)if((t>>j)&1)c^=B32_GEN[j];}return c;}
function b32HrpExpand(h){const r=[];for(let i=0;i<h.length;i++)r.push(h.charCodeAt(i)>>5);r.push(0);for(let i=0;i<h.length;i++)r.push(h.charCodeAt(i)&31);return r;}
function b32Checksum(hrp,data){const v=b32HrpExpand(hrp).concat(data).concat([0,0,0,0,0,0]);const pm=b32Polymod(v)^1;return Array.from({length:6},function(_,i){return (pm>>(5*(5-i)))&31;});}
function convertBits(data,from,to,pad){if(pad===undefined)pad=true;let acc=0,bits=0;const r=[],maxv=(1<<to)-1;for(let i=0;i<data.length;i++){const v=data[i];acc=(acc<<from)|v;bits+=from;while(bits>=to){bits-=to;r.push((acc>>bits)&maxv);}}if(pad&&bits>0)r.push((acc<<(to-bits))&maxv);return r;}
function bech32P2wpkh(h160){const prog=[0].concat(convertBits(Array.from(h160),8,5));const cs=b32Checksum('bc',prog);return 'bc1'+prog.concat(cs).map(function(d){return B32_CHARSET[d];}).join('');}

// Taproot: compute tweaked output key (BIP341 keypath, no scripts)
function taprootOutputKey(pub33) {
    const xOnly = pub33.slice(1, 33);
    const tagH  = CryptoJS.SHA256(CryptoJS.enc.Utf8.parse('TapTweak')).toString();
    const twkH  = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(tagH + tagH + bytesToHex(xOnly))).toString();
    const P = EC.keyFromPublic(pub33).getPublic();
    const T = EC.keyFromPrivate(hexToBytes(twkH)).getPublic();
    const Q = P.add(T);
    return new Uint8Array(Q.getX().toArrayLike(Uint8Array, 'be', 32));
}
function bech32mP2tr(xOnly32) {
    const prog = [1].concat(convertBits(Array.from(xOnly32), 8, 5));
    const v    = b32HrpExpand('bc').concat(prog).concat([0,0,0,0,0,0]);
    const pm   = b32Polymod(v) ^ 0x2bc830a3;
    const cs   = Array.from({length:6}, function(_,i){ return (pm >> (5*(5-i))) & 31; });
    return 'bc1' + prog.concat(cs).map(function(d){ return B32_CHARSET[d]; }).join('');
}
function addrP2TR(privKey) {
    const pub   = privToPub(privKey);
    const xOnly = taprootOutputKey(pub);
    const fk    = bytesToHex(xOnly);
    return { addr: bech32mP2tr(xOnly), h160: null, filterKey: fk };
}

function addrP2PKH(privKey)      { const h=hash160(privToPub(privKey)); const h160=bytesToHex(h); return {addr:base58Check([0x00].concat(Array.from(h))), h160, filterKey:h160}; }
function addrP2WPKH(privKey)     { const h=hash160(privToPub(privKey)); const h160=bytesToHex(h); return {addr:bech32P2wpkh(h), h160, filterKey:h160}; }
function addrP2SHP2WPKH(privKey) { const h=hash160(privToPub(privKey)); const rs=new Uint8Array([0x00,0x14].concat(Array.from(h))); const sh=hash160(rs); const shHex=bytesToHex(sh); return {addr:base58Check([0x05].concat(Array.from(sh))), h160:shHex, filterKey:shHex}; }

// ── URL ENCODING ──────────────────────────────────────────────────────────────
// 12 words × 11 bits = 132 bits = 17 bytes → ~23 chars base64url
function wordsToUrlParam(words) {
    const bytes = new Uint8Array(17);
    let bitPos = 0;
    for (let wi = 0; wi < words.length; wi++) {
        const idx = BIP39_WORDLIST.indexOf(words[wi]);
        for (let b = 10; b >= 0; b--) {
            if ((idx >> b) & 1) {
                bytes[Math.floor(bitPos / 8)] |= (1 << (7 - (bitPos % 8)));
            }
            bitPos++;
        }
    }
    return btoa(String.fromCharCode.apply(null, bytes))
        .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

function urlParamToWords(param) {
    const b64 = param.replace(/-/g,'+').replace(/_/g,'/');
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const words = [];
    let bitPos = 0;
    for (let wi = 0; wi < 12; wi++) {
        let idx = 0;
        for (let b = 10; b >= 0; b--) {
            if ((bytes[Math.floor(bitPos / 8)] >> (7 - (bitPos % 8))) & 1) idx |= (1 << b);
            bitPos++;
        }
        const word = BIP39_WORDLIST[idx];
        if (!word) return null;
        words.push(word);
    }
    return words;
}

const HITS_KEY = 'btc_hits_history';
const MAX_HITS = 50;

function saveHitToHistory(words, found) {
    const hist = JSON.parse(localStorage.getItem(HITS_KEY) || '[]');
    hist.unshift({
        ts: Date.now(),
        words: words,
        found: found.map(function(f) { return { type: f.type, addr: f.addr, filterKey: f.filterKey, serverFound: f.serverFound, balFound: f.balFound }; })
    });
    if (hist.length > MAX_HITS) hist.splice(MAX_HITS);
    localStorage.setItem(HITS_KEY, JSON.stringify(hist));
    renderHitsHistory();
}

function clearHits() {
    localStorage.removeItem(HITS_KEY);
    renderHitsHistory();
}

function loadHit(idx) {
    const hist = JSON.parse(localStorage.getItem(HITS_KEY) || '[]');
    const entry = hist[idx];
    if (!entry) return;
    doSpin(entry.words);
}

function renderHitsHistory() {
    const hist = JSON.parse(localStorage.getItem(HITS_KEY) || '[]');
    const section = document.getElementById('hitsSection');
    const list = document.getElementById('hitsList');
    if (!hist.length) { section.style.display = 'none'; return; }
    section.style.display = '';
    list.innerHTML = '';
    hist.forEach(function(entry, idx) {
        const div = document.createElement('div');
        div.className = 'hits-entry';
        div.style.cursor = 'pointer';
        const ts = new Date(entry.ts).toLocaleString();
        let addrHtml = '';
        entry.found.forEach(function(f) {
            const srv = f.serverFound === true ? ' <span style="color:#1a7a1a">\u2713srv</span>'
                      : f.serverFound === false ? ' <span style="color:#888">?srv</span>' : '';
            const bal = f.serverFound === true
                      ? (f.balFound === true ? ' <span style="color:#1a7a1a">\u2713btc</span>'
                      : f.balFound === false  ? ' <span style="color:#888">nobal</span>' : '') : '';
            const key32 = normalizeKey32Hex(f.filterKey || '');
            addrHtml += '<div class="hits-entry-addr" data-key32="' + esc(key32) + '" style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap">'
                + '<span>' + esc(f.type) + ' ' + esc(f.addr) + srv + bal + '</span>'
                + '<span class="res-bal" style="font-size:11px;font-family:monospace;white-space:nowrap;flex:1;color:#888"></span>'
                + '<a href="https://mempool.space/address/' + encodeURIComponent(f.addr) + '" target="_blank" onclick="event.stopPropagation()" class="res-link">mempool&#8599;</a>'
                + '</div>';
        });
        div.innerHTML = '<div class="hits-entry-top">'
            + '<span class="hits-entry-words">' + esc(entry.words.join(' ')) + '</span>'
            + '<span style="display:flex;align-items:baseline;gap:6px;margin-left:auto">'
            + '<button class="hits-clr" onclick="event.stopPropagation();checkBalancesIn(this,this.closest(\'.hits-entry\'))">bal</button>'
            + '<span class="hits-entry-ts">' + esc(ts) + '</span>'
            + '</span>'
            + '</div>'
            + addrHtml;
        div.addEventListener('click', function() { loadHit(idx); });
        list.appendChild(div);
    });
}

// ── AUTOSPIN ──────────────────────────────────────────────────────────────────
let autoSpinning     = false;
let totalSpins       = 0;
let totalAddresses   = 0;
let spinsAtLastMatch = 0;
let lastMatchTime    = null;
const pageStartTime  = Date.now();

// Pending local hits waiting for a batched server check
const FLUSH_INTERVAL_MS = 1000;
const FLUSH_BATCH_SIZE  = 20;
let pendingHits  = []; // { words, type, addr, h160 }
let lastFlushTime = Date.now();

async function flushPendingHits() {
    if (pendingHits.length === 0) return;
    const batch = pendingHits.splice(0);
    lastFlushTime = Date.now();

    // Deduplicate by h160, compute server bloom positions (client-side, no PHP GMP needed)
    const uniqueKeys = [];
    const seenKey = {};
    for (let i = 0; i < batch.length; i++) {
        const k = batch[i].filterKey;
        if (!seenKey[k]) { seenKey[k] = true; uniqueKeys.push(k); }
    }
    const lookups = uniqueKeys.map(serverPos); // [[row,col], ...]

    log('batch: checking ' + uniqueKeys.length + ' addr from ' + batch.length + ' local hits\u2026', 'dim');
    try {
        const t0   = performance.now();
        const resp = await fetch('index.php', { method: 'POST', body: packLookups(lookups) });
        const buf  = new Uint32Array(await resp.arrayBuffer()); // [lo, hi]
        const ms   = (performance.now() - t0).toFixed(1);

        // Build filterKey → bool map from positional bitmask
        const keyResult = {};
        for (let i = 0; i < uniqueKeys.length; i++) keyResult[uniqueKeys[i]] = readBit(buf, i) === 1;

        // Group confirmed items by mnemonic
        const byMnemonic = {};
        for (let i = 0; i < batch.length; i++) {
            const item = batch[i];
            if (keyResult[item.filterKey] === true) {
                const key = item.words.join(' ');
                if (!byMnemonic[key]) byMnemonic[key] = { words: item.words, found: [] };
                byMnemonic[key].found.push({ type: item.type, addr: item.addr, filterKey: item.filterKey, serverFound: true });
            }
        }

        const groups = Object.values(byMnemonic);
        if (groups.length > 0) {
            log('\u2713 SERVER CONFIRMED ' + groups.length + ' mnemonic(s) \xb7 ' + ms + 'ms', 'ok');
            // Balance filter check for all server-confirmed items
            const allConfirmed = groups.reduce(function(a, g) { return a.concat(g.found); }, []);
            await checkBalanceFilter(allConfirmed);
            const balHits = allConfirmed.filter(function(f) { return f.balFound; }).length;
            if (balHits) log('balance filter: ' + balHits + ' confirmed address(es) have unspent BTC', 'ok');
            for (let i = 0; i < groups.length; i++) {
                log('  ' + groups[i].words.join(' '), 'ok');
                saveHitToHistory(groups[i].words, groups[i].found);
                spinsAtLastMatch = totalSpins;
                lastMatchTime = Date.now();
                updateAutoStats();
            }
        } else {
            log('batch: ' + uniqueKeys.length + ' checked \xb7 ' + ms + 'ms \xb7 no hits', 'dim');
        }
    } catch(e) {
        log('batch server error: ' + e.message, 'err');
    }
}

function normalizeKey32Hex(filterKey) {
    const hex = String(filterKey || '').trim().toLowerCase();
    if (!/^[0-9a-f]+$/.test(hex)) return '';
    if (hex.length === 64) return hex;
    if (hex.length === 40) return hex + '000000000000000000000000';
    return '';
}

async function checkBalancesIn(btn, container) {
    btn.disabled = true;
    btn.textContent = '\u2026';
    const btc = function(sat) { return (sat / 1e8).toFixed(8) + '\xa0BTC'; };
    const rows = container.querySelectorAll('.res-item, .hits-entry-addr');
    for (let i = 0; i < rows.length; i++) {
        const addrEl = rows[i].querySelector('.res-addr') || rows[i].querySelector('span');
        const balEl  = rows[i].querySelector('.res-bal');
        if (!addrEl || !balEl) continue;
        // extract address: res-addr has just the address; hits-entry-addr span has "type addr ✓srv"
        const addrText = (addrEl.className === 'res-addr')
            ? addrEl.textContent.trim()
            : addrEl.textContent.trim().split(/\s+/)[1];
        if (!addrText) continue;
        const key32 = normalizeKey32Hex(rows[i].dataset.key32 || '');
        balEl.textContent = '\u2026';
        try {
            if (!key32) {
                balEl.style.color = '#888';
                balEl.textContent = 'no key32 (old entry)';
                continue;
            }
            const resp = await fetch('balance_lookup.php?key32=' + key32 + '&limit=1&_cb=' + Date.now());
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            if (!data || data.ok !== true) throw new Error((data && data.error) ? data.error : 'lookup failed');
            const totalSat = Number(data.total_sat || 0);
            const rowsCount = Number(data.count || 0);
            balEl.style.color = rowsCount > 0 ? '#1a7a1a' : '#888';
            balEl.textContent = rowsCount > 0
                ? ('utxo\xa0' + rowsCount + '\xa0·\xa0bal\xa0' + btc(totalSat))
                : 'no utxo';
        } catch(e) {
            balEl.style.color   = '#c00';
            balEl.textContent   = e.message;
        }
    }
    btn.textContent = 'bal';
    btn.disabled = false;
}

function updateAutoStats() {
    const now     = Date.now();
    const elapsed = (now - pageStartTime) / 1000;
    const spsAll  = elapsed > 0 ? (totalSpins / elapsed).toFixed(2) : '0.00';

    const apsAll = elapsed > 0 ? (totalAddresses / elapsed).toFixed(1) : '0.0';
    let html = totalSpins.toLocaleString() + ' spins'
        + '<span class="stat-sep">·</span>' + spsAll + '/s'
        + '<span class="stat-sep">·</span>' + totalAddresses.toLocaleString() + ' addr'
        + '<span class="stat-sep">·</span>' + apsAll + '/s';

    if (lastMatchTime !== null) {
        const sinceMatchSec   = (now - lastMatchTime) / 1000;
        const sinceMatchSpins = totalSpins - spinsAtLastMatch;
        const spsMatch        = sinceMatchSec > 0 ? (sinceMatchSpins / sinceMatchSec).toFixed(2) : '0.00';
        html += '<span class="stat-sep"> · </span>'
            + '<span class="stat-match">since last match: '
            + sinceMatchSpins.toLocaleString() + ' spins'
            + '<span class="stat-sep"> · </span>' + spsMatch + '/s'
            + '</span>';
    }

    document.getElementById('autoStats').innerHTML = html;
    document.getElementById('autoStatsRow').style.display = 'block';
}

function setAutoSpin(val) {
    autoSpinning = val;
    document.getElementById('chkAuto').checked = val;
}

async function onAutoChange() {
    if (!document.getElementById('chkAuto').checked) {
        autoSpinning = false;
        await flushPendingHits();
        return;
    }
    autoSpinning = true;
    lastFlushTime = Date.now();
    while (autoSpinning) {
        await doSpin();
        if (pendingHits.length >= FLUSH_BATCH_SIZE ||
            (pendingHits.length > 0 && Date.now() - lastFlushTime >= FLUSH_INTERVAL_MS)) {
            flushPendingHits(); // fire-and-forget — don't block spinning on HTTP round trip
        }
    }
    await flushPendingHits();
    document.getElementById('resultsBox').style.display = 'block';
    document.getElementById('btnCopy').style.display = '';
}

// ── SPIN ──────────────────────────────────────────────────────────────────────
async function doSpin(fixedWords, opts) {
    try { return await _doSpin(fixedWords, opts); }
    catch(e) { log('ERROR: ' + e.message + (e.stack ? '\n' + e.stack.split('\n')[1] : ''), 'err'); document.getElementById('btnSpin').disabled = false; return false; }
}
async function _doSpin(fixedWords, opts) {
    const serverOnly = !!(opts && opts.serverOnly);
    const isAuto = autoSpinning; // capture now — consistent for the whole spin
    const btn = document.getElementById('btnSpin');
    btn.disabled = true;
    if (!isAuto) document.getElementById('logConsole').innerHTML = '';
    document.getElementById('resultsBox').style.display = 'none';
    document.getElementById('btnCopy').style.display = 'none';

    // 1. Generate (or restore) mnemonic
    const words = fixedWords || generateMnemonic();
    currentWords = words;

    // 2. Update URL (skip during autospin — replaceState triggers favicon re-fetch every spin)
    if (!isAuto) history.replaceState(null, '', '?m=' + wordsToUrlParam(words));

    // 3. Display in slots with animation
    for (let i = 0; i < 12; i++) setSlotWord(i, words[i]);

    document.getElementById('statusLine').textContent = words.join(' ');
    if (!isAuto) log('mnemonic: ' + words.join(' '), 'hi');

    // 4. Derive seed (PBKDF2-HMAC-SHA512, 2048 iterations)
    const t0 = performance.now();
    const seed = await mnemonicToSeed(words);
    if (!isAuto) log('seed derived in ' + ((performance.now()-t0)/1000).toFixed(2) + 's', 'dim');

    // 5. Derive addresses for 3 paths x 20 indices = 60 total
    const pathDefs = [
        { path: "m/44'/0'/0'/0", type: 'P2PKH',       fn: addrP2PKH },
        { path: "m/49'/0'/0'/0", type: 'P2SH-P2WPKH', fn: addrP2SHP2WPKH },
        { path: "m/84'/0'/0'/0", type: 'P2WPKH',      fn: addrP2WPKH },
        { path: "m/86'/0'/0'/0", type: 'P2TR',         fn: addrP2TR },
    ];

    const found = [];
    let checked = 0, serverFilterLabel = null;
    const tAddr = performance.now();


    if (serverOnly) {
        // Skip local filter — derive all 60, check all against server directly
        if (!isAuto) log('server-only check (no local filter required)\u2026', 'dim');
        for (let pi = 0; pi < pathDefs.length; pi++) {
            const {path, type, fn} = pathDefs[pi];
            const acct = await derivePath(seed, path);
            for (let n = 0; n < 20; n++) {
                const child = await childKey(acct, n, false);
                const {addr, h160, filterKey} = fn(child.key);
                checked++;
                found.push({type, addr, h160, filterKey, serverFound: null});
            }
        }
        try {
            const t0s = performance.now();
            const resp = await fetch('index.php', { method: 'POST', body: packLookups(found.map(function(f) { return serverPos(f.filterKey); })) });
            const buf  = new Uint32Array(await resp.arrayBuffer());
            serverFilterLabel = '16G';
            for (let i = 0; i < found.length; i++) found[i].serverFound = readBit(buf, i) === 1;
            const hits = found.filter(function(f) { return f.serverFound; });
            if (!isAuto) log('server: ' + hits.length + ' confirmed / ' + found.length + ' checked \xb7 ' + (performance.now()-t0s).toFixed(1) + 'ms', hits.length ? 'ok' : 'data');
            if (hits.length > 0) {
                await checkBalanceFilter(hits);
                const balHits = hits.filter(function(f) { return f.balFound; }).length;
                if (!isAuto) log('balance filter: ' + balHits + '/' + hits.length + ' have unspent BTC', balHits ? 'ok' : 'data');
            }
            // keep only server hits in found for display
            found.splice(0, found.length, ...hits);
            if (hits.length > 0) saveHitToHistory(words, hits);
        } catch(e) { log('server error: ' + e.message, 'err'); }
    } else if (cf.view) {
        // Phase 1: check first 5 (P2PKH indices 0..4) — bail early if no hit
        const acct0 = await derivePath(seed, pathDefs[0].path);
        for (let n = 0; n < 5; n++) {
            const child = await childKey(acct0, n, false);
            const {addr, h160, filterKey} = pathDefs[0].fn(child.key);
            checked++;
            const res = clientLookup(filterKey);
            if (res && res.found) {
                found.push({type: pathDefs[0].type, addr, h160, filterKey, serverFound: null});
                if (!isAuto) log('HIT ' + pathDefs[0].type + ' [0/' + n + '] ' + addr, 'ok');
            }
        }

        if (found.length === 0) {
            if (!isAuto) log('checked ' + checked + ' \xb7 filter ' + cf.sizeMB + 'MB \xb7 no match', 'data');
            btn.disabled = false;
            totalSpins++;
            totalAddresses += checked;
            updateAutoStats();
            return false;
        }

        // Manual: quick server check on phase 1 hits — bail if not confirmed
        if (!isAuto) {
            try {
                const t0s = performance.now();
                const resp = await fetch('index.php', { method: 'POST', body: packLookups(found.map(function(f) { return serverPos(f.filterKey); })) });
                const buf  = new Uint32Array(await resp.arrayBuffer());
                serverFilterLabel = '16G';
                for (let i = 0; i < found.length; i++) found[i].serverFound = readBit(buf, i) === 1;
                log('quick server check \xb7 ' + (performance.now()-t0s).toFixed(1) + 'ms', 'dim');
            } catch(e) { log('server error: ' + e.message, 'err'); }
            if (!found.some(function(f) { return f.serverFound === true; })) {
                log('false positive \xb7 skipping remaining 55', 'dim');
                btn.disabled = false;
                totalSpins++;
                totalAddresses += checked;
                updateAutoStats();
                // fall through to show resultsBox with the unconfirmed hit
            } else {
                // Phase 2: check remaining 55 (P2PKH 5..19 + P2SH + P2WPKH)
                for (let n = 5; n < 20; n++) {
                    const child = await childKey(acct0, n, false);
                    const {addr, h160, filterKey} = pathDefs[0].fn(child.key);
                    checked++;
                    const res = clientLookup(filterKey);
                    if (res && res.found) {
                        found.push({type: pathDefs[0].type, addr, h160, filterKey, serverFound: null});
                        log('HIT ' + pathDefs[0].type + ' [0/' + n + '] ' + addr, 'ok');
                    }
                }
                for (let pi = 1; pi < pathDefs.length; pi++) {
                    const {path, type, fn} = pathDefs[pi];
                    const acct = await derivePath(seed, path);
                    for (let n = 0; n < 20; n++) {
                        const child = await childKey(acct, n, false);
                        const {addr, h160, filterKey} = fn(child.key);
                        checked++;
                        const res = clientLookup(filterKey);
                        if (res && res.found) {
                            found.push({type, addr, h160, filterKey, serverFound: null});
                            log('HIT ' + type + ' [' + pi + '/' + n + '] ' + addr, 'ok');
                        }
                    }
                }
                // Server check all found (phase 1 already checked, re-verify together)
                try {
                    const t0s = performance.now();
                    const resp = await fetch('index.php', { method: 'POST', body: packLookups(found.map(function(f) { return serverPos(f.filterKey); })) });
                    const buf  = new Uint32Array(await resp.arrayBuffer());
                    serverFilterLabel = '16G';
                    for (let i = 0; i < found.length; i++) {
                        found[i].serverFound = readBit(buf, i) === 1;
                        log('server ' + (found[i].serverFound ? 'CONFIRMED \u2713' : 'not confirmed') + ' ' + found[i].addr,
                            found[i].serverFound ? 'ok' : 'dim');
                    }
                    log('server checked ' + found.length + ' \xb7 16G \xb7 ' + (performance.now()-t0s).toFixed(1) + 'ms', 'dim');
                } catch(e) { log('server error: ' + e.message, 'err'); }
                const confirmed = found.filter(function(f) { return f.serverFound === true; });
                if (confirmed.length > 0) {
                    await checkBalanceFilter(confirmed);
                    const balHits = confirmed.filter(function(f) { return f.balFound; }).length;
                    log('balance filter: ' + balHits + '/' + confirmed.length + ' have unspent BTC', balHits ? 'ok' : 'data');
                    saveHitToHistory(words, confirmed);
                }
            }
        } else {
            // Autospin: phase 1 local hit → check remaining 55, push all to pendingHits
            for (let n = 5; n < 20; n++) {
                const child = await childKey(acct0, n, false);
                const {addr, h160, filterKey} = pathDefs[0].fn(child.key);
                checked++;
                const res = clientLookup(filterKey);
                if (res && res.found) found.push({type: pathDefs[0].type, addr, h160, filterKey, serverFound: null});
            }
            for (let pi = 1; pi < pathDefs.length; pi++) {
                const {path, type, fn} = pathDefs[pi];
                const acct = await derivePath(seed, path);
                for (let n = 0; n < 20; n++) {
                    const child = await childKey(acct, n, false);
                    const {addr, h160, filterKey} = fn(child.key);
                    checked++;
                    const res = clientLookup(filterKey);
                    if (res && res.found) found.push({type, addr, h160, filterKey, serverFound: null});
                }
            }
            for (let i = 0; i < found.length; i++)
                pendingHits.push({ words: words, type: found[i].type, addr: found[i].addr, h160: found[i].h160, filterKey: found[i].filterKey });
        }

        if (!isAuto) log('checked ' + checked + ' \xb7 filter ' + cf.sizeMB + 'MB \xb7 found ' + found.length, found.length ? 'ok' : 'data');
    } else {
        document.getElementById('statusLine').textContent = 'Downloading 512M filter\u2026';
        if (!isAuto) log('no filter loaded \u2014 auto-downloading 512M filter\u2026', 'dim');
        await filterClick(512, 32);
        if (cf.view) {
            if (!isAuto) log('filter ready \u2014 re-checking\u2026', 'dim');
            btn.disabled = false;
            return await doSpin(words);
        }
        checked = 0;
    }

    if (!isAuto) log('address derivation: ' + ((performance.now()-tAddr)/1000).toFixed(2) + 's', 'dim');

    // 7. Show results
    const box = document.getElementById('resultsBox');
    if (!isAuto) box.style.display = 'block';
    const anyConfirmed = found.some(function(f) { return f.serverFound === true; });
    box.className = found.length === 0 ? 'none' : anyConfirmed ? 'found-confirmed' : 'found-unconfirmed';

    const localLabel = cf.sizeMB ? fmtFilterMB(cf.sizeMB) : '?';
    const serverConfirmedCount = found.filter(function(f) { return f.serverFound === true; }).length;
    const balConfirmedCount    = found.filter(function(f) { return f.balFound === true; }).length;
    let summary = 'Checked ' + checked;
    if (found.length > 0) {
        summary += ' &middot; Local (' + localLabel + '): ' + found.length;
        if (serverFilterLabel !== null) {
            summary += ' &middot; Server (' + serverFilterLabel + '): ' + serverConfirmedCount;
            if (serverConfirmedCount > 0) summary += ' &middot; Has BTC: ' + balConfirmedCount;
        }
    } else {
        summary += ' &middot; Found: 0';
    }
    function resItemHtml(f) {
        const srvHtml = f.serverFound === true
            ? '<span class="res-server confirmed">\u2713 server</span>'
            : f.serverFound === false
            ? '<span class="res-server unconfirmed">server: not found</span>'
            : '';
        const balHtml = f.serverFound === true
            ? (f.balFound === true
                ? '<span class="res-server confirmed">\u2713 has BTC</span>'
                : f.balFound === false
                ? '<span class="res-server unconfirmed">no balance</span>'
                : '')
            : '';
        return '<div class="res-item" data-key32="' + esc(normalizeKey32Hex(f.filterKey || '')) + '">'
            + '<span class="res-type">' + esc(f.type) + '</span>'
            + '<span class="res-addr">' + esc(f.addr) + '</span>'
            + srvHtml
            + balHtml
            + '<span class="res-bal" style="font-size:11px;font-family:monospace;white-space:nowrap;flex:1"></span>'
            + '<a class="res-link" href="https://mempool.space/address/' + encodeURIComponent(f.addr) + '" target="_blank">mempool&#8599;</a>'
            + '</div>';
    }

    const confirmed = found.filter(function(f) { return f.serverFound === true; });
    const localOnly = found.filter(function(f) { return f.serverFound !== true; });

    let html = '<div class="res-summary" style="display:flex;align-items:baseline">'
        + '<span>' + summary + '</span>'
        + (confirmed.length > 0 ? '<button class="hits-clr" style="margin-left:auto" onclick="checkBalancesIn(this,document.getElementById(\'resultsBox\'))">bal</button>' : '')
        + '</div>';
    for (let i = 0; i < confirmed.length; i++) html += resItemHtml(confirmed[i]);

    if (localOnly.length > 0) {
        const localId = 'localMatches_' + Date.now();
        html += '<div style="margin-top:4px">'
            + '<span class="res-toggle" onclick="var el=document.getElementById(\'' + localId + '\');var t=document.getElementById(\'' + localId + '_t\');if(el.style.display===\'none\'){el.style.display=\'\';t.textContent=\'Hide local matches\';}else{el.style.display=\'none\';t.textContent=\'Show ' + localOnly.length + ' local-only match' + (localOnly.length > 1 ? 'es' : '') + '\';}"> '
            + '<span id="' + localId + '_t">Show ' + localOnly.length + ' local-only match' + (localOnly.length > 1 ? 'es' : '') + '</span>'
            + '</span></div>';
        html += '<div id="' + localId + '" style="display:none">';
        for (let i = 0; i < localOnly.length; i++) html += resItemHtml(localOnly[i]);
        html += '</div>';
    }

    box.innerHTML = html;

    document.getElementById('statusLine').textContent =
        'Checked ' + checked + ' \xb7 Found: ' + found.length + (found.length ? ' \u2014 see results below' : '');

    if (!isAuto) document.getElementById('btnCopy').style.display = '';
    btn.disabled = false;
    totalSpins++;
    totalAddresses += checked;
    updateAutoStats();
    return anyConfirmed;
} // end _doSpin

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async function() {
    buildGrid();
    await refreshIDBState();
    renderHitsHistory();

    const lastMB = parseInt(localStorage.getItem('btc_active_filter') || '0');
    if (lastMB === 512) {
        const cached = await idbLoad(lastMB);
        if (cached) {
            activateFilter(cached.sizeMB, cached.bitsExp, cached.buffer);
            log('restored ' + cached.sizeMB + 'MB filter from IndexedDB', 'ok');
        } else {
            log('ready \u2014 no filter loaded', 'dim');
        }
    } else {
        if (lastMB && lastMB !== 512) localStorage.removeItem('btc_active_filter');
        log('ready \u2014 no filter loaded', 'dim');
    }

    // If URL has a mnemonic, spin with it immediately (doSpin auto-downloads filter if needed)
    const urlParam = new URLSearchParams(window.location.search).get('m');
    if (urlParam) {
        try {
            const words = urlParamToWords(urlParam);
            if (words) doSpin(words);
        } catch(e) {
            log('could not decode URL mnemonic', 'err');
        }
    }
});
</script>
