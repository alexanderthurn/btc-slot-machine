<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Slot Machine</title>
    <script src="assets/crypto-js.min.js"></script>
    <script src="assets/elliptic.min.js"></script>
    <script src="assets/bip39-wordlist.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            background: #fff;
            color: #111;
            padding: 12px;
            max-width: 640px;
            margin: 0 auto;
        }

        /* header */
        .hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .hdr-left { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
        .hdr-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .hdr h1 { font-size: 16px; font-weight: 700; }
        .hdr a  { font-size: 12px; color: #666; text-decoration: none; }
        .hdr a:hover { text-decoration: underline; }
        .hdr-btn {
            padding: 4px 10px;
            border: 1px solid #ccc;
            background: #fafafa;
            cursor: pointer;
            font-size: 11px;
            font-family: monospace;
            color: #444;
        }
        .hdr-btn:hover { border-color: #888; background: #f0f0f0; }
        .hdr-btn.on {
            border-color: #6a8fc4;
            background: #eef4ff;
            font-weight: 600;
        }

        hr { border: none; border-top: 1px solid #ddd; margin: 10px 0; }

        /* slots */
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }
        @media (max-width: 360px) {
            .slot-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .slot {
            border: 1px solid #ddd;
            padding: 4px 6px;
            font-family: monospace;
            font-size: 12px;
            min-height: 34px;
            display: flex;
            flex-direction: column;
            gap: 1px;
            cursor: pointer;
            user-select: none;
        }
        .slot.locked { background: #fff6f6; }
        .slot-top {
            display: flex; align-items: center; justify-content: space-between; line-height: 1;
        }
        .slot-idx { font-size: 10px; color: #bbb; line-height: 1; }
        .slot-lock {
            border: none;
            background: transparent;
            color: #bbb;
            font-size: 10px;
            font-family: monospace;
            padding: 0;
            user-select: none;
        }
        .slot-lock.locked { color: #c33; font-weight: 700; }
        .slot-word {
            color: #111;
            word-break: break-all;
            cursor: default;
            border-radius: 2px;
            align-self: flex-start;
            display: inline-block;
            width: fit-content;
            max-width: 100%;
            box-sizing: border-box;
            user-select: text;
        }
        .slot-word:hover {
            cursor: pointer;
            text-decoration: underline;
            color: #0645ad;
        }

        .word-picker-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 12px;
            box-sizing: border-box;
        }
        .word-picker-overlay.open { display: flex; }
        .word-picker-dialog {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px 14px;
            max-width: 340px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .word-picker-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            font-size: 14px;
        }
        .word-picker-close {
            border: none;
            background: transparent;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            color: #888;
            padding: 0 4px;
        }
        .word-picker-close:hover { color: #111; }
        .word-picker-search {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ccc;
            font-family: monospace;
            font-size: 13px;
            box-sizing: border-box;
        }
        .word-picker-select {
            width: 100%;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid #ddd;
            padding: 4px;
            flex: 1;
            min-height: 200px;
            max-height: 40vh;
        }
        .word-picker-actions { display: flex; justify-content: flex-end; gap: 8px; }
        .word-picker-actions button {
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid #bbb;
            background: #f5f5f5;
        }
        .word-picker-actions button:hover { background: #eaeaea; }

        @keyframes wordFlash {
            0%   { opacity: 0; }
            100% { opacity: 1; }
        }
        .slot.flash .slot-word {
            animation: wordFlash 150ms ease-out;
        }

        .spin-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        #btnSpin {
            padding: 7px 20px;
            border: 1px solid #bbb;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        #btnSpin:hover { background: #e8e8e8; }
        #btnSpin:disabled { opacity: .5; cursor: not-allowed; }

        #btnCopy {
            padding: 5px 10px;
            border: 1px solid #ccc;
            background: #fafafa;
            cursor: pointer;
            font-size: 12px;
            font-family: monospace;
            display: none;
            white-space: nowrap;
        }
        #btnCopy:hover { background: #f0f0f0; }
        #btnCopy.copied { border-color: #2a9a2a; color: #1a7a1a; }

        .scan-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #444;
        }
        .scan-paths { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .scan-paths label { display: inline-flex; align-items: center; gap: 3px; cursor: pointer; }
        .scan-paths .path-type { font-family: monospace; font-size: 11px; color: #444; }
        .scan-idx { display: inline-flex; align-items: center; gap: 4px; }
        .scan-idx input {
            width: 56px;
            padding: 2px 4px;
            border: 1px solid #ccc;
            background: #fff;
            font-family: monospace;
            font-size: 11px;
        }
        .scan-block { margin-bottom: 8px; }
        .scan-space-box {
            margin-top: 8px;
            padding: 8px 10px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background: #f9f9fb;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 12px;
            line-height: 1.5;
            color: #333;
        }
        .scan-space-box .sse-line { margin: 0 0 6px 0; color: #333; }
        .scan-space-box .sse-num { font-family: monospace; font-size: 11px; word-break: break-all; color: #111; }
        .scan-space-box .sse-sub { font-size: 11px; color: #555; margin: 0 0 4px 0; }
        .scan-space-box .sse-analogy { font-size: 11px; color: #555; margin: 0 0 5px 0; padding-left: 0; }
        .scan-space-box .sse-section-title { font-weight: 600; font-size: 11px; color: #444; margin: 10px 0 6px 0; }
        .scan-space-box .sse-rate { font-size: 11px; color: #444; margin: 0 0 4px 0; font-family: monospace; }

        /* single-spin address table */
        .res-link  { font-size: 11px; color: #888; text-decoration: none; flex-shrink: 0; }
        .res-link:hover { color: #333; text-decoration: underline; }

        #singleSpinBox {
            font-size: 12px;
            border: 1px solid #ddd;
            padding: 6px 8px;
            margin-bottom: 8px;
            background: #fafafa;
            display: none;
        }
        .ss-summary { font-family: monospace; font-size: 11px; color: #555; margin-bottom: 6px; line-height: 1.45; }
        .ss-head { font-family: monospace; color: #555; margin-bottom: 6px; }
        .ss-row { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; border-bottom: 1px solid #f0f0f0; padding: 2px 0; }
        .ss-row:last-child { border-bottom: none; }
        .ss-tag { font-family: monospace; font-size: 10px; color: #888; min-width: 76px; }
        .ss-addr { font-family: monospace; font-size: 11px; flex: 1; min-width: 0; word-break: break-all; color: #111; text-decoration: none; }
        .ss-addr:hover { text-decoration: underline; color: #333; }
        .ss-money { font-family: monospace; font-size: 10px; white-space: nowrap; }
        .ss-money.yes { color: #1a7a1a; font-weight: 700; }
        .ss-money.no { color: #888; }
        .ss-mp { font-size: 10px; color: #888; text-decoration: none; white-space: nowrap; }
        .ss-mp:hover { color: #333; text-decoration: underline; }

        /* filter */
        .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
        .filter-lbl { font-size: 12px; color: #666; white-space: nowrap; }
        .cf-btn {
            padding: 4px 9px; border: 1px solid #ccc; background: #fafafa;
            cursor: pointer; font-size: 12px; font-family: monospace;
        }
        .cf-btn:hover { border-color: #888; background: #f0f0f0; }
        .cf-btn.loading { border-color: #888; background: #eee; opacity: .7; }
        .cf-btn.idb     { border-color: #888; border-style: dashed; }
        .cf-btn.loaded  { border-color: #2a9a2a; background: #f2fff2; color: #1a7a1a; font-weight: 700; border-style: solid; }
        .idb-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 4px; margin-bottom: 2px; }
        .del-btn { font-size: 11px; font-family: monospace; color: #c33; cursor: pointer; background: none; border: 1px solid #f0c0c0; padding: 2px 7px; }
        .del-btn:hover { background: #fff0f0; }

        .prog-wrap { margin-bottom: 0; margin-top: 6px; }
        .prog-bar { height: 6px; background: #dde8f8; border: 1px solid #b8c8e8; border-radius: 2px; margin-bottom: 4px; overflow: hidden; }
        .prog-fill { height: 100%; background: #3d6ab0; width: 0%; transition: width .2s linear; }
        .prog-txt { font-size: 11px; color: #345; font-family: monospace; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .prog-cancel { background: none; border: none; font-size: 11px; color: #c33; cursor: pointer; padding: 0; flex-shrink: 0; }

        .filter-status-top {
            display: none;
            margin-bottom: 10px;
            border: 1px solid #6a8fc4;
            background: #eef4ff;
            padding: 8px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            color: #1a3050;
        }
        .filter-status-msg { display: block; font-weight: 600; line-height: 1.35; margin-bottom: 0; }
        .filter-status-top.has-prog .filter-status-msg { margin-bottom: 6px; }
        .filter-indeterminate {
            display: none;
            height: 6px;
            background: #dde8f8;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }
        .filter-indeterminate-bar {
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, #5a7fc0, #8fa8d4);
            animation: filter-indet-slide 1.1s ease-in-out infinite;
        }
        @keyframes filter-indet-slide {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(380%); }
        }

        /* log */
        .log-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .log-lbl  { font-size: 12px; color: #666; }
        .log-clr  { font-size: 11px; color: #888; cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; }
        .log-box  { font-family: monospace; font-size: 11px; line-height: 1.6; background: #fafafa; border: 1px solid #e8e8e8; padding: 6px 8px; height: 260px; overflow-y: auto; color: #444; }
        .l-ok   { color: #1a7a1a; }
        .l-err  { color: #c33; }
        .l-dim  { color: #888; }
        .l-hi   { color: #555; }
        .l-data { color: #111; }
        .l-spd  { color: #335599; }

        .sec-lbl { font-size: 12px; color: #666; margin-bottom: 4px; }

        /* autospin */
        .auto-label { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #444; cursor: pointer; white-space: nowrap; user-select: none; }
        .auto-label input { cursor: pointer; }
        #eduStatsBox {
            border: 1px solid #ddd;
            background: #fafafa;
            padding: 6px 8px;
            margin-bottom: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #444;
        }
        #eduStatsAuto { margin-bottom: 4px; color: #666; line-height: 1.45; }
        #eduStatsAuto .stat-sep { color: #ccc; margin: 0 4px; }
        #eduProgressWrap { margin-top: 4px; }
        #eduProgressBar { height: 8px; background: #eee; border: 1px solid #ddd; border-radius: 3px; overflow: hidden; }
        #eduProgressFill { height: 100%; width: 0%; background: #2f8f4e; transition: width .2s linear; }
        #eduProgressText { margin-top: 3px; color: #666; }

        /* no-filter warning */
        #noFilterBanner {
            font-size: 12px;
            font-family: monospace;
            border: 1px solid #b8860b;
            background: #fffbe6;
            color: #7a5800;
            padding: 6px 8px;
            margin-bottom: 8px;
        }

        /* hits history */
        .hits-section { margin-top: 12px; }
        .hits-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .hits-lbl { font-size: 12px; color: #666; }
        .hits-clr { font-size: 11px; color: #888; cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; }
        .hits-entry {
            border: 1px solid #c8e8c8;
            background: #f6fff6;
            padding: 6px 8px;
            margin-bottom: 5px;
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
        }
        .hits-entry:hover { background: #eaffea; border-color: #5cb85c; }
        .hits-entry.warn { border-color: #e3cf95; background: #fff9e8; }
        .hits-entry.warn:hover { background: #fff4d9; border-color: #c9ad66; }
        .hits-entry-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
        .hits-entry-ts { font-size: 10px; color: #bbb; }
        .hits-entry-words { color: #555; word-break: break-word; margin-bottom: 4px; }
        .hits-entry-words a { color: #888; text-decoration: none; }
        .hits-entry-words a:hover { text-decoration: underline; }
        .hits-entry-addr { color: #1a7a1a; font-weight: 700; }
        .hits-entry-addr a { color: #888; text-decoration: none; margin-left: 6px; font-weight: 400; }
        .hits-entry-addr a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="hdr">

<script>
'use strict';
const DEBUG_STORAGE_KEY = 'btc_slot_debug_v1';
let debugMode = localStorage.getItem(DEBUG_STORAGE_KEY) === '1';

function syncDebugToggleUi() {
    const btn = document.getElementById('btnDebugToggle');
    if (btn) {
        btn.classList.toggle('on', debugMode);
        btn.setAttribute('aria-pressed', debugMode ? 'true' : 'false');
    }
}

function setDebugMode(on) {
    debugMode = !!on;
    localStorage.setItem(DEBUG_STORAGE_KEY, debugMode ? '1' : '0');
    syncDebugToggleUi();
    updateDebugUiVisibility();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtMB(b) { return (b/1048576).toFixed(1)+' MB'; }
function fmtFilterMB(mb) { return mb >= 1024 ? (mb/1024)+'G' : mb+'M'; }
function fmtFilterName(filename) {
    // e.g. "2048mb.bin" → "2G", "512mb.bin" → "512M"
    const m = String(filename).match(/^(\d+)mb\.bin$/i);
    return m ? fmtFilterMB(parseInt(m[1])) : filename;
}
function bytesToHex(b) { return Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join(''); }
function hexToBytes(h) { return new Uint8Array(h.match(/.{2}/g).map(x=>parseInt(x,16))); }

// ── LOG ───────────────────────────────────────────────────────────────────────
const LOG_START = performance.now();
function log(msg, type) {
    if (!debugMode) return;
    type = type || '';
    const t = ((performance.now()-LOG_START)/1000).toFixed(2);
    const el = document.getElementById('logConsole');
    const row = document.createElement('div');
    row.innerHTML = '<span class="l-dim">[' + t + ']</span> <span class="' + (type ? 'l-'+type : '') + '">' + esc(msg) + '</span>';
    el.appendChild(row);
    el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('logConsole').innerHTML=''; log('cleared','dim'); }

// ── FNV-1a 64-bit ─────────────────────────────────────────────────────────────
const FNV_PRIME  = 0x00000100000001B3n;
const FNV_OFFSET = 0xCBF29CE484222325n;
const MASK64     = (1n << 64n) - 1n;

function fnv1a(key) {
    // accepts 40-char (20-byte Hash160) or 64-char (32-byte) hex; zero-pads to 64
    const k = key.padEnd(64, '0');
    let h = FNV_OFFSET;
    for (let i = 0; i < 64; i += 2)
        h = ((h ^ BigInt(parseInt(k.substring(i,i+2),16))) * FNV_PRIME) & MASK64;
    return h;
}

// Compute server-side bloom filter position for 16G filter (bitsExp=37).
// Returns [row, col] — PHP does fseek(row*8) and checks bit col, no GMP needed.
const SERVER_MASK = (1n << 37n) - 1n;
function serverPos(key) {
    const trunc = fnv1a(key) & SERVER_MASK;
    return [Number(trunc >> 6n), Number(trunc & 63n)];
}

// Balance filter position (16G bal filter, bitsExp=37).
const BAL_MASK = (1n << 37n) - 1n;
function balPos(key) {
    const trunc = fnv1a(key) & BAL_MASK;
    return [Number(trunc >> 6n), Number(trunc & 63n)];
}

function isValidFilterKey(key) {
    return typeof key === 'string' && /^(?:[0-9a-f]{40}|[0-9a-f]{64})$/.test(key.toLowerCase());
}

// Check balance filter for items that passed server filter (sets item.balFound).
async function checkBalanceFilter(items) {
    if (!items.length) return;
    const validItems = [];
    for (let i = 0; i < items.length; i++) {
        const fk = String(items[i].filterKey || '').trim().toLowerCase();
        if (isValidFilterKey(fk)) {
            items[i].filterKey = fk;
            validItems.push(items[i]);
        } else {
            items[i].balFound = null;
        }
    }
    if (!validItems.length) return;
    try {
        const resp = await fetch('index_bal.php', { method: 'POST', body: packLookups(validItems.map(function(f) { return balPos(f.filterKey); })) });
        const buf  = new Uint32Array(await resp.arrayBuffer());
        for (let i = 0; i < validItems.length; i++) validItems[i].balFound = readBit(buf, i) === 1;
    } catch(e) { log('balance filter error: ' + e.message, 'err'); }
}

// Pack [[row,col],...] into a binary buffer: 5 bytes per lookup (uint32 LE row + uint8 col).
function packLookups(positions) {
    const buf  = new ArrayBuffer(positions.length * 5);
    const view = new DataView(buf);
    for (let i = 0; i < positions.length; i++) {
        view.setUint32(i * 5,     positions[i][0], true);
        view.setUint8 (i * 5 + 4, positions[i][1]);
    }
    return buf;
}

// Read bitmask result: bit i of 8-byte Uint32Array [lo, hi].
function readBit(buf, i) { return i < 32 ? (buf[0] >> i) & 1 : (buf[1] >> (i - 32)) & 1; }

// ── INDEXEDDB CACHE ───────────────────────────────────────────────────────────
function openDB() {
    return new Promise(function(res, rej) {
        const req = indexedDB.open('btc_filter_cache', 1);
        req.onupgradeneeded = function(e) { e.target.result.createObjectStore('filter'); };
        req.onsuccess = function(e) { res(e.target.result); };
        req.onerror   = function(e) { rej(e.target.error); };
    });
}
async function idbSave(sizeMB, bitsExp, buffer) {
    try {
        const db = await openDB();
        const tx = db.transaction('filter', 'readwrite');
        tx.objectStore('filter').put({ sizeMB, bitsExp, buffer }, sizeMB);
        await new Promise(function(res, rej) { tx.oncomplete = res; tx.onerror = rej; });
        log('saved ' + sizeMB + 'MB to IndexedDB', 'dim');
    } catch(e) { log('IDB write error: ' + e.message, 'dim'); }
}
async function idbLoad(sizeMB) {
    try {
        const db  = await openDB();
        const tx  = db.transaction('filter', 'readonly');
        const req = tx.objectStore('filter').get(sizeMB);
        return await new Promise(function(res, rej) { req.onsuccess = function() { res(req.result||null); }; req.onerror = rej; });
    } catch(e) { return null; }
}
async function idbDelete(sizeMB) {
    try {
        const db = await openDB();
        const tx = db.transaction('filter', 'readwrite');
        tx.objectStore('filter').delete(sizeMB);
        await new Promise(function(res, rej) { tx.oncomplete = res; tx.onerror = rej; });
    } catch(e) {}
}
async function idbKeys() {
    try {
        const db  = await openDB();
        const tx  = db.transaction('filter', 'readonly');
        const req = tx.objectStore('filter').getAllKeys();
        return await new Promise(function(res, rej) { req.onsuccess = function() { res(req.result||[]); }; req.onerror = rej; });
    } catch(e) { return []; }
}

async function refreshIDBState() {
    const keys = await idbKeys();
    document.querySelectorAll('.cf-btn').forEach(function(b) {
        const mb = parseInt(b.dataset.mb);
        if (b.classList.contains('loaded')) return;
        b.classList.toggle('idb', keys.includes(mb));
    });
    const delRow  = document.getElementById('idbRow');
    const delList = document.getElementById('idbDelList');
    if (!keys.length || !debugMode) { delRow.style.display = 'none'; return; }
    delRow.style.display = '';
    delList.innerHTML = '';
    const labels = { 512:'512M' };
    keys.sort(function(a,b){return a-b;}).forEach(function(mb) {
        const btn = document.createElement('button');
        btn.className = 'del-btn';
        btn.textContent = (labels[mb] || mb+'M') + ' \xd7';
        btn.onclick = async function() {
            await idbDelete(mb);
            if (cf.sizeMB === mb) deactivateFilter();
            const b2 = document.querySelector('.cf-btn[data-mb="' + mb + '"]');
            if (b2) b2.classList.remove('idb','loaded');
            log('deleted ' + mb + 'MB from IndexedDB', 'dim');
            refreshIDBState();
        };
        delList.appendChild(btn);
    });
}

// ── CLIENT FILTER ─────────────────────────────────────────────────────────────
const cf = { buffer: null, view: null, sizeMB: null, bitsExp: null, abort: null };

function clientLookup(filterKey) {
    if (!cf.view) return null;
    const t0    = performance.now();
    const fullH = fnv1a(filterKey);
    const trunc = fullH & ((1n << BigInt(cf.bitsExp)) - 1n);
    const row   = Number(trunc >> 6n);
    const col   = Number(trunc & 63n);
    const lo    = cf.view.getUint32(row*8,   true);
    const hi    = cf.view.getUint32(row*8+4, true);
    const chunk = BigInt(lo) | (BigInt(hi) << 32n);
    const found = (chunk & (1n << BigInt(col))) !== 0n;
    return { found, ms: (performance.now()-t0).toFixed(4) };
}

function activateFilter(sizeMB, bitsExp, buffer) {
    cf.buffer  = buffer;
    cf.view    = new DataView(buffer);
    cf.sizeMB  = sizeMB;
    cf.bitsExp = bitsExp;
    document.querySelectorAll('.cf-btn').forEach(function(b) {
        if (b.classList.contains('loaded')) {
            b.classList.remove('loaded');
            idbKeys().then(function(keys) { if (keys.includes(parseInt(b.dataset.mb))) b.classList.add('idb'); });
        }
    });
    const activeBtn = document.querySelector('.cf-btn[data-mb="' + sizeMB + '"]');
    if (activeBtn) activeBtn.classList.add('loaded');
    localStorage.setItem('btc_active_filter', sizeMB);
    document.getElementById('noFilterBanner').style.display = 'none';
    updateDebugUiVisibility();
}

function deactivateFilter() {
    const mb = cf.sizeMB;
    cf.buffer = cf.view = cf.sizeMB = cf.bitsExp = null;
    refreshIDBState();
    localStorage.removeItem('btc_active_filter');
    document.getElementById('noFilterBanner').style.display = '';
    if (mb) log(mb + 'MB deactivated', 'dim');
    updateDebugUiVisibility();
}

async function filterClick(sizeMB, bitsExp) {
    if (sizeMB !== 512) return;
    if (cf.sizeMB === sizeMB) { deactivateFilter(); return; }
    if (cf.abort) { cf.abort.abort(); cf.abort = null; showProgress(false); }
    setFilterTopLoading('Loading local filter from browser storage\u2026');
    const cached = await idbLoad(sizeMB);
    if (cached) {
        activateFilter(sizeMB, bitsExp, cached.buffer);
        clearFilterTopLoading();
        log('loaded ' + sizeMB + 'MB from IndexedDB', 'ok');
        return;
    }
    clearFilterTopLoading({ skipBannerRestore: true });
    const btn = document.querySelector('.cf-btn[data-mb="' + sizeMB + '"]');
    if (btn) { btn.classList.remove('idb','loaded'); btn.classList.add('loading'); }
    showProgress(true, 0, sizeMB*1048576, 0);
    cf.abort = new AbortController();
    const t0 = performance.now();
    log('downloading ' + sizeMB + 'mb.bin', 'hi');
    try {
        const resp = await fetch('filter/' + sizeMB + 'mb.bin', { signal: cf.abort.signal });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const reader     = resp.body.getReader();
        const totalBytes = sizeMB * 1048576;
        const chunks     = [];
        let received = 0, lastSpeedRec = 0, lastSpeedT = t0, speed = 0;
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            const now = performance.now();
            const dT  = (now - lastSpeedT) / 1000;
            if (dT > 0.15) { speed = (received-lastSpeedRec)/dT/1048576; lastSpeedRec=received; lastSpeedT=now; }
            showProgress(true, received, totalBytes, speed);
        }
        const dlSec  = ((performance.now()-t0)/1000).toFixed(2);
        const avgSpd = (received/1048576/parseFloat(dlSec)).toFixed(1);
        log('done ' + dlSec + 's \xb7 ' + avgSpd + ' MB/s', 'ok');
        const buf = new Uint8Array(received);
        let pos = 0;
        for (const c of chunks) { buf.set(c, pos); pos += c.length; }
        activateFilter(sizeMB, bitsExp, buf.buffer);
        showProgress(false);
        await idbSave(sizeMB, bitsExp, cf.buffer);
        refreshIDBState();
    } catch (err) {
        showProgress(false);
        if (btn) { btn.classList.remove('loading'); }
        log(err.name==='AbortError' ? 'cancelled' : 'error: ' + err.message, err.name==='AbortError' ? 'dim' : 'err');
    }
    cf.abort = null;
}

function cancelLoad() {
    if (cf.abort) cf.abort.abort();
    showProgress(false);
}

function showProgress(show, received, total, speed) {
    received = received || 0;
    total = total || 0;
    speed = speed || 0;
    const wrap = document.getElementById('filterStatusTop');
    const ind = document.getElementById('filterIndeterminate');
    const prog = document.getElementById('cfProgress');
    const msg = document.getElementById('filterStatusMsg');
    const banner = document.getElementById('noFilterBanner');
    if (!show) {
        if (ind) ind.style.display = 'none';
        if (prog) prog.style.display = 'none';
        if (msg) msg.textContent = '';
        if (wrap) {
            wrap.style.display = 'none';
            wrap.classList.remove('has-prog');
        }
        if (banner && !cf.view) banner.style.display = '';
        return;
    }
    if (banner) banner.style.display = 'none';
    if (ind) ind.style.display = 'none';
    if (wrap) {
        wrap.style.display = 'block';
        wrap.classList.add('has-prog');
    }
    if (msg) msg.textContent = 'Downloading local filter (~512 MB)\u2026';
    if (prog) prog.style.display = '';
    if (total > 0) {
        const pct = ((received/total)*100).toFixed(1);
        document.getElementById('progFill').style.width = pct + '%';
        const spd = speed > 0 ? ' \xb7 ' + speed.toFixed(1) + ' MB/s' : '';
        document.getElementById('progText').textContent = pct + '%  ' + fmtMB(received) + ' / ' + fmtMB(total) + spd;
    }
}

// ── CRYPTO ────────────────────────────────────────────────────────────────────
const N_SECP256K1 = 0xFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFEBAAEDCE6AF48A03BBFD25E8CD0364141n;
const EC = new elliptic.ec('secp256k1');

function privToPub(privBytes) {
    return new Uint8Array(EC.keyFromPrivate(privBytes).getPublic(true,'array'));
}

function generateMnemonic() {
    const ent = crypto.getRandomValues(new Uint8Array(16));
    const hashHex = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(bytesToHex(ent))).toString();
    const cs = parseInt(hashHex.slice(0,2), 16) >> 4; // 4 bits checksum
    let bits = Array.from(ent).map(function(b){ return b.toString(2).padStart(8,'0'); }).join('') + cs.toString(2).padStart(4,'0');
    return Array.from({length:12}, function(_,i) { return BIP39_WORDLIST[parseInt(bits.slice(i*11,(i+1)*11),2)]; });
}

async function mnemonicToSeed(words) {
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(words.join(' ')), 'PBKDF2', false, ['deriveBits']);
    return new Uint8Array(await crypto.subtle.deriveBits(
        {name:'PBKDF2', hash:'SHA-512', salt:enc.encode('mnemonic'), iterations:2048}, km, 512));
}

async function hmac512(key, data) {
    const k = await crypto.subtle.importKey('raw', key, {name:'HMAC',hash:'SHA-512'}, false, ['sign']);
    return new Uint8Array(await crypto.subtle.sign('HMAC', k, data));
}

async function masterFromSeed(seed) {
    const I = await hmac512(new TextEncoder().encode('Bitcoin seed'), seed);
    return {key: I.slice(0,32), chain: I.slice(32)};
}

async function childKey(parent, index, hardened) {
    const idx = hardened ? (index | 0x80000000) >>> 0 : index;
    const idxBuf = new Uint8Array(4);
    new DataView(idxBuf.buffer).setUint32(0, idx, false);
    const pub = privToPub(parent.key);
    const data = hardened
        ? new Uint8Array([0x00].concat(Array.from(parent.key)).concat(Array.from(idxBuf)))
        : new Uint8Array(Array.from(pub).concat(Array.from(idxBuf)));
    const I = await hmac512(parent.chain, data);
    const childKeyBn = (BigInt('0x'+bytesToHex(I.slice(0,32))) + BigInt('0x'+bytesToHex(parent.key))) % N_SECP256K1;
    return {key: hexToBytes(childKeyBn.toString(16).padStart(64,'0')), chain: I.slice(32)};
}

async function derivePath(seed, path) {
    let node = await masterFromSeed(seed);
    const parts = path.split('/').slice(1);
    for (let i = 0; i < parts.length; i++) {
        const p = parts[i];
        const h = p.endsWith("'");
        node = await childKey(node, parseInt(p), h);
    }
    return node;
}

// ── HASH160 / ADDRESSES ───────────────────────────────────────────────────────
function hash160(bytes) {
    const hex = bytesToHex(bytes);
    const wa = CryptoJS.enc.Hex.parse(hex);
    return hexToBytes(CryptoJS.RIPEMD160(CryptoJS.SHA256(wa)).toString());
}

const B58 = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
function base58Encode(bytes) {
    if (!bytes.length) return '';
    let n = BigInt('0x'+bytesToHex(bytes));
    let r = '';
    while (n > 0n) { r = B58[Number(n%58n)] + r; n /= 58n; }
    for (let i = 0; i < bytes.length; i++) { if (bytes[i]!==0) break; r = '1'+r; }
    return r;
}
function base58Check(payload) {
    const p = new Uint8Array(payload);
    const hex = bytesToHex(p);
    const wa = CryptoJS.enc.Hex.parse(hex);
    const chk = CryptoJS.SHA256(CryptoJS.SHA256(wa)).toString().slice(0,8);
    return base58Encode(new Uint8Array(Array.from(p).concat(Array.from(hexToBytes(chk)))));
}

const B32_CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
const B32_GEN = [0x3b6a57b2,0x26508e6d,0x1ea119fa,0x3d4233dd,0x2a1462b3];
function b32Polymod(v){let c=1;for(let i=0;i<v.length;i++){const d=v[i];const t=c>>25;c=((c&0x1ffffff)<<5)^d;for(let j=0;j<5;j++)if((t>>j)&1)c^=B32_GEN[j];}return c;}
function b32HrpExpand(h){const r=[];for(let i=0;i<h.length;i++)r.push(h.charCodeAt(i)>>5);r.push(0);for(let i=0;i<h.length;i++)r.push(h.charCodeAt(i)&31);return r;}
function b32Checksum(hrp,data){const v=b32HrpExpand(hrp).concat(data).concat([0,0,0,0,0,0]);const pm=b32Polymod(v)^1;return Array.from({length:6},function(_,i){return (pm>>(5*(5-i)))&31;});}
function convertBits(data,from,to,pad){if(pad===undefined)pad=true;let acc=0,bits=0;const r=[],maxv=(1<<to)-1;for(let i=0;i<data.length;i++){const v=data[i];acc=(acc<<from)|v;bits+=from;while(bits>=to){bits-=to;r.push((acc>>bits)&maxv);}}if(pad&&bits>0)r.push((acc<<(to-bits))&maxv);return r;}
function bech32P2wpkh(h160){const prog=[0].concat(convertBits(Array.from(h160),8,5));const cs=b32Checksum('bc',prog);return 'bc1'+prog.concat(cs).map(function(d){return B32_CHARSET[d];}).join('');}

// Taproot: compute tweaked output key (BIP341 keypath, no scripts)
function taprootOutputKey(pub33) {
    const xOnly = pub33.slice(1, 33);
    const tagH  = CryptoJS.SHA256(CryptoJS.enc.Utf8.parse('TapTweak')).toString();
    const twkH  = CryptoJS.SHA256(CryptoJS.enc.Hex.parse(tagH + tagH + bytesToHex(xOnly))).toString();
    const P = EC.keyFromPublic(pub33).getPublic();
    const T = EC.keyFromPrivate(hexToBytes(twkH)).getPublic();
    const Q = P.add(T);
    return new Uint8Array(Q.getX().toArrayLike(Uint8Array, 'be', 32));
}
function bech32mP2tr(xOnly32) {
    const prog = [1].concat(convertBits(Array.from(xOnly32), 8, 5));
    const v    = b32HrpExpand('bc').concat(prog).concat([0,0,0,0,0,0]);
    const pm   = b32Polymod(v) ^ 0x2bc830a3;
    const cs   = Array.from({length:6}, function(_,i){ return (pm >> (5*(5-i))) & 31; });
    return 'bc1' + prog.concat(cs).map(function(d){ return B32_CHARSET[d]; }).join('');
}
function addrP2TR(privKey) {
    const pub   = privToPub(privKey);
    const xOnly = taprootOutputKey(pub);
    const fk    = bytesToHex(xOnly);
    return { addr: bech32mP2tr(xOnly), h160: null, filterKey: fk };
}

function addrP2PKH(privKey)      { const h=hash160(privToPub(privKey)); const h160=bytesToHex(h); return {addr:base58Check([0x00].concat(Array.from(h))), h160, filterKey:h160}; }
function addrP2WPKH(privKey)     { const h=hash160(privToPub(privKey)); const h160=bytesToHex(h); return {addr:bech32P2wpkh(h), h160, filterKey:h160}; }
function addrP2SHP2WPKH(privKey) { const h=hash160(privToPub(privKey)); const rs=new Uint8Array([0x00,0x14].concat(Array.from(h))); const sh=hash160(rs); const shHex=bytesToHex(sh); return {addr:base58Check([0x05].concat(Array.from(sh))), h160:shHex, filterKey:shHex}; }

// ── URL ENCODING ──────────────────────────────────────────────────────────────
// 12 words × 11 bits = 132 bits = 17 bytes → ~23 chars base64url
function wordsToUrlParam(words) {
    const bytes = new Uint8Array(17);
    let bitPos = 0;
    for (let wi = 0; wi < words.length; wi++) {
        const idx = BIP39_WORDLIST.indexOf(words[wi]);
        for (let b = 10; b >= 0; b--) {
            if ((idx >> b) & 1) {
                bytes[Math.floor(bitPos / 8)] |= (1 << (7 - (bitPos % 8)));
            }
            bitPos++;
        }
    }
    return btoa(String.fromCharCode.apply(null, bytes))
        .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

function urlParamToWords(param) {
    const b64 = param.replace(/-/g,'+').replace(/_/g,'/');
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const words = [];
    let bitPos = 0;
    for (let wi = 0; wi < 12; wi++) {
        let idx = 0;
        for (let b = 10; b >= 0; b--) {
            if ((bytes[Math.floor(bitPos / 8)] >> (7 - (bitPos % 8))) & 1) idx |= (1 << b);
            bitPos++;
        }
        const word = BIP39_WORDLIST[idx];
        if (!word) return null;
        words.push(word);
    }
    return words;
}

        localStorage.setItem(LOCK_STATE_KEY, JSON.stringify({
            locks: slotLocks.slice(),
            words: currentWords ? currentWords.slice() : null
        }));
    } catch (_) {}
    updateMnemonicSpaceExplainer();
}

function loadLockState() {
    try {
        const raw = localStorage.getItem(LOCK_STATE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed.locks) && parsed.locks.length === 12) {
            for (let i = 0; i < 12; i++) slotLocks[i] = parsed.locks[i] === true;
        }
        if (Array.isArray(parsed.words) && parsed.words.length === 12) {
            currentWords = parsed.words.map(function(w) { return String(w || ''); });
        }
    } catch (_) {}
}

/** First visit (no saved locks): 11 slots locked to "abandon", last slot free to spin. */
function applyDefaultAbandonLocks() {
    for (let i = 0; i < 11; i++) slotLocks[i] = true;
    slotLocks[11] = false;
    currentWords = Array(12).fill('abandon');

}

// ── HITS HISTORY ──────────────────────────────────────────────────────────────
const HITS_KEY = 'btc_hits_history';
const MAX_HITS = 50;

async function saveHitToHistory(words, found) {
    const balCandidates = (found || []).filter(function(f) { return f && f.balFound === true; });
    if (balCandidates.length === 0) return false;
    const enriched = await enrichHistoryCandidatesWithSqlite(balCandidates);
    const hasUtxo = enriched.some(function(f) { return f.sqliteHasUtxo === true; });
    if (!hasUtxo) return false;
    const hist = JSON.parse(localStorage.getItem(HITS_KEY) || '[]');
    hist.unshift({
        ts: Date.now(),
        words: words,
        hasUtxo: hasUtxo,
        found: enriched.map(function(f) {
            return {
                type: f.type,
                addr: f.addr,
                filterKey: f.filterKey,
                serverFound: f.serverFound,
                balFound: f.balFound,
                sqliteCount: f.sqliteCount || 0,
                sqliteTotalSat: f.sqliteTotalSat || 0,
                sqliteHasUtxo: f.sqliteHasUtxo === true
            };
        })
    });
    if (hist.length > MAX_HITS) hist.splice(MAX_HITS);
    localStorage.setItem(HITS_KEY, JSON.stringify(hist));
    renderHitsHistory();
    return hasUtxo;
}

function clearHits() {
    localStorage.removeItem(HITS_KEY);
    renderHitsHistory();
}

function loadHit(idx) {
    const hist = JSON.parse(localStorage.getItem(HITS_KEY) || '[]');
    const entry = hist[idx];
    if (!entry) return;

}

function fillWordPickerSelect(query) {
    const sel = document.getElementById('wordPickerSelect');
    if (!sel || typeof BIP39_WORDLIST === 'undefined') return;
    const q = (query || '').trim().toLowerCase();
    sel.innerHTML = '';
    const maxFiltered = 500;
    let count = 0;
    let i = 0;
    if (!q) {
        for (i = 0; i < BIP39_WORDLIST.length; i++) {
            const w = BIP39_WORDLIST[i];
            const opt = document.createElement('option');
            opt.value = w;
            opt.textContent = w;
            sel.appendChild(opt);
        }
    } else {
        for (i = 0; i < BIP39_WORDLIST.length && count < maxFiltered; i++) {
            const w = BIP39_WORDLIST[i];
            if (w.toLowerCase().startsWith(q)) {
                const opt = document.createElement('option');
                opt.value = w;
                opt.textContent = w;
                sel.appendChild(opt);
                count++;
            }
        }
        if (count === 0) {
            for (i = 0; i < BIP39_WORDLIST.length && count < maxFiltered; i++) {
                const w = BIP39_WORDLIST[i];
                if (w.toLowerCase().indexOf(q) !== -1) {
                    const opt = document.createElement('option');
                    opt.value = w;
                    opt.textContent = w;
                    sel.appendChild(opt);
                    count++;
                }
            }
        }
    }
    if (sel.options.length) sel.selectedIndex = 0;

// ── AUTOSPIN ──────────────────────────────────────────────────────────────────
let autoSpinning     = false;
let spinBusy         = false;
let totalSpins       = 0;
let totalAddresses   = 0;
let spinsAtLastMatch = 0;
let lastMatchTime    = null;
let lastSpinHadFundedMatch = false;
let lastSpinExhaustiveDone = false;
let lastSpinFundedWords = '';
let pageStartTime  = Date.now();

function resetSearchProgress() {
    for (const k in stateSpinCounts) delete stateSpinCounts[k];
    exhaustiveRunStartByKey = Object.create(null);
    exhaustiveCompletedElapsedByKey = Object.create(null);
    totalSpins = 0;
    totalAddresses = 0;
    spinsAtLastMatch = 0;
    lastMatchTime = null;
    pageStartTime = Date.now();
    updateAutoStats();
}

// Pending local hits waiting for a batched server check
const FLUSH_INTERVAL_MS = 1000;
const FLUSH_BATCH_SIZE  = 20;
let pendingHits  = []; // { words, type, addr, h160 }
let lastFlushTime = Date.now();

async function flushPendingHits() {
    if (pendingHits.length === 0) return;
    clearSqliteKeyCache();
    const batch = pendingHits.splice(0);
    lastFlushTime = Date.now();

    // Deduplicate by h160, compute server bloom positions (client-side, no PHP GMP needed)
    const uniqueKeys = [];
    const seenKey = {};
    for (let i = 0; i < batch.length; i++) {
        const k = batch[i].filterKey;
        if (!seenKey[k]) { seenKey[k] = true; uniqueKeys.push(k); }
    }
    const lookups = uniqueKeys.map(serverPos); // [[row,col], ...]

    try {
        const t0   = performance.now();
        const resp = await fetch('index.php', { method: 'POST', body: packLookups(lookups) });
        const buf  = new Uint32Array(await resp.arrayBuffer()); // [lo, hi]
        const ms   = (performance.now() - t0).toFixed(1);

        // Build filterKey → bool map from positional bitmask
        const keyResult = {};
        for (let i = 0; i < uniqueKeys.length; i++) keyResult[uniqueKeys[i]] = readBit(buf, i) === 1;

        // Group confirmed items by mnemonic
        const byMnemonic = {};
        for (let i = 0; i < batch.length; i++) {
            const item = batch[i];
            if (keyResult[item.filterKey] === true) {
                const key = item.words.join(' ');
                if (!byMnemonic[key]) byMnemonic[key] = { words: item.words, found: [] };
                byMnemonic[key].found.push({ type: item.type, addr: item.addr, filterKey: item.filterKey, serverFound: true });
            }
        }

        const groups = Object.values(byMnemonic);
        if (groups.length > 0) {
            log('\u2713 SERVER CONFIRMED ' + groups.length + ' mnemonic(s) \xb7 ' + ms + 'ms', 'ok');
            // Balance filter check for all server-confirmed items
            const allConfirmed = groups.reduce(function(a, g) { return a.concat(g.found); }, []);
            await checkBalanceFilter(allConfirmed);
            const balHits = allConfirmed.filter(function(f) { return f.balFound; }).length;
            if (balHits) log('balance filter: ' + balHits + ' confirmed address(es) have unspent BTC', 'ok');
            let savedFunded = 0;
            for (let i = 0; i < groups.length; i++) {
                const savedHasUtxo = await saveHitToHistory(groups[i].words, groups[i].found);
                if (savedHasUtxo) savedFunded++;
                if (savedHasUtxo && autoSpinning) {
                    autoSpinning = false;
                    document.getElementById('chkAuto').checked = false;
                    log('Stopped: funded match found: ' + groups[i].words.join(' '), 'ok');
                }
                spinsAtLastMatch = totalSpins;
                lastMatchTime = Date.now();
                updateAutoStats();
            }
            if (savedFunded > 0) log('saved ' + savedFunded + ' funded mnemonic(s) to Recent Hits', 'ok');
        }
    } catch(e) {
        log('batch server error: ' + e.message, 'err');
    }
}

function normalizeKey32Hex(filterKey) {
    const hex = String(filterKey || '').trim().toLowerCase();
    if (!/^[0-9a-f]+$/.test(hex)) return '';
    if (hex.length === 64) return hex;
    if (hex.length === 40) return hex + '000000000000000000000000';
    return '';
}

function fmtSatBtc(sat) {
    return (Number(sat) / 1e8).toFixed(8) + '\xa0BTC';
}

/** Compact BTC for UI (avoids long technical sqlite lines). */
function fmtBtcHuman(sat) {
    const n = Number(sat) || 0;
    if (n <= 0) return '0 BTC';
    const btc = n / 1e8;
    if (btc >= 100) return btc.toFixed(2) + ' BTC';
    if (btc >= 1) return btc.toFixed(2) + ' BTC';
    if (btc >= 0.01) return btc.toFixed(4) + ' BTC';
    return btc.toFixed(8) + ' BTC';
}

/** Snapshot balance line: positive = human BTC; empty snapshot = 0 BTC; optional note if 16G saw unspent but snapshot has none. */
function formatSqliteBalanceLine(r) {
    if (typeof r.sqliteHasUtxo !== 'boolean') return '';
    if (r.sqliteHasUtxo === true) {
        const c = Number(r.sqliteCount || 0);
        const sat = Number(r.sqliteTotalSat || 0);
        let s = fmtBtcHuman(sat);
        if (c > 1) s += ' · ' + c + ' outs';
        return s;
    }
    return '0 BTC';
}

// Per-spin cache so saveHitToHistory + manual UI share one HTTP round-trip per key32.
let sqliteKeyCache = {};
function clearSqliteKeyCache() { sqliteKeyCache = {}; }

async function enrichHistoryCandidatesWithSqlite(items) {
    if (!items || !items.length) return items || [];
    const uniqueKeys = [];
    const seen = {};
    for (let i = 0; i < items.length; i++) {
        const k = normalizeKey32Hex(items[i].filterKey || '');
        if (!k || seen[k]) continue;
        seen[k] = true;
        if (sqliteKeyCache[k] === undefined) uniqueKeys.push(k);
    }
    await Promise.all(uniqueKeys.map(function(k, idx) {
        return fetch('balance_lookup.php?key32=' + encodeURIComponent(k) + '&limit=200&_cb=' + Date.now() + '_' + idx)
            .then(function(resp) { return resp.ok ? resp.json() : null; })
            .then(function(data) {
                if (!data || data.ok !== true) {
                    sqliteKeyCache[k] = { sqliteCount: 0, sqliteTotalSat: 0, sqliteHasUtxo: false };
                    return;
                }
                const c = Number(data.count || 0);
                const sat = Number(data.total_sat || 0);
                sqliteKeyCache[k] = { sqliteCount: c, sqliteTotalSat: sat, sqliteHasUtxo: c > 0 };
            })
            .catch(function() {
                sqliteKeyCache[k] = { sqliteCount: 0, sqliteTotalSat: 0, sqliteHasUtxo: false };
            });
    }));
    for (let i = 0; i < items.length; i++) {
        const k = normalizeKey32Hex(items[i].filterKey || '');
        items[i].sqliteCount = 0;
        items[i].sqliteTotalSat = 0;
        items[i].sqliteHasUtxo = false;
        if (k && sqliteKeyCache[k]) {
            const s = sqliteKeyCache[k];
            items[i].sqliteCount = s.sqliteCount;
            items[i].sqliteTotalSat = s.sqliteTotalSat;
            items[i].sqliteHasUtxo = s.sqliteHasUtxo;
        }
    }
    return items;
}

function powBigInt(base, exp) {
    let r = 1n;
    const b = BigInt(base);
    for (let i = 0; i < exp; i++) r *= b;
    return r;
}

function formatBigIntShort(n) {
    const s = n.toString();
    if (s.length <= 6) return s;
    const mant = s.slice(0, 3);
    const frac = s.slice(3, 5);
    return mant[0] + '.' + mant[1] + mant[2] + frac + 'e' + (s.length - 1);
}

function formatBigIntGrouped(n) {
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function formatDuration(sec) {
    if (!isFinite(sec) || sec < 0) return 'n/a';
    if (sec < 1) return '<1s';
    if (sec < 60) return Math.round(sec) + 's';
    if (sec < 3600) return Math.round(sec / 60) + 'm';
    if (sec < 86400) return Math.round(sec / 3600) + 'h';
    if (sec < 31536000) return Math.round(sec / 86400) + 'd';
    return Math.round(sec / 31536000) + 'y';
}

function formatElapsedFromMs(ms) {
    if (!isFinite(ms) || ms < 0) return '?';
    const sec = ms / 1000;
    if (sec < 1) return sec.toFixed(2) + 's';
    return formatDuration(sec);
}

function getLockStateKey() {
    const parts = [];
    for (let i = 0; i < 12; i++) {
        if (!slotLocks[i]) continue;
        const w = currentWords && currentWords[i] ? currentWords[i] : '';
        parts.push(i + ':' + w);
    }
    return parts.join('|');
}

function registerSpinForCurrentState() {
    const k = getLockStateKey();
    const free = 12 - slotLocks.filter(Boolean).length;
    if (free < 6 && (stateSpinCounts[k] || 0n) === 0n && exhaustiveCompletedElapsedByKey[k] === undefined) {
        exhaustiveRunStartByKey[k] = Date.now();
    }
    stateSpinCounts[k] = (stateSpinCounts[k] || 0n) + 1n;
    totalSpins++;
}

function isCurrentStateExhausted() {
    const free = 12 - slotLocks.filter(Boolean).length;
    if (free >= 6) return false;
    const totalComb = powBigInt(2048, free);
    const checkedInState = stateSpinCounts[getLockStateKey()] || 0n;
    return checkedInState >= totalComb;
}

function renderSingleSpinResults(words, rows, opts) {
    opts = opts || {};
    const box = document.getElementById('singleSpinBox');
    if (!box) return;
    if (!rows || !rows.length) { box.style.display = 'none'; return; }

        html += '<div class="ss-row">'

            + '<a class="ss-addr" href="test.html?address=' + encodeURIComponent(r.addr) + '">' + esc(r.addr) + '</a>'
            + '<span class="ss-money ' + (r.money === 'yes' ? 'yes' : 'no') + '">' + (r.money === 'yes' ? 'unspent' : '\u2014') + '</span>'
            + '<span class="ss-sqlite" style="font-size:10px;font-family:monospace;white-space:nowrap;color:' + sqliteColor + '">' + esc(sqliteTxt) + '</span>'
            + '<a class="ss-mp" href="https://mempool.space/address/' + encodeURIComponent(r.addr) + '" target="_blank" rel="noopener">mempool&#8599;</a>'
            + '</div>';

    box.style.display = 'block';

function buildSpinWords(fixedWords) {
    if (fixedWords) return { words: fixedWords.slice(), exhaustive: false };

    const freeSlots = [];
    for (let i = 0; i < 12; i++) if (!slotLocks[i]) freeSlots.push(i);

    // Auto-enable deterministic exhaustive stepping when fewer than 6 words are spinning.
    const exhaustive = freeSlots.length < 6;
    const stateKey = getLockStateKey();
    const spinIndex = stateSpinCounts[stateKey] || 0n;
    const baseWords = currentWords ? currentWords.slice() : generateMnemonic();
    const words = baseWords.slice();

    if (exhaustive) {
        const totalComb = powBigInt(2048, freeSlots.length);
        let rem = totalComb > 0n ? (spinIndex % totalComb) : 0n;
        for (let i = freeSlots.length - 1; i >= 0; i--) {
            const digit = Number(rem % 2048n);
            rem /= 2048n;
            words[freeSlots[i]] = BIP39_WORDLIST[digit];
        }
    } else {
        const rnd = generateMnemonic();
        for (let i = 0; i < freeSlots.length; i++) words[freeSlots[i]] = rnd[freeSlots[i]];
    }
    return { words, exhaustive };
}

function updateAutoStats() {
    const now     = Date.now();
    const elapsed = (now - pageStartTime) / 1000;
    const spsAll  = elapsed > 0 ? (totalSpins / elapsed).toFixed(2) : '0.00';
    const speed = elapsed > 0 ? (totalSpins / elapsed) : 0;

    const apsAll = elapsed > 0 ? (totalAddresses / elapsed).toFixed(1) : '0.0';

    const locked = slotLocks.filter(Boolean).length;
    const free = 12 - locked;
    const totalComb = powBigInt(2048, free);
    const stateKey = getLockStateKey();
    const checkedInState = stateSpinCounts[stateKey] || 0n;
    const remaining = checkedInState < totalComb ? (totalComb - checkedInState) : 0n;
    const eta = speed > 0
        ? (remaining > 1000000000000000000n ? 'very long' : formatDuration(Number(remaining) / speed))
        : 'n/a';

    let html = totalSpins.toLocaleString() + ' mnemonics'
        + '<span class="stat-sep">·</span>' + spsAll + ' mnemonics/s'
        + '<span class="stat-sep">·</span>' + totalAddresses.toLocaleString() + ' addr'
        + '<span class="stat-sep">·</span>' + apsAll + '/s'
        + '<span class="stat-sep">·</span>ETA: ' + eta;

    const eduAuto = document.getElementById('eduStatsAuto');
    if (eduAuto) eduAuto.innerHTML = html;

    const progressBp = totalComb > 0n ? Number((checkedInState * 10000n) / totalComb) : 0;
    const progressPct = progressBp >= 10000 ? '100.00%' : (checkedInState > 0n && progressBp === 0 ? '<0.01%' : (progressBp / 100).toFixed(2) + '%');
    const widthPct = Math.max(0, Math.min(progressBp / 100, 100));
    const fill = document.getElementById('eduProgressFill');

    if (fill) {
        fill.style.width = widthPct + '%';
        if (widthPct > 0 && widthPct < 1) fill.style.minWidth = '2px';
        else fill.style.minWidth = '0';
    }
    let progressMsg = 'Progress: ' + progressPct;
    if (free < 6 && totalComb > 0n && checkedInState >= totalComb) {
        if (exhaustiveCompletedElapsedByKey[stateKey] === undefined) {
            const t0 = exhaustiveRunStartByKey[stateKey];
            exhaustiveCompletedElapsedByKey[stateKey] = t0 !== undefined ? (Date.now() - t0) : null;
        }
        const elapsedMs = exhaustiveCompletedElapsedByKey[stateKey];
        if (elapsedMs != null) progressMsg += ' \xb7 completed in ' + formatElapsedFromMs(elapsedMs);
    }
    document.getElementById('eduProgressText').textContent = progressMsg;
    updateMnemonicSpaceExplainer();
}

function setAutoSpin(val) {
    autoSpinning = val;
    document.getElementById('chkAuto').checked = val;
}

function yieldToUi() {
    return new Promise(function(res) {
        requestAnimationFrame(function() { requestAnimationFrame(res); });
    });
}

async function onAutoChange() {
    if (!document.getElementById('chkAuto').checked) {
        autoSpinning = false;
        await flushPendingHits();
        setSpinBtnAfterSpin(document.getElementById('btnSpin'));
        return;
    }
    autoSpinning = true;
    setSpinBtnAfterSpin(document.getElementById('btnSpin'));
    lastFlushTime = Date.now();
    while (autoSpinning) {
        await doSpin();
        await yieldToUi();
        if (lastSpinHadFundedMatch) {
            autoSpinning = false;
            document.getElementById('chkAuto').checked = false;
            log('Stopped: funded match found' + (lastSpinFundedWords ? ': ' + lastSpinFundedWords : '.'), 'ok');
            break;
        }
        if (lastSpinExhaustiveDone) {
            autoSpinning = false;
            document.getElementById('chkAuto').checked = false;
            log('Stopped: exhaustive search completed for current lock state.', 'dim');
            break;
        }
        if (pendingHits.length >= FLUSH_BATCH_SIZE ||
            (pendingHits.length > 0 && Date.now() - lastFlushTime >= FLUSH_INTERVAL_MS)) {
            flushPendingHits(); // fire-and-forget — don't block spinning on HTTP round trip
        }
    }
    await flushPendingHits();
    document.getElementById('btnCopy').style.display = '';
    setSpinBtnAfterSpin(document.getElementById('btnSpin'));
}

function getScanConfig() {
    const raw = parseInt((document.getElementById('pathCount') || {}).value || '5', 10);
    const perPathCount = Math.max(1, Math.min(2000, isFinite(raw) ? raw : 5));

    const allPathDefs = [
        { id: 'path44', path: "m/44'/0'/0'/0", type: 'P2PKH',       fn: addrP2PKH },
        { id: 'path49', path: "m/49'/0'/0'/0", type: 'P2SH-P2WPKH', fn: addrP2SHP2WPKH },
        { id: 'path84', path: "m/84'/0'/0'/0", type: 'P2WPKH',      fn: addrP2WPKH },
        { id: 'path86', path: "m/86'/0'/0'/0", type: 'P2TR',        fn: addrP2TR },
    ];

    const enabled = allPathDefs.filter(function(p) {
        const el = document.getElementById(p.id);
        return !!(el && el.checked);
    });
    return { perPathCount, enabledPaths: enabled };
}

const AGE_UNIVERSE_YEARS = 13.8e9;

function log10BigInt(n) {
    if (n <= 0n) return -Infinity;
    const s = n.toString();
    const d = s.length;
    if (d <= 15) return Math.log10(Number(n));
    const head = s.slice(0, 15);
    return Math.log10(parseInt(head, 10)) + (d - 15);
}

function approxSecondsForBigIntSpace(space, triesPerSec) {
    if (triesPerSec <= 0 || !isFinite(triesPerSec)) return Infinity;
    return Math.pow(10, log10BigInt(space) - Math.log10(triesPerSec));
}

function formatSearchDurationApproxSec(sec) {
    if (!isFinite(sec) || sec < 0) return 'n/a';
    if (sec < 0.5) return 'under a second';
    if (sec < 31536000) return formatDuration(sec) + ' (approx.)';
    const years = sec / 31536000;
    if (years < AGE_UNIVERSE_YEARS) return years.toPrecision(4) + ' yr (approx.)';
    const mult = years / AGE_UNIVERSE_YEARS;
    if (mult < 1e9) return '\u2248 ' + mult.toPrecision(4) + ' \u00d7 age of the universe (\u224813.8 billion yr)';
    return '\u2248 10^' + Math.log10(mult).toFixed(1) + ' \u00d7 age of the universe';
}

function buildMnemonicAnalogyLines(logN) {
    const out = [];
    if (logN >= 78)
        out.push('Roughly comparable in order of magnitude to common estimates for atoms in the observable universe (\u224810\u2078\u2070).');
    else if (logN >= 50)
        out.push('Vastly larger than rough estimates for atoms in Earth (\u224810\u2075\u2070).');
    if (logN >= 24) {
        const diff = logN - 24;
        out.push('About 10^' + diff.toFixed(1) + ' times more combinations than stars in the observable universe (often quoted around 10\u00b2\u2074).');
    } else if (logN >= 18) {
        out.push('Larger than rough estimates for grains of sand on Earth (\u224810\u00b9\u2078\u201310\u00b9\u2079).');
    } else if (logN >= 10) {
        out.push('Larger than the number of people on Earth (\u224810\u2079).');
    }
    return out.slice(0, 3);
}

function updateMnemonicSpaceExplainer() {
    const el = document.getElementById('scanSpaceExplainer');
    if (!el) return;
    const locked = slotLocks.filter(Boolean).length;
    const free = 12 - locked;
    const space = powBigInt(2048, free);
    const logN = log10BigInt(space);
    let scanCfg = { perPathCount: 5, enabledPaths: [] };
    try {
        scanCfg = getScanConfig();
    } catch (err) {}
    const nAddr = Math.max(0, scanCfg.enabledPaths.length) * scanCfg.perPathCount;
    const addrSpaceTotal = nAddr > 0 ? space * BigInt(nAddr) : 0n;
    const elapsed = (Date.now() - pageStartTime) / 1000;
    const sps = elapsed > 0 ? (totalSpins / elapsed) : 0;

    const parts = [];
    parts.push('<p class="sse-line"><span class="sse-num">' + esc(formatBigIntGrouped(space)) + '</span> possible mnemonics</p>');
    parts.push('<p class="sse-sub">' + free + ' word slot' + (free === 1 ? ' is' : 's are') + ' unlocked; each picks one of 2,048 BIP39 words.</p>');
    const analogies = buildMnemonicAnalogyLines(logN);
    for (let ai = 0; ai < analogies.length; ai++)
        parts.push('<p class="sse-analogy">\u2014 ' + esc(analogies[ai]) + '</p>');

    parts.push('<p class="sse-line" style="margin-top:8px">Addresses checked per mnemonic.</p>');
    parts.push('<p class="sse-sub">' + nAddr.toLocaleString() + ' address' + (nAddr === 1 ? '' : 'es') + ' will be checked (enabled paths \u00d7 \u201cper path\u201d indexes).</p>');
    parts.push('<p class="sse-line"><span class="sse-num">' + esc(formatBigIntGrouped(addrSpaceTotal)) + '</span> possible addresses</p>');
    
    parts.push('<div class="sse-section-title">Expected duration</div>');
    const rates = [
        [1e6, '1,000,000'],
        [1e11, '100 billion'],
        [1e21, '1,000,000,000 trillion']
    ];
    for (let ri = 0; ri < rates.length; ri++) {
        const sec = approxSecondsForBigIntSpace(space, rates[ri][0]);
        parts.push('<p class="sse-rate">At ' + rates[ri][1] + ' mnemonics/s: <strong>' + esc(formatSearchDurationApproxSec(sec)) + '</strong></p>');
    }
    if (sps > 0) {
        const secYou = approxSecondsForBigIntSpace(space, sps);
        parts.push('<p class="sse-rate">At <strong>' + esc(sps.toFixed(2)) + '</strong> mnemonics/s (measured on this page): <strong>' + esc(formatSearchDurationApproxSec(secYou)) + '</strong></p>');
    } else {
        parts.push('<p class="sse-sub">Spin once to measure your speed; it will appear here and in the stats box below.</p>');
    }
    el.innerHTML = parts.join('');
}

// ── SPIN ──────────────────────────────────────────────────────────────────────
function setSpinBtnAfterSpin(btn) {
    if (!btn) return;
    btn.disabled = !!autoSpinning || spinBusy;
}

async function doSpin(fixedWords, opts) {
    opts = opts || {};
    const continuation = opts.continuation === true;
    if (!continuation) {
        if (spinBusy) return;
        spinBusy = true;
    }
    try {
        return await _doSpin(fixedWords, opts);
    } catch(e) {
        log('ERROR: ' + e.message + (e.stack ? '\n' + e.stack.split('\n')[1] : ''), 'err');
        return false;
    } finally {
        if (!continuation) spinBusy = false;
        setSpinBtnAfterSpin(document.getElementById('btnSpin'));
    }
}
async function _doSpin(fixedWords, opts) {
    clearSqliteKeyCache();
    lastSpinHadFundedMatch = false;
    lastSpinExhaustiveDone = false;
    lastSpinFundedWords = '';
    const isAuto = autoSpinning; // capture now — consistent for the whole spin
    const btn = document.getElementById('btnSpin');
    btn.disabled = true;
    if (!isAuto) document.getElementById('logConsole').innerHTML = '';
    document.getElementById('btnCopy').style.display = 'none';
    const singleSpinBox = document.getElementById('singleSpinBox');
    if (singleSpinBox) singleSpinBox.style.display = 'none';

    // 1. Generate (or restore) mnemonic
    const spinPlan = buildSpinWords(fixedWords);
    const words = spinPlan.words;
    currentWords = words.slice();
    saveLockState();

    // 2. Update URL (skip during autospin — replaceState triggers favicon re-fetch every spin)
    if (!isAuto) history.replaceState(null, '', '?m=' + wordsToUrlParam(words));

    // 3. Display in slots with animation
    for (let i = 0; i < 12; i++) setSlotWord(i, words[i]);

    if (!isAuto) log((spinPlan.exhaustive ? '[exhaustive] ' : '') + 'mnemonic: ' + words.join(' '), 'hi');

    // 4. Derive seed (PBKDF2-HMAC-SHA512, 2048 iterations)
    const t0 = performance.now();
    const seed = await mnemonicToSeed(words);
    if (!isAuto) log('seed derived in ' + ((performance.now()-t0)/1000).toFixed(2) + 's', 'dim');

    // 5. Derive addresses for selected paths and count
    const scanCfg = getScanConfig();
    const pathDefs = scanCfg.enabledPaths;
    const perPathCount = scanCfg.perPathCount;
    if (pathDefs.length === 0) {
        if (!isAuto) log('no derivation path selected', 'err');
        if (isAuto) setAutoSpin(false);
        if (!isAuto) {
            document.getElementById('btnCopy').style.display = '';
            renderSingleSpinResults(words, []);
        }
        return false;
    }

    const found = [];
    const collectDerived = !isAuto;
    const derivedRows = collectDerived ? [] : null;
    function trackDerived(type, idx, addr, filterKey) {
        if (!collectDerived) return null;
        const row = { type: type, index: idx, addr: addr, filterKey: filterKey || '', money: 'no' };
        derivedRows.push(row);
        return row;
    }
    let checked = 0, serverFilterLabel = null;
    const tAddr = performance.now();


    if (cf.view) {
        if (!isAuto) {
            // Manual: derive every selected path × every index (e.g. 4 paths × 5 = 20 addresses)
            for (let pi = 0; pi < pathDefs.length; pi++) {
                const {path, type, fn} = pathDefs[pi];
                const acct = await derivePath(seed, path);
                for (let n = 0; n < perPathCount; n++) {
                    const child = await childKey(acct, n, false);
                    const {addr, h160, filterKey} = fn(child.key);
                    const rowRef = trackDerived(type, n, addr, filterKey);
                    checked++;
                    const res = clientLookup(filterKey);
                    if (res && res.found) {
                        found.push({type, addr, h160, filterKey, serverFound: null, rowRef});
                        log('HIT ' + type + ' [' + pi + '/' + n + '] ' + addr, 'ok');
                    }
                }
            }
            log('checked ' + checked + ' \xb7 filter ' + cf.sizeMB + 'MB \xb7 local hits ' + found.length, found.length ? 'ok' : 'data');

            if (found.length > 0) {
                try {
                    const t0s = performance.now();
                    const resp = await fetch('index.php', { method: 'POST', body: packLookups(found.map(function(f) { return serverPos(f.filterKey); })) });
                    const buf  = new Uint32Array(await resp.arrayBuffer());
                    serverFilterLabel = '16G';
                    for (let i = 0; i < found.length; i++) {
                        found[i].serverFound = readBit(buf, i) === 1;
                        if (found[i].rowRef && found[i].serverFound !== true) found[i].rowRef.money = 'no';
                    }
                    log('server check \xb7 ' + (performance.now()-t0s).toFixed(1) + 'ms', 'dim');
                } catch(e) { log('server error: ' + e.message, 'err'); }
                if (!found.some(function(f) { return f.serverFound === true; })) {
                    log('false positive \xb7 server did not confirm local hits', 'dim');
                } else {
                    const confirmed = found.filter(function(f) { return f.serverFound === true; });
                    await checkBalanceFilter(confirmed);
                    const balHits = confirmed.filter(function(f) { return f.balFound; }).length;
                    for (let i = 0; i < confirmed.length; i++) if (confirmed[i].rowRef) confirmed[i].rowRef.money = confirmed[i].balFound === true ? 'yes' : 'no';
                    log('balance filter: ' + balHits + '/' + confirmed.length + ' have unspent BTC', balHits ? 'ok' : 'data');
                    const saved = await saveHitToHistory(words, confirmed);
                    if (saved) {
                        lastSpinHadFundedMatch = true;
                        lastSpinFundedWords = words.join(' ');
                    }
                }
            }
        } else {
            // Autospin: phase 1 quick check on first path only, then expand if any local hit
            const acct0 = await derivePath(seed, pathDefs[0].path);
            const phase1Count = Math.min(5, perPathCount);
            for (let n = 0; n < phase1Count; n++) {
                const child = await childKey(acct0, n, false);
                const {addr, h160, filterKey} = pathDefs[0].fn(child.key);
                checked++;
                const res = clientLookup(filterKey);
                if (res && res.found) {
                    found.push({type: pathDefs[0].type, addr, h160, filterKey, serverFound: null});
                }
            }

            if (found.length === 0) {
                log('checked ' + checked + ' \xb7 filter ' + cf.sizeMB + 'MB \xb7 no match', 'data');
                registerSpinForCurrentState();
                totalAddresses += checked;
                lastSpinExhaustiveDone = isCurrentStateExhausted();
                updateAutoStats();
                return false;
            }

            for (let n = phase1Count; n < perPathCount; n++) {
                const child = await childKey(acct0, n, false);
                const {addr, h160, filterKey} = pathDefs[0].fn(child.key);
                checked++;
                const res = clientLookup(filterKey);
                if (res && res.found) found.push({type: pathDefs[0].type, addr, h160, filterKey, serverFound: null});
            }
            for (let pi = 1; pi < pathDefs.length; pi++) {
                const {path, type, fn} = pathDefs[pi];
                const acct = await derivePath(seed, path);
                for (let n = 0; n < perPathCount; n++) {
                    const child = await childKey(acct, n, false);
                    const {addr, h160, filterKey} = fn(child.key);
                    checked++;
                    const res = clientLookup(filterKey);
                    if (res && res.found) found.push({type, addr, h160, filterKey, serverFound: null});
                }
            }
            for (let i = 0; i < found.length; i++)
                pendingHits.push({ words: words, type: found[i].type, addr: found[i].addr, h160: found[i].h160, filterKey: found[i].filterKey });
        }
    } else {
        if (!isAuto) log('no filter loaded \u2014 auto-downloading 512M filter\u2026', 'dim');
        await filterClick(512, 32);
        if (cf.view) {
            if (!isAuto) log('filter ready \u2014 re-checking\u2026', 'dim');
            return await doSpin(words, { continuation: true });
        }
        checked = 0;
    }

    if (!isAuto) log('address derivation: ' + ((performance.now()-tAddr)/1000).toFixed(2) + 's', 'dim');

    // SQLite UTXO snapshot (manual spin): every derived address + every hit row
    if (!isAuto) {
        if (derivedRows && derivedRows.length) await enrichHistoryCandidatesWithSqlite(derivedRows);
        if (found.length) await enrichHistoryCandidatesWithSqlite(found);
    }

    const anyConfirmed = found.some(function(f) { return f.serverFound === true; });

    if (!isAuto) {
        if (derivedRows && derivedRows.length && found.length) {
            const byKey = {};
            for (let fi = 0; fi < found.length; fi++) {
                const k = normalizeKey32Hex(found[fi].filterKey || '');
                if (k) byKey[k] = found[fi];
            }
            for (let di = 0; di < derivedRows.length; di++) {
                const k = normalizeKey32Hex(derivedRows[di].filterKey || '');
                if (k && byKey[k]) {
                    const f = byKey[k];
                    derivedRows[di].serverFound = f.serverFound;
                    derivedRows[di].balFound = f.balFound;
                }
            }
        }
        const localLabel = cf.sizeMB ? fmtFilterMB(cf.sizeMB) : '?';
        const serverConfirmedCount = found.filter(function(f) { return f.serverFound === true; }).length;
        const expectedAddr = pathDefs.length * perPathCount;
        let summaryLine = 'Checked ' + checked + ' (expected ' + expectedAddr + ' addresses)';
        summaryLine += ' · Local (' + localLabel + '): ' + found.length;
        if (serverFilterLabel !== null) {
            summaryLine += ' · Server (' + serverFilterLabel + '): ' + serverConfirmedCount;
        }
        document.getElementById('btnCopy').style.display = '';
        renderSingleSpinResults(words, derivedRows, { summary: summaryLine });
    } else {
        document.getElementById('btnCopy').style.display = 'none';
    }
    registerSpinForCurrentState();
    totalAddresses += checked;
    lastSpinExhaustiveDone = isCurrentStateExhausted();
    updateAutoStats();
    return anyConfirmed;
} // end _doSpin

// ── INIT ──────────────────────────────────────────────────────────────────────

    const urlParam0 = new URLSearchParams(window.location.search).get('m');
    buildGrid();
    wireWordPickerUi();
    loadLockState();
    if (!localStorage.getItem(LOCK_STATE_KEY) && !urlParam0) {
        applyDefaultAbandonLocks();
    }
    loadScanSettings();
    renderCurrentWordsToSlots();
    renderAllSlotLocks();
    syncDebugToggleUi();
    document.getElementById('btnDebugToggle').addEventListener('click', function() {
        setDebugMode(!debugMode);
    });
    updateDebugUiVisibility();
    await refreshIDBState();
    renderHitsHistory();

    const lastMB = parseInt(localStorage.getItem('btc_active_filter') || '0');
    if (lastMB === 512) {
        setFilterTopLoading('Loading local filter from browser storage\u2026');
        try {
            const cached = await idbLoad(lastMB);
            if (cached) {
                activateFilter(cached.sizeMB, cached.bitsExp, cached.buffer);
                log('restored ' + cached.sizeMB + 'MB filter from IndexedDB', 'ok');
            } else {
                log('ready \u2014 no filter loaded', 'dim');
            }
        } finally {
            clearFilterTopLoading();
        }
    } else {
        if (lastMB && lastMB !== 512) localStorage.removeItem('btc_active_filter');
        log('ready \u2014 no filter loaded', 'dim');
    }

    // If URL has a mnemonic, show it in the grid (user spins manually — no auto-spin on load)
    if (urlParam0) {
        try {
            const words = urlParamToWords(urlParam0);
            if (words && words.length === 12) {
                currentWords = words.slice();
                renderCurrentWordsToSlots();
                saveLockState();
            }
        } catch (e) {
            log('could not decode URL mnemonic', 'err');
        }
    }
    updateDebugUiVisibility();
    updateAutoStats();
});
