<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC SLOT MACHINE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --void:       #060606;
            --panel:      #0c0c0c;
            --panel2:     #111111;
            --amber:      #ffb300;
            --amber-mid:  #cc8e00;
            --amber-dim:  #a07030;
            --amber-glow: rgba(255,179,0,0.13);
            --green:      #00ff41;
            --green-glow: rgba(0,255,65,0.17);
            --red:        #ff2b2b;
            --blue:       #4fc3f7;
            --text:       #d4aa48;
            --text-dim:   #8a6e35;
            --border:     #1e1e1e;
            --border-hi:  rgba(255,179,0,0.22);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background:
                radial-gradient(ellipse 80% 55% at 50% 0%,   rgba(255,179,0,0.045) 0%, transparent 60%),
                radial-gradient(ellipse 50% 35% at 50% 100%, rgba(255,90,0,0.025)  0%, transparent 60%),
                var(--void);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 36px 16px 56px;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
            pointer-events: none; z-index: 1000;
        }
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.72) 100%);
            pointer-events: none; z-index: 999;
        }

        .wrap { width: 100%; max-width: 700px; position: relative; z-index: 1; }

        /* ── HEADER ─────────────────────────────────────────────── */
        .hdr { text-align: center; margin-bottom: 28px; user-select: none; }
        .hdr-eyebrow { font-size: 0.75rem; letter-spacing: 0.45em; color: var(--amber-dim); margin-bottom: 6px; }
        .hdr-title {
            font-family: 'Bebas Neue', cursive;
            font-size: clamp(3.2rem, 12vw, 6rem);
            letter-spacing: 0.08em; line-height: 0.9;
            color: var(--amber);
            text-shadow: 0 0 8px var(--amber), 0 0 24px rgba(255,179,0,.45), 0 0 64px rgba(255,179,0,.18);
            animation: titleFlicker 11s infinite;
        }
        @keyframes titleFlicker {
            0%,94%,100%{opacity:1} 95%{opacity:.82} 96%{opacity:1} 97.5%{opacity:.91}
        }
        .hdr-sub { margin-top: 10px; font-size: 0.8rem; letter-spacing: 0.25em; color: var(--amber-dim); }
        .hdr-sub em { color: var(--amber); opacity:.55; font-style:normal; }

        /* ── TERMINAL CARD ──────────────────────────────────────── */
        .term {
            background: var(--panel);
            border: 1px solid var(--border-hi);
            box-shadow: inset 0 1px 0 rgba(255,179,0,.06), inset 0 0 80px rgba(0,0,0,.6),
                        0 0 0 1px var(--border), 0 24px 80px rgba(0,0,0,.9);
            padding: 28px 28px 24px;
        }

        .term-chrome {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 24px; padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); }
        .dot.live { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: livePulse 2.4s ease-in-out infinite; }
        @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:.35} }
        .chrome-label { flex:1; font-size: 0.78rem; letter-spacing: 0.18em; color: var(--text-dim); }
        .chrome-right { font-size: 0.76rem; color: var(--text-dim); letter-spacing: 0.1em; }
        .chrome-right span { color: var(--green); }

        /* ── INPUT ──────────────────────────────────────────────── */
        .input-row { display: flex; margin-bottom: 24px; }
        .input-pfx {
            background: var(--panel2); border: 1px solid var(--border-hi); border-right: none;
            padding: 0 14px; display: flex; align-items: center;
            color: var(--amber); font-size: 1.05rem; user-select: none; flex-shrink: 0;
        }
        #valInput {
            flex: 1; min-width: 0;
            background: var(--panel2); border: 1px solid var(--border-hi); border-right: none;
            color: var(--amber); font-family: 'Share Tech Mono', monospace;
            font-size: 0.88rem; padding: 13px 14px; outline: none;
            transition: border-color .2s, box-shadow .2s; caret-color: var(--amber);
        }
        #valInput::placeholder { color: var(--text-dim); }
        #valInput:focus { border-color: var(--amber); box-shadow: 0 0 18px var(--amber-glow); }
        .btn-pull {
            background: var(--amber); border: 1px solid var(--amber);
            color: var(--void); font-family: 'Bebas Neue', cursive;
            font-size: 1.15rem; letter-spacing: 0.12em; padding: 0 22px;
            cursor: pointer; transition: background .15s, box-shadow .15s; flex-shrink: 0;
        }
        .btn-pull:hover { background: #ffd04a; border-color: #ffd04a; box-shadow: 0 0 22px rgba(255,208,74,.4); }
        .btn-pull:active { background: var(--amber-mid); }
        .btn-pull:disabled { opacity:.45; cursor:not-allowed; }

        /* ── REELS ──────────────────────────────────────────────── */
        .reels-wrap { margin-bottom: 22px; }
        .sec-label { font-size: 0.75rem; letter-spacing: 0.25em; color: var(--amber-dim); margin-bottom: 10px; }
        .reels { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
        .reel {
            background: #070707; border: 1px solid var(--border);
            height: 72px; display: flex; align-items: center; justify-content: center;
            font-family: 'Share Tech Mono', monospace; font-size: 1.25rem; letter-spacing: 0.12em;
            color: var(--text-dim); position: relative; overflow: hidden;
            transition: border-color .35s, color .35s, box-shadow .35s; user-select: none;
        }
        .reel::before,.reel::after { content:''; position:absolute; left:0; right:0; height:18px; z-index:2; pointer-events:none; }
        .reel::before { top:0; background: linear-gradient(to bottom, #070707, transparent); }
        .reel::after  { bottom:0; background: linear-gradient(to top, #070707, transparent); }
        .reel.spinning { color:var(--amber-dim); border-color:rgba(255,179,0,.15); animation:reelVib .08s steps(1) infinite; }
        @keyframes reelVib { 0%{transform:translateY(0)} 33%{transform:translateY(-1px) translateX(.5px)} 66%{transform:translateY(1px) translateX(-.5px)} }
        .reel.found { border-color:var(--green); color:var(--green); box-shadow:inset 0 0 20px rgba(0,255,65,.08),0 0 12px rgba(0,255,65,.18); }
        .reel.miss  { border-color:rgba(255,43,43,.4); color:var(--red); }

        /* ── RESULT ─────────────────────────────────────────────── */
        .result-wrap {
            border: 1px solid var(--border); position: relative;
            padding: 18px 20px; min-height: 76px;
            display: flex; flex-direction: column; justify-content: center;
            margin-bottom: 22px; transition: border-color .4s, box-shadow .4s;
        }
        .result-wrap.state-found { border-color:var(--green); box-shadow:0 0 32px var(--green-glow),inset 0 0 40px rgba(0,255,65,.03); }
        .result-wrap.state-miss  { border-color:var(--border); }
        .result-wrap.state-error { border-color:rgba(255,43,43,.4); }
        .result-corner {
            position:absolute; top:-1px; left:16px; background:var(--panel);
            padding:0 8px; font-size:0.72rem; letter-spacing:0.25em;
            color:var(--amber-dim); transform:translateY(-50%);
        }
        .result-idle { font-size:.95rem; color:var(--text-dim); }
        .result-idle .caret {
            display:inline-block; width:7px; height:1em;
            background:var(--amber-dim); vertical-align:text-bottom; margin-left:3px;
            animation:caretBlink 1.1s step-end infinite;
        }
        @keyframes caretBlink { 0%,100%{opacity:1} 50%{opacity:0} }
        .result-status { font-family:'Bebas Neue',cursive; font-size:2rem; letter-spacing:0.1em; line-height:1; margin-bottom:6px; }
        .state-found .result-status { color:var(--green); text-shadow:0 0 18px var(--green),0 0 40px rgba(0,255,65,.3); animation:jackpotPop .4s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes jackpotPop { 0%{transform:scale(.88);opacity:.6} 100%{transform:scale(1);opacity:1} }
        .state-miss  .result-status { color:var(--red); }
        .state-error .result-status { color:var(--red); font-size:1.1rem; }
        .result-desc { font-size:.86rem; color:var(--text-dim); line-height:1.55; }
        .result-meta { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); display:grid; grid-template-columns:1fr 1fr; gap:10px 20px; }
        .mrow { display:flex; flex-direction:column; gap:3px; }
        .mkey { font-size:.72rem; letter-spacing:.15em; color:var(--text-dim); }
        .mval { font-size:.82rem; color:var(--amber); word-break:break-all; line-height:1.4; }
        .mval.c-green { color:var(--green); }
        .mval.c-blue  { color:var(--blue); }

        /* ── HISTORY ────────────────────────────────────────────── */
        .hist-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
        .hist-label  { font-size:.72rem; letter-spacing:.25em; color:var(--amber-dim); white-space:nowrap; }
        .hist-rule   { flex:1; height:1px; background:var(--border); }
        .hist-item   { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #161616; cursor:pointer; transition:background .12s; }
        .hist-item:hover { background:rgba(255,179,0,.03); }
        .hist-num  { font-size:.75rem; color:var(--text-dim); width:18px; flex-shrink:0; }
        .hist-addr { flex:1; min-width:0; font-size:.84rem; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-decoration:none; }
        .hist-addr:hover { color:var(--amber); }
        .hist-badge { font-size:.72rem; letter-spacing:.1em; padding:3px 10px; border:1px solid; flex-shrink:0; }
        .badge-found { color:var(--green); border-color:rgba(0,255,65,.25); background:rgba(0,255,65,.04); }
        .badge-miss  { color:#333; border-color:#1a1a1a; }

        /* ── DIVIDER ────────────────────────────────────────────── */
        .sect-div { height:1px; background:var(--border); margin:22px 0; }

        /* ── CLIENT FILTER ──────────────────────────────────────── */
        .cf-desc { font-size:.82rem; color:var(--text-dim); line-height:1.7; margin-bottom:14px; }
        .cf-desc strong { color:var(--text); }

        .cf-btns { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:14px; }
        .cf-btn {
            background:var(--panel2); border:1px solid var(--border);
            color:var(--text-dim); font-family:'Share Tech Mono',monospace;
            font-size:.82rem; letter-spacing:.1em; padding:8px 14px;
            cursor:pointer; transition:border-color .18s, color .18s, box-shadow .18s;
        }
        .cf-btn:hover:not(:disabled) { border-color:var(--amber-dim); color:var(--amber); }
        .cf-btn.state-loading { border-color:var(--amber); color:var(--amber); animation:cfPulse 1s ease-in-out infinite; }
        .cf-btn.state-loaded  { border-color:var(--green); color:var(--green); box-shadow:0 0 8px rgba(0,255,65,.15); }
        @keyframes cfPulse { 0%,100%{opacity:1} 50%{opacity:.5} }

        .cf-progress {
            background:var(--panel2); border:1px solid var(--border);
            padding:12px 14px; margin-bottom:10px;
        }
        .prog-track { height:3px; background:var(--border); margin-bottom:9px; position:relative; overflow:hidden; }
        .prog-fill  { height:100%; background:var(--amber); width:0%; transition:width .25s linear; box-shadow:0 0 6px var(--amber-glow); }
        .prog-row   { display:flex; justify-content:space-between; align-items:center; }
        .prog-text  { font-size:.8rem; color:var(--text-dim); }
        .prog-text span { color:var(--blue); }
        .btn-cancel { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:.9rem; padding:0 4px; line-height:1; }
        .btn-cancel:hover { color:var(--red); }

        .cf-status {
            display:flex; align-items:center; justify-content:space-between;
            background:rgba(0,255,65,.04); border:1px solid rgba(0,255,65,.18);
            padding:8px 12px; margin-bottom:4px;
        }
        .cf-status-txt { font-size:.84rem; color:var(--green); }
        .btn-unload {
            background:none; border:1px solid var(--text-dim); color:var(--text-dim);
            font-family:'Share Tech Mono',monospace; font-size:.62rem;
            letter-spacing:.15em; padding:3px 9px; cursor:pointer; transition:all .15s;
        }
        .btn-unload:hover { border-color:var(--red); color:var(--red); }

        /* ── LOG CONSOLE ────────────────────────────────────────── */
        .log-hdr-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
        .log-hdr-row .hist-label { flex:0; }
        .btn-clr {
            background:none; border:1px solid var(--border); color:var(--text-dim);
            font-family:'Share Tech Mono',monospace; font-size:.72rem;
            letter-spacing:.15em; padding:3px 10px; cursor:pointer; transition:all .15s;
        }
        .btn-clr:hover { border-color:var(--amber-dim); color:var(--amber); }

        .log-console {
            background:#050505; border:1px solid var(--border);
            height:260px; overflow-y:auto; padding:12px 14px;
            font-size:.78rem; line-height:1.8;
            scrollbar-width:thin; scrollbar-color:var(--border) transparent;
        }
        .log-console::-webkit-scrollbar { width:3px; }
        .log-console::-webkit-scrollbar-thumb { background:var(--border); }

        .le { display:flex; gap:8px; }
        .le-ts  { color:var(--text-dim); flex-shrink:0; width:60px; }
        .le-msg { flex:1; word-break:break-all; color:var(--text); }
        .le-msg.ok    { color:var(--green); }
        .le-msg.err   { color:var(--red); }
        .le-msg.hi    { color:var(--amber); }
        .le-msg.dim   { color:var(--text-dim); }
        .le-msg.data  { color:#b88e2a; }
        .le-msg.speed { color:var(--blue); }
        .le-msg.sep   { color:var(--text-dim); opacity:.5; }

        /* ── FOOTER ─────────────────────────────────────────────── */
        .footer { text-align:center; margin-top:20px; font-size:.75rem; letter-spacing:.22em; color:var(--text-dim); }
        .footer em { color:var(--amber-dim); font-style:normal; }

        /* ── RESPONSIVE ─────────────────────────────────────────── */
        @media (max-width:480px) {
            .term { padding:20px 14px 18px; }
            .reels { grid-template-columns:repeat(2,1fr); }
            .result-meta { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
<div class="wrap">

    <div class="hdr">
        <div class="hdr-title">BTC SLOT MACHINE</div>
    </div>

    <div class="term">

        <!-- chrome -->
        <div class="term-chrome">
            <div class="dot live"></div><div class="dot"></div><div class="dot"></div>
            <div class="chrome-label">READY</div>
            <div class="chrome-right">CLIENT: <span id="ramLabel">—</span></div>
        </div>

        <!-- input -->
        <div class="input-row">
            <div class="input-pfx">&gt;_</div>
            <input type="text" id="valInput" placeholder="1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa" autocomplete="off" spellcheck="false">
            <button class="btn-pull" id="btnPull" onclick="verifyInput()">PULL</button>
        </div>

        <!-- reels -->
        <div class="reels-wrap">
            <div class="reels">
                <div class="reel" id="r0">????</div>
                <div class="reel" id="r1">????</div>
                <div class="reel" id="r2">????</div>
                <div class="reel" id="r3">????</div>
            </div>
        </div>

        <!-- result -->
        <div class="result-wrap" id="resultWrap">
            <div class="result-idle" id="resultIdle"><span class="caret"></span></div>
            <div id="resultContent" style="display:none">
                <div class="result-status" id="resultStatus"></div>
                <div class="result-meta"   id="resultMeta" style="display:none"></div>
            </div>
        </div>

        <!-- history -->
        <div id="histBox" style="display:none">
            <div class="hist-header">
                <div class="hist-label">RECENT CHECKS</div>
                <div class="hist-rule"></div>
            </div>
            <div id="histList"></div>
        </div>

        <!-- ══ CLIENT FILTER ══════════════════════════════════════ -->
        <div class="sect-div"></div>

        <div class="sec-label">CLIENT FILTER</div>
        <div class="cf-btns" id="cfBtns">
            <button class="cf-btn" data-mb="32"   data-bits="28" onclick="loadFilter(32,28)">32M</button>
            <button class="cf-btn" data-mb="64"   data-bits="29" onclick="loadFilter(64,29)">64M</button>
            <button class="cf-btn" data-mb="128"  data-bits="30" onclick="loadFilter(128,30)">128M</button>
            <button class="cf-btn" data-mb="256"  data-bits="31" onclick="loadFilter(256,31)">256M</button>
            <button class="cf-btn" data-mb="512"  data-bits="32" onclick="loadFilter(512,32)">512M</button>
            <button class="cf-btn" data-mb="1024" data-bits="33" onclick="loadFilter(1024,33)">1G</button>
            <button class="cf-btn" data-mb="2048" data-bits="34" onclick="loadFilter(2048,34)">2G</button>
        </div>

        <div class="cf-progress" id="cfProgress" style="display:none">
            <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
            <div class="prog-row">
                <div class="prog-text" id="progText">0%</div>
                <button class="btn-cancel" onclick="cancelLoad()" title="Cancel">✕</button>
            </div>
        </div>

        <div class="cf-status" id="cfStatus" style="display:none">
            <span class="cf-status-txt" id="cfStatusTxt"></span>
            <button class="btn-unload" onclick="unloadFilter()">UNLOAD</button>
        </div>

        <!-- ══ LOG CONSOLE ════════════════════════════════════════ -->
        <div class="sect-div"></div>

        <div class="log-hdr-row">
            <div class="hist-label">ORACLE LOG</div>
            <div class="hist-rule"></div>
            <button class="btn-clr" onclick="clearLog()">CLR</button>
        </div>
        <div class="log-console" id="logConsole"></div>

    </div><!-- /term -->

    <div class="footer"><em>XR</em> &nbsp;◆&nbsp; <em>MNG</em></div>

</div><!-- /wrap -->

<script>
// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtMB(bytes) { return (bytes / 1048576).toFixed(1) + ' MB'; }

// ── LOG ───────────────────────────────────────────────────────────────────────
const LOG_START = performance.now();

function log(msg, type = '') {
    const t  = ((performance.now() - LOG_START) / 1000).toFixed(3).padStart(7, ' ');
    const el = document.getElementById('logConsole');
    if (!el) return;
    const row = document.createElement('div');
    row.className = 'le';
    row.innerHTML = `<span class="le-ts">[${t}]</span><span class="le-msg ${esc(type)}">${esc(msg)}</span>`;
    el.appendChild(row);
    el.scrollTop = el.scrollHeight;
}

function logSep(label) {
    log(`──── ${label} ` + '─'.repeat(Math.max(0, 38 - label.length)), 'sep');
}

function clearLog() {
    const el = document.getElementById('logConsole');
    if (el) { el.innerHTML = ''; log('Log cleared', 'dim'); }
}

// ── BASE58 ────────────────────────────────────────────────────────────────────
function decodeBase58(str) {
    const ALPHA = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
    let num = 0n, leading = 0;
    while (str[leading] === '1') leading++;
    for (const c of str) {
        const i = ALPHA.indexOf(c);
        if (i < 0) throw new Error("Invalid Base58 char: " + c);
        num = num * 58n + BigInt(i);
    }
    let hex = num.toString(16);
    if (hex.length % 2) hex = '0' + hex;
    const full = '00'.repeat(leading) + hex;
    if (full.length < 42) throw new Error("Base58 address too short");
    return full.substring(2, 42);
}

// ── BECH32 ────────────────────────────────────────────────────────────────────
function decodeBech32(str) {
    str = str.toLowerCase();
    if (!str.startsWith('bc1') || str.length < 42) throw new Error("Invalid SegWit/Taproot address.");
    const ALPHA = "qpzry9x8gf2tvdw0s3jn54khce6mua7l";
    let bin = "";
    for (let i = 4; i < 36; i++) {
        const idx = ALPHA.indexOf(str[i]);
        if (idx < 0) throw new Error("Invalid Bech32 char: " + str[i]);
        bin += idx.toString(2).padStart(5, '0');
    }
    let hex = "";
    for (let i = 0; i < 40; i++) hex += parseInt(bin.substring(i*4, i*4+4), 2).toString(16);
    return hex;
}

// ── FNV-1a 64-bit ─────────────────────────────────────────────────────────────
// Matches C++ SNVByte<0x00000100000001B3ull>(key, 0xCBF29CE484222325ull) exactly
const FNV_PRIME  = 0x00000100000001B3n;
const FNV_OFFSET = 0xCBF29CE484222325n;
const MASK64     = (1n << 64n) - 1n;

function fnv1a(hex20) {
    let h = FNV_OFFSET;
    for (let i = 0; i < 40; i += 2)
        h = ((h ^ BigInt(parseInt(hex20.substring(i, i + 2), 16))) * FNV_PRIME) & MASK64;
    return h;
}

// ── CLIENT FILTER STATE ───────────────────────────────────────────────────────
const cf = { buffer: null, view: null, sizeMB: null, bitsExp: null, abort: null };

function clientLookup(hash160) {
    if (!cf.view) return null;
    const t0      = performance.now();
    const fullH   = fnv1a(hash160);
    const bits    = BigInt(cf.bitsExp);
    const trunc   = fullH & ((1n << bits) - 1n);
    const row     = Number(trunc >> 6n);
    const col     = Number(trunc & 63n);
    const off     = row * 8;
    const lo      = cf.view.getUint32(off,     true);
    const hi      = cf.view.getUint32(off + 4, true);
    const chunk   = BigInt(lo) | (BigInt(hi) << 32n);
    const found   = (chunk & (1n << BigInt(col))) !== 0n;
    const ms      = (performance.now() - t0).toFixed(4);
    return { found, ms, fullH, trunc, row, col };
}

// ── FILTER LOAD ───────────────────────────────────────────────────────────────
async function loadFilter(sizeMB, bitsExp) {
    if (cf.abort) { cf.abort.abort(); cf.abort = null; }

    document.querySelectorAll('.cf-btn').forEach(b => b.className = 'cf-btn');
    const activeBtn = document.querySelector(`.cf-btn[data-mb="${sizeMB}"]`);
    if (activeBtn) activeBtn.classList.add('state-loading');

    document.getElementById('cfStatus').style.display = 'none';
    showProgress(true, 0, 0, sizeMB * 1048576, 0);

    cf.abort = new AbortController();
    const url = `filter/${sizeMB}mb.bin`;

    log(`loading ${url}`, 'hi');

    const t0 = performance.now();

    try {
        const resp = await fetch(url, { signal: cf.abort.signal });
        if (!resp.ok) throw new Error(`HTTP ${resp.status} — is filter/${sizeMB}mb.bin deployed?`);

        const reader     = resp.body.getReader();
        const totalBytes = sizeMB * 1048576;
        const chunks     = [];
        let received     = 0;
        let lastLogT     = t0;
        let lastSpeedRec = 0;
        let lastSpeedT   = t0;
        let speed        = 0;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;

            const now = performance.now();
            const dT  = (now - lastSpeedT) / 1000;
            if (dT > 0.15) {
                speed      = (received - lastSpeedRec) / dT / 1048576;
                lastSpeedRec = received;
                lastSpeedT   = now;
            }

            showProgress(true, received, totalBytes, speed);

            if (now - lastLogT > 1200) {
                const pct = ((received / totalBytes) * 100).toFixed(0);
                log(`${pct}%  ${fmtMB(received)}  ${speed.toFixed(1)} MB/s`, 'speed');
                lastLogT = now;
            }
        }

        const dlSec  = ((performance.now() - t0) / 1000).toFixed(3);
        const avgSpd = (received / 1048576 / parseFloat(dlSec)).toFixed(1);
        log(`✓ ${dlSec}s  ·  ${avgSpd} MB/s avg`, 'ok');

        const t1  = performance.now();
        const buf = new Uint8Array(received);
        let pos = 0;
        for (const c of chunks) { buf.set(c, pos); pos += c.length; }

        cf.buffer  = buf.buffer;
        cf.view    = new DataView(cf.buffer);
        cf.sizeMB  = sizeMB;
        cf.bitsExp = bitsExp;

        const buildMs = (performance.now() - t1).toFixed(1);
        log(`✓ ${sizeMB}MB ready  ·  DataView in ${buildMs}ms`, 'ok');

        setLoadedUI(sizeMB);
        showProgress(false);
        updateRamLabel();

    } catch (err) {
        showProgress(false);
        document.querySelectorAll('.cf-btn').forEach(b => b.className = 'cf-btn');
        if (err.name === 'AbortError') {
            log(`  Load cancelled`, 'dim');
        } else {
            log(`✗ ${err.message}`, 'err');
        }
    }
    cf.abort = null;
}

function cancelLoad() {
    if (cf.abort) { cf.abort.abort(); }
    document.querySelectorAll('.cf-btn').forEach(b => b.className = 'cf-btn');
    showProgress(false);
}

function unloadFilter() {
    const mb = cf.sizeMB;
    cf.buffer = cf.view = cf.sizeMB = cf.bitsExp = null;
    document.querySelectorAll('.cf-btn').forEach(b => b.className = 'cf-btn');
    document.getElementById('cfStatus').style.display = 'none';
    updateRamLabel();
    log(`${mb}MB filter unloaded  ·  queries now routed → server`, 'dim');
}

function setLoadedUI(sizeMB) {
    document.querySelectorAll('.cf-btn').forEach(b => b.className = 'cf-btn');
    const btn = document.querySelector(`.cf-btn[data-mb="${sizeMB}"]`);
    if (btn) btn.classList.add('state-loaded');
    document.getElementById('cfStatusTxt').textContent = `✓ ${sizeMB}MB filter active — JS lookups enabled`;
    document.getElementById('cfStatus').style.display = '';
}

function showProgress(show, received = 0, total = 0, speed = 0) {
    document.getElementById('cfProgress').style.display = show ? '' : 'none';
    if (show && total > 0) {
        const pct = ((received / total) * 100).toFixed(1);
        document.getElementById('progFill').style.width = pct + '%';
        const spdStr = speed > 0 ? `  ·  <span>${speed.toFixed(1)} MB/s</span>` : '';
        document.getElementById('progText').innerHTML =
            `${pct}%  ·  ${fmtMB(received)} / ${fmtMB(total)}${spdStr}`;
    }
}

function updateRamLabel() {
    document.getElementById('ramLabel').textContent = cf.sizeMB ? cf.sizeMB + ' MB' : '—';
    document.getElementById('ramLabel').style.color = cf.sizeMB ? 'var(--amber)' : '';
}

// ── REEL ANIMATION ────────────────────────────────────────────────────────────
const HEX = '0123456789ABCDEF';
let reelTimers = [];

function startSpinning() {
    reelTimers.forEach(clearInterval);
    reelTimers = [];
    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('r' + i);
        el.className = 'reel spinning';
        const iv = setInterval(() => {
            let s = '';
            for (let j = 0; j < 4; j++) s += HEX[Math.floor(Math.random() * 16)];
            el.textContent = s;
        }, 55);
        reelTimers.push(iv);
    }
}

function lockReels(hash160, found) {
    const cls = found ? 'reel found' : 'reel miss';
    for (let i = 0; i < 4; i++) {
        const chars = hash160.substring(i * 4, i * 4 + 4).toUpperCase();
        setTimeout(() => {
            clearInterval(reelTimers[i]);
            const el = document.getElementById('r' + i);
            el.textContent = chars;
            el.className = cls;
        }, i * 300);
    }
}

function resetReels() {
    reelTimers.forEach(clearInterval);
    reelTimers = [];
    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('r' + i);
        el.textContent = '????';
        el.className = 'reel';
    }
}

// ── RESULT DISPLAY ────────────────────────────────────────────────────────────
function showIdle(yes) {
    document.getElementById('resultIdle').style.display    = yes ? '' : 'none';
    document.getElementById('resultContent').style.display = yes ? 'none' : '';
}

function setWrapState(s) {
    document.getElementById('resultWrap').className = 'result-wrap state-' + s;
}

function showResult(found, hash160, detect, filterSrc, procMs, netMs) {
    showIdle(false);
    setWrapState(found ? 'found' : 'miss');
    document.getElementById('resultStatus').textContent = found ? '◆ JACKPOT — FOUND ◆' : '✕  NOT FOUND';

    const meta = document.getElementById('resultMeta');
    meta.style.display = '';
    meta.innerHTML = `
        <div class="mrow"><div class="mkey">Hash160</div><div class="mval" style="font-size:.72rem">${hash160.toUpperCase()}</div></div>
        <div class="mrow"><div class="mkey">Filter</div><div class="mval">${esc(filterSrc)}</div></div>
        <div class="mrow"><div class="mkey">Lookup</div><div class="mval c-blue">${procMs} ms</div></div>
        <div class="mrow"><div class="mkey">Network</div><div class="mval">${netMs !== null ? netMs + ' ms' : '—'}</div></div>`;
}

function showError(msg) {
    showIdle(false);
    setWrapState('error');
    document.getElementById('resultStatus').textContent = msg;
    document.getElementById('resultMeta').style.display = 'none';
}

// ── VERIFY ────────────────────────────────────────────────────────────────────
async function verifyInput() {
    const raw = document.getElementById('valInput').value.trim();
    if (!raw) return;

    const btn = document.getElementById('btnPull');
    btn.disabled = true;
    btn.textContent = '···';

    const newUrl = new URL(window.location.href);
    newUrl.searchParams.set('address', raw);
    window.history.replaceState({}, '', newUrl);

    startSpinning();
    showIdle(false);

    const spinStart = performance.now();
    let hash160 = '', detectType = '';

    try {
        // ── Decode input ────────────────────────────────────────
        if (raw.toLowerCase().startsWith('bc1') && raw.length >= 42) {
            hash160 = decodeBech32(raw);
            detectType = 'Bech32/m → Hash160';
        } else if ((raw[0] === '1' || raw[0] === '3') && raw.length >= 26 && raw.length <= 35) {
            hash160 = decodeBase58(raw);
            detectType = 'Base58 decoded';
        } else if (raw.length === 40 && /^[0-9a-fA-F]+$/.test(raw)) {
            hash160 = raw.toLowerCase();
            detectType = 'Direct Hash160';
        } else if ((raw.length === 66 || raw.length === 130) && /^[0-9a-fA-F]+$/.test(raw)) {
            const w = CryptoJS.enc.Hex.parse(raw);
            hash160 = CryptoJS.RIPEMD160(CryptoJS.SHA256(w)).toString(CryptoJS.enc.Hex);
            detectType = 'PubKey → SHA256→RIPEMD160';
        } else {
            throw new Error("Unrecognized format. Accepted: Base58, bc1 address, Hash160 (40 hex), or public key.");
        }

        log(`${hash160.toUpperCase()}  [${detectType}]`, 'data');

        const minSpin = 600;

        // ── Client-side filter path ─────────────────────────────
        const cr = clientLookup(hash160);
        if (cr !== null) {
            const bit = cr.row * 64 + cr.col;
            log(`JS ${cr.ms}ms  ·  bit ${bit.toLocaleString()}  →  ${cr.found ? '◆ HIT' : '✗ MISS'}`, cr.found ? 'ok' : 'speed');

            const wait = Math.max(0, minSpin - (performance.now() - spinStart));
            setTimeout(() => {
                lockReels(hash160, cr.found);
                setTimeout(() => showResult(cr.found, hash160, detectType, `${cf.sizeMB}mb.bin (JS)`, cr.ms, null), 4 * 300 + 60);
            }, wait);

            addHistory(raw, cr.found);

        // ── Server path ─────────────────────────────────────────
        } else {
            const t0  = performance.now();
            const res = await fetch(`index.php?address_hex=${hash160}&_cb=${Date.now()}`);
            const d   = await res.json();
            const net = (performance.now() - t0).toFixed(2);

            if (d.error) throw new Error(d.error);

            log(`server ${d.time_php_ms}ms  ·  net ${net}ms  ·  ${d.filter_used}  →  ${d.found ? '◆ HIT' : '✗ MISS'}`, d.found ? 'ok' : 'speed');

            const wait = Math.max(0, minSpin - (performance.now() - spinStart));
            setTimeout(() => {
                lockReels(hash160, d.found);
                setTimeout(() => showResult(d.found, hash160, detectType, d.filter_used, d.time_php_ms, net), 4 * 300 + 60);
            }, wait);

            addHistory(raw, d.found);
        }

    } catch (err) {
        resetReels();
        showError(err.message);
        log(`✗ ${err.message}`, 'err');
    }

    btn.disabled = false;
    btn.textContent = 'PULL';
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
let history = JSON.parse(localStorage.getItem('btc_hist') || '[]');

function renderHistory() {
    const box  = document.getElementById('histBox');
    const list = document.getElementById('histList');
    if (!history.length) { box.style.display = 'none'; return; }
    box.style.display = '';
    list.innerHTML = '';
    history.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'hist-item';
        row.innerHTML = `
            <span class="hist-num">${i+1}</span>
            <a class="hist-addr" href="https://mempool.space/address/${encodeURIComponent(item.input)}"
               target="_blank" onclick="event.stopPropagation()">${esc(item.input)}</a>
            <span class="hist-badge ${item.found ? 'badge-found' : 'badge-miss'}">${item.found ? 'FOUND' : 'MISS'}</span>`;
        row.addEventListener('click', () => {
            document.getElementById('valInput').value = item.input;
            verifyInput();
        });
        list.appendChild(row);
    });
}

function addHistory(input, found) {
    history = history.filter(h => h.input !== input);
    history.unshift({ input, found });
    if (history.length > 10) history.pop();
    localStorage.setItem('btc_hist', JSON.stringify(history));
    renderHistory();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('valInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); verifyInput(); }
});

window.addEventListener('DOMContentLoaded', () => {
    log('ready — no client filter loaded', 'dim');

    renderHistory();
    const p = new URLSearchParams(window.location.search);
    const q = p.get('address') || p.get('q') || p.get('hex') || p.get('pubkey');
    if (q) {
        document.getElementById('valInput').value = q;
        verifyInput();
    }
});
</script>
