<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Filter Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            background: #fff;
            color: #111;
            padding: 12px;
            max-width: 640px;
            margin: 0 auto;
        }

        /* header */
        .hdr { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; }
        .hdr h1 { font-size: 16px; font-weight: 700; }
        .hdr a  { font-size: 12px; color: #666; text-decoration: none; }
        .hdr a:hover { text-decoration: underline; }

        hr { border: none; border-top: 1px solid #ddd; margin: 10px 0; }

        /* input */
        .input-row { display: flex; gap: 0; margin-bottom: 8px; }
        #valInput {
            flex: 1; min-width: 0;
            border: 1px solid #bbb; border-right: none;
            padding: 7px 9px; font-family: monospace; font-size: 13px;
            outline: none;
        }
        #valInput:focus { border-color: #555; }
        #btnCheck {
            padding: 7px 14px; border: 1px solid #bbb;
            background: #f5f5f5; cursor: pointer; font-size: 13px; font-weight: 600;
            white-space: nowrap;
        }
        #btnCheck:hover { background: #e8e8e8; }
        #btnCheck:disabled { opacity: .5; cursor: not-allowed; }

        /* result */
        #resultBox {
            font-family: monospace; font-size: 13px;
            padding: 7px 9px; border: 1px solid #ddd;
            margin-bottom: 8px; min-height: 34px;
            display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap; word-break: break-all;
        }
        #resultBox.found { border-color: #2a9a2a; background: #f2fff2; }
        #resultBox.miss  { border-color: #bbb; background: #fafafa; }
        #resultBox.err   { border-color: #c33; background: #fff5f5; color: #c33; }

        .r-badge { font-weight: 700; white-space: nowrap; }
        .found .r-badge { color: #1a7a1a; }
        .miss  .r-badge { color: #666; }
        .r-hash  { color: #555; flex: 1; min-width: 0; }
        .r-meta  { color: #888; white-space: nowrap; }

        /* filter */
        .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
        .filter-lbl { font-size: 12px; color: #666; white-space: nowrap; }
        .cf-btn {
            padding: 4px 9px; border: 1px solid #ccc; background: #fafafa;
            cursor: pointer; font-size: 12px; font-family: monospace;
        }
        .cf-btn:hover { border-color: #888; background: #f0f0f0; }
        .cf-btn.loading { border-color: #888; background: #eee; opacity: .7; }
        .cf-btn.idb     { border-color: #888; border-style: dashed; }
        .cf-btn.loaded  { border-color: #2a9a2a; background: #f2fff2; color: #1a7a1a; font-weight: 700; border-style: solid; }
        .idb-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 4px; margin-bottom: 2px; }
        .del-btn { font-size: 11px; font-family: monospace; color: #c33; cursor: pointer; background: none; border: 1px solid #f0c0c0; padding: 2px 7px; }
        .del-btn:hover { background: #fff0f0; }

        .prog-wrap { margin-bottom: 6px; }
        .prog-bar { height: 4px; background: #eee; border: 1px solid #ddd; margin-bottom: 3px; }
        .prog-fill { height: 100%; background: #555; width: 0%; transition: width .2s linear; }
        .prog-txt { font-size: 11px; color: #666; font-family: monospace; display: flex; justify-content: space-between; }
        .prog-cancel { background: none; border: none; font-size: 11px; color: #c33; cursor: pointer; padding: 0; }

        /* history */
        .hist-row {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 0; border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .hist-row:hover { background: #fafafa; }
        .hist-addr { flex: 1; min-width: 0; font-family: monospace; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #333; }
        .hist-badge { font-size: 11px; white-space: nowrap; }
        .badge-f { color: #1a7a1a; }
        .badge-m { color: #999; }
        .hist-link { font-size: 11px; color: #888; text-decoration: none; flex-shrink: 0; }
        .hist-link:hover { color: #333; text-decoration: underline; }

        /* log */
        .log-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .log-lbl  { font-size: 12px; color: #666; }
        .log-clr  { font-size: 11px; color: #888; cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; }
        .log-box  { font-family: monospace; font-size: 11px; line-height: 1.6; background: #fafafa; border: 1px solid #e8e8e8; padding: 6px 8px; height: 140px; overflow-y: auto; color: #444; }
        .l-ok   { color: #1a7a1a; }
        .l-err  { color: #c33; }
        .l-dim  { color: #888; }
        .l-hi   { color: #555; }
        .l-data { color: #111; }
        .l-spd  { color: #335599; }

        .sec-lbl { font-size: 12px; color: #666; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="hdr">
    <h1>BTC Filter Test</h1>
    <a href="index.html">← Slot Machine</a>
</div>

<div class="input-row">
    <input type="text" id="valInput"
           placeholder="address / hash160 / pubkey"
           autocomplete="off" spellcheck="false">
    <button id="btnCheck" onclick="verifyInput()">Check</button>
</div>

<div id="resultBox"><span style="color:#bbb">—</span></div>

<hr>

<div class="filter-row">
    <span class="filter-lbl">Local Filter:</span>
    <button class="cf-btn" data-mb="32"   data-bits="28" onclick="filterClick(32,28)">32M</button>
    <button class="cf-btn" data-mb="64"   data-bits="29" onclick="filterClick(64,29)">64M</button>
    <button class="cf-btn" data-mb="128"  data-bits="30" onclick="filterClick(128,30)">128M</button>
    <button class="cf-btn" data-mb="256"  data-bits="31" onclick="filterClick(256,31)">256M</button>
    <button class="cf-btn" data-mb="512"  data-bits="32" onclick="filterClick(512,32)">512M</button>
    <button class="cf-btn" data-mb="1024" data-bits="33" onclick="filterClick(1024,33)">1G</button>
    <button class="cf-btn" data-mb="2048" data-bits="34" onclick="filterClick(2048,34)">2G</button>
</div>

<div class="idb-row" id="idbRow" style="display:none">
    <span class="filter-lbl">Delete locally:</span>
    <span id="idbDelList"></span>
</div>

<div class="prog-wrap" id="cfProgress" style="display:none">
    <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-txt">
        <span id="progText">0%</span>
        <button class="prog-cancel" onclick="cancelLoad()">cancel</button>
    </div>
</div>

<div id="histBox" style="display:none">
    <hr>
    <div class="sec-lbl">Recent</div>
    <div id="histList"></div>
</div>

<hr>

<div class="log-hdr">
    <span class="log-lbl">Log</span>
    <button class="log-clr" onclick="clearLog()">clear</button>
</div>
<div class="log-box" id="logConsole"></div>

<script>
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtMB(b) { return (b/1048576).toFixed(1)+' MB'; }

// ── LOG ───────────────────────────────────────────────────────────────────────
const LOG_START = performance.now();
function log(msg, type='') {
    const t = ((performance.now()-LOG_START)/1000).toFixed(2).padStart(6,' ');
    const el = document.getElementById('logConsole');
    const row = document.createElement('div');
    row.innerHTML = `<span class="l-dim">[${t}]</span> <span class="${'l-'+type||''}">${esc(msg)}</span>`;
    el.appendChild(row);
    el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById('logConsole').innerHTML=''; log('cleared','dim'); }

// ── DECODERS ──────────────────────────────────────────────────────────────────
function decodeBase58(str) {
    const ALPHA = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
    let num = 0n, leading = 0;
    while (str[leading] === '1') leading++;
    for (const c of str) {
        const i = ALPHA.indexOf(c);
        if (i < 0) throw new Error("Invalid Base58 char: " + c);
        num = num * 58n + BigInt(i);
    }
    let hex = num.toString(16);
    if (hex.length % 2) hex = '0' + hex;
    const full = '00'.repeat(leading) + hex;
    if (full.length < 42) throw new Error("Base58 address too short");
    return full.substring(2, 42);
}

function decodeBech32(str) {
    str = str.toLowerCase();
    if (!str.startsWith('bc1') || str.length < 42) throw new Error("Invalid SegWit/Taproot address.");
    const ALPHA = "qpzry9x8gf2tvdw0s3jn54khce6mua7l";
    let bin = "";
    for (let i = 4; i < 36; i++) {
        const idx = ALPHA.indexOf(str[i]);
        if (idx < 0) throw new Error("Invalid Bech32 char: " + str[i]);
        bin += idx.toString(2).padStart(5,'0');
    }
    let hex = "";
    for (let i = 0; i < 40; i++) hex += parseInt(bin.substring(i*4, i*4+4), 2).toString(16);
    return hex;
}

// ── FNV-1a 64-bit ─────────────────────────────────────────────────────────────
const FNV_PRIME  = 0x00000100000001B3n;
const FNV_OFFSET = 0xCBF29CE484222325n;
const MASK64     = (1n << 64n) - 1n;

function fnv1a(hex20) {
    let h = FNV_OFFSET;
    for (let i = 0; i < 40; i += 2)
        h = ((h ^ BigInt(parseInt(hex20.substring(i,i+2),16))) * FNV_PRIME) & MASK64;
    return h;
}

// ── INDEXEDDB CACHE ───────────────────────────────────────────────────────────
function openDB() {
    return new Promise((res, rej) => {
        const req = indexedDB.open('btc_filter_cache', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('filter');
        req.onsuccess = e => res(e.target.result);
        req.onerror   = e => rej(e.target.error);
    });
}
async function idbSave(sizeMB, bitsExp, buffer) {
    try {
        const db = await openDB();
        const tx = db.transaction('filter', 'readwrite');
        tx.objectStore('filter').put({ sizeMB, bitsExp, buffer }, sizeMB);
        await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
        log(`saved ${sizeMB}MB to IndexedDB`, 'dim');
    } catch(e) { log(`IDB write error: ${e.message}`, 'dim'); }
}
async function idbLoad(sizeMB) {
    try {
        const db  = await openDB();
        const tx  = db.transaction('filter', 'readonly');
        const req = tx.objectStore('filter').get(sizeMB);
        return await new Promise((res, rej) => { req.onsuccess = () => res(req.result||null); req.onerror = rej; });
    } catch(e) { return null; }
}
async function idbDelete(sizeMB) {
    try {
        const db = await openDB();
        const tx = db.transaction('filter', 'readwrite');
        tx.objectStore('filter').delete(sizeMB);
        await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    } catch(e) {}
}
async function idbKeys() {
    try {
        const db  = await openDB();
        const tx  = db.transaction('filter', 'readonly');
        const req = tx.objectStore('filter').getAllKeys();
        return await new Promise((res, rej) => { req.onsuccess = () => res(req.result||[]); req.onerror = rej; });
    } catch(e) { return []; }
}

async function refreshIDBState() {
    const keys = await idbKeys();
    document.querySelectorAll('.cf-btn').forEach(b => {
        const mb = parseInt(b.dataset.mb);
        if (b.classList.contains('loaded')) return; // don't touch active
        b.classList.toggle('idb', keys.includes(mb));
    });
    const delRow  = document.getElementById('idbRow');
    const delList = document.getElementById('idbDelList');
    if (!keys.length) { delRow.style.display = 'none'; return; }
    delRow.style.display = '';
    delList.innerHTML = '';
    const labels = { 32:'32M', 64:'64M', 128:'128M', 256:'256M', 512:'512M', 1024:'1G', 2048:'2G' };
    keys.sort((a,b)=>a-b).forEach(mb => {
        const btn = document.createElement('button');
        btn.className = 'del-btn';
        btn.textContent = (labels[mb] || mb+'M') + ' ×';
        btn.onclick = async () => {
            await idbDelete(mb);
            if (cf.sizeMB === mb) deactivateFilter();
            const b2 = document.querySelector(`.cf-btn[data-mb="${mb}"]`);
            if (b2) b2.classList.remove('idb','loaded');
            log(`deleted ${mb}MB from IndexedDB`, 'dim');
            refreshIDBState();
        };
        delList.appendChild(btn);
    });
}

// ── CLIENT FILTER ─────────────────────────────────────────────────────────────
const cf = { buffer: null, view: null, sizeMB: null, bitsExp: null, abort: null };

function clientLookup(hash160) {
    if (!cf.view) return null;
    const t0    = performance.now();
    const fullH = fnv1a(hash160);
    const trunc = fullH & ((1n << BigInt(cf.bitsExp)) - 1n);
    const row   = Number(trunc >> 6n);
    const col   = Number(trunc & 63n);
    const lo    = cf.view.getUint32(row*8,   true);
    const hi    = cf.view.getUint32(row*8+4, true);
    const chunk = BigInt(lo) | (BigInt(hi) << 32n);
    const found = (chunk & (1n << BigInt(col))) !== 0n;
    return { found, ms: (performance.now()-t0).toFixed(4) };
}

function activateFilter(sizeMB, bitsExp, buffer) {
    cf.buffer  = buffer;
    cf.view    = new DataView(buffer);
    cf.sizeMB  = sizeMB;
    cf.bitsExp = bitsExp;
    document.querySelectorAll('.cf-btn').forEach(b => {
        if (b.classList.contains('loaded')) {
            b.classList.remove('loaded');
            // restore idb class if it was cached
            idbKeys().then(keys => { if (keys.includes(parseInt(b.dataset.mb))) b.classList.add('idb'); });
        }
    });
    document.querySelector(`.cf-btn[data-mb="${sizeMB}"]`)?.classList.add('loaded');
    localStorage.setItem('btc_active_filter', sizeMB);
}

function deactivateFilter() {
    const mb = cf.sizeMB;
    cf.buffer = cf.view = cf.sizeMB = cf.bitsExp = null;
    // restore idb state on button
    refreshIDBState();
    localStorage.removeItem('btc_active_filter');
    if (mb) log(`${mb}MB deactivated`, 'dim');
}

async function filterClick(sizeMB, bitsExp) {
    // clicking the active button deactivates it
    if (cf.sizeMB === sizeMB) { deactivateFilter(); return; }

    // cancel any in-progress download
    if (cf.abort) { cf.abort.abort(); cf.abort = null; showProgress(false); }

    // try loading from IndexedDB first
    const cached = await idbLoad(sizeMB);
    if (cached) {
        activateFilter(sizeMB, bitsExp, cached.buffer);
        log(`loaded ${sizeMB}MB from IndexedDB`, 'ok');
        return;
    }

    // download from server
    const btn = document.querySelector(`.cf-btn[data-mb="${sizeMB}"]`);
    if (btn) { btn.classList.remove('idb','loaded'); btn.classList.add('loading'); }
    showProgress(true, 0, sizeMB*1048576, 0);
    cf.abort = new AbortController();
    const t0 = performance.now();
    log(`downloading ${sizeMB}mb.bin`, 'hi');
    try {
        const resp = await fetch(`filter/${sizeMB}mb.bin`, { signal: cf.abort.signal });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const reader     = resp.body.getReader();
        const totalBytes = sizeMB * 1048576;
        const chunks     = [];
        let received = 0, lastSpeedRec = 0, lastSpeedT = t0, speed = 0;
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            received += value.length;
            const now = performance.now();
            const dT  = (now - lastSpeedT) / 1000;
            if (dT > 0.15) { speed = (received-lastSpeedRec)/dT/1048576; lastSpeedRec=received; lastSpeedT=now; }
            showProgress(true, received, totalBytes, speed);
        }
        const dlSec  = ((performance.now()-t0)/1000).toFixed(2);
        const avgSpd = (received/1048576/parseFloat(dlSec)).toFixed(1);
        log(`done ${dlSec}s · ${avgSpd} MB/s`, 'ok');
        const buf = new Uint8Array(received);
        let pos = 0;
        for (const c of chunks) { buf.set(c, pos); pos += c.length; }
        activateFilter(sizeMB, bitsExp, buf.buffer);
        showProgress(false);
        await idbSave(sizeMB, bitsExp, cf.buffer);
        refreshIDBState();
    } catch (err) {
        showProgress(false);
        if (btn) { btn.classList.remove('loading'); }
        log(err.name==='AbortError' ? 'cancelled' : `error: ${err.message}`, err.name==='AbortError' ? 'dim' : 'err');
    }
    cf.abort = null;
}

function cancelLoad() {
    if (cf.abort) cf.abort.abort();
    showProgress(false);
}

function showProgress(show, received=0, total=0, speed=0) {
    document.getElementById('cfProgress').style.display = show ? '' : 'none';
    if (show && total > 0) {
        const pct = ((received/total)*100).toFixed(1);
        document.getElementById('progFill').style.width = pct + '%';
        const spd = speed > 0 ? ` · ${speed.toFixed(1)} MB/s` : '';
        document.getElementById('progText').textContent = `${pct}%  ${fmtMB(received)} / ${fmtMB(total)}${spd}`;
    }
}

// ── VERIFY ────────────────────────────────────────────────────────────────────
async function verifyInput() {
    const raw = document.getElementById('valInput').value.trim();
    if (!raw) return;
    const btn = document.getElementById('btnCheck');
    btn.disabled = true; btn.textContent = '...';

    const newUrl = new URL(window.location.href);
    newUrl.searchParams.set('address', raw);
    window.history.replaceState({}, '', newUrl);

    let hash160 = '', detectType = '';
    try {
        if (raw.toLowerCase().startsWith('bc1') && raw.length >= 42) {
            hash160 = decodeBech32(raw); detectType = 'Bech32';
        } else if ((raw[0]==='1'||raw[0]==='3') && raw.length>=26 && raw.length<=35) {
            hash160 = decodeBase58(raw); detectType = 'Base58';
        } else if (raw.length===40 && /^[0-9a-fA-F]+$/.test(raw)) {
            hash160 = raw.toLowerCase(); detectType = 'Hash160';
        } else if ((raw.length===66||raw.length===130) && /^[0-9a-fA-F]+$/.test(raw)) {
            const w = CryptoJS.enc.Hex.parse(raw);
            hash160 = CryptoJS.RIPEMD160(CryptoJS.SHA256(w)).toString(CryptoJS.enc.Hex);
            detectType = 'PubKey';
        } else { throw new Error("Unrecognized format."); }

        const cr = clientLookup(hash160);

        // always fetch server in parallel (fire and forget start)
        const serverT0 = performance.now();
        const serverPromise = fetch(`index.php?address_hex=${hash160}&_cb=${Date.now()}`)
            .then(r => r.json())
            .then(d => ({ d, net: (performance.now()-serverT0).toFixed(0) }))
            .catch(e => ({ err: e.message }));

        if (cr !== null) {
            // client result is instant — show immediately
            log(`${detectType}  ${raw}`, 'hi');
        log(`client · ${cf.sizeMB}mb · ${cr.ms}ms · ${cr.found?'HIT':'MISS'}`, cr.found?'ok':'data');
            showResult(cr.found, hash160, detectType, `${cf.sizeMB}mb`, cr.ms, null, null);
            addHistory(raw, cr.found);

            // then append server result to log once it arrives
            serverPromise.then(({ d, net, err }) => {
                if (err) { log(`server · error: ${err}`, 'err'); return; }
                if (d.error) { log(`server · error: ${d.error}`, 'err'); return; }
                const match = cr.found === d.found ? '✓ match' : '! mismatch';
                log(`server · ${d.filter_used} · php ${d.time_php_ms}ms · net ${net}ms · ${d.found?'HIT':'MISS'} · ${match}`,
                    cr.found !== d.found ? 'err' : 'dim');
                // update result with both timings
                showResult(cr.found, hash160, detectType, `${cf.sizeMB}mb`, cr.ms, d.time_php_ms, net);
            });
        } else {
            // no client filter — wait for server only
            const { d, net, err } = await serverPromise;
            if (err) throw new Error(err);
            if (d.error) throw new Error(d.error);
            log(`${detectType}  ${raw}`, 'hi');
            log(`server · ${d.filter_used} · php ${d.time_php_ms}ms · net ${net}ms · ${d.found?'HIT':'MISS'}`, d.found?'ok':'data');
            showResult(d.found, hash160, detectType, d.filter_used, null, d.time_php_ms, net);
            addHistory(raw, d.found);
        }
    } catch (err) {
        setResult('err', err.message);
        log(`error: ${err.message}`, 'err');
    }
    btn.disabled = false; btn.textContent = 'Check';
}

function showResult(found, hash160, detect, filterSrc, clientMs, phpMs, netMs) {
    const box = document.getElementById('resultBox');
    box.className = found ? 'found' : 'miss';
    const parts = [];
    if (clientMs !== null) parts.push(`client ${clientMs}ms`);
    if (phpMs   !== null) parts.push(`php ${phpMs}ms`);
    if (netMs   !== null) parts.push(`net ${netMs}ms`);
    box.innerHTML = `<span class="r-badge">${found ? '✓ FOUND' : '— NOT FOUND'}</span>`
        + `<span class="r-hash">${hash160.toUpperCase()}</span>`
        + `<span class="r-meta">${esc(filterSrc)} · ${parts.join(' · ')}</span>`;
}

function setResult(cls, msg) {
    const box = document.getElementById('resultBox');
    box.className = cls;
    box.textContent = msg;
}

function hasMempoolPage(s) {
    return (s.toLowerCase().startsWith('bc1') && s.length >= 42) ||
           ((s[0] === '1' || s[0] === '3') && s.length >= 26 && s.length <= 35);
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
let history = JSON.parse(localStorage.getItem('btc_hist_test') || '[]');

function renderHistory() {
    const box  = document.getElementById('histBox');
    const list = document.getElementById('histList');
    if (!history.length) { box.style.display = 'none'; return; }
    box.style.display = '';
    list.innerHTML = '';
    history.forEach(item => {
        const row = document.createElement('div');
        row.className = 'hist-row';
        row.innerHTML = `<span class="hist-addr">${esc(item.input)}</span>`
            + `<span class="hist-badge ${item.found?'badge-f':'badge-m'}">${item.found?'✓ found':'— miss'}</span>`
            + (hasMempoolPage(item.input) ? `<a class="hist-link" href="https://mempool.space/address/${encodeURIComponent(item.input)}" target="_blank" onclick="event.stopPropagation()">mempool↗</a>` : '');
        row.addEventListener('click', () => { document.getElementById('valInput').value = item.input; verifyInput(); });
        list.appendChild(row);
    });
}

function addHistory(input, found) {
    history = history.filter(h => h.input !== input);
    history.unshift({ input, found });
    if (history.length > 10) history.pop();
    localStorage.setItem('btc_hist_test', JSON.stringify(history));
    renderHistory();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('valInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); verifyInput(); }
});

window.addEventListener('DOMContentLoaded', async () => {
    renderHistory();
    const p = new URLSearchParams(window.location.search);
    const q = p.get('address') || p.get('q') || p.get('hex') || p.get('pubkey');

    await refreshIDBState();

    // restore last active filter from localStorage
    const lastMB = parseInt(localStorage.getItem('btc_active_filter') || '0');
    if (lastMB) {
        const cached = await idbLoad(lastMB);
        if (cached) {
            activateFilter(cached.sizeMB, cached.bitsExp, cached.buffer);
            log(`restored ${cached.sizeMB}MB from IndexedDB`, 'ok');
        } else {
            log('ready', 'dim');
        }
    } else {
        log('ready', 'dim');
    }

    if (q) { document.getElementById('valInput').value = q; verifyInput(); }
});
</script>
